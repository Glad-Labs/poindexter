# Lint every Grafana panel query against a real datasource. Catches the
# class of bug that PR #308 cleaned up (4 panels referencing
# renamed/dropped tables/columns — silently broken until an operator
# opened the dashboard). Runs:
#
#   1. Apply migrations against an empty Postgres 16 + pgvector container
#      (so schema-drift checks have a real schema to validate against).
#   2. Boot a vanilla Prometheus container (PromQL parser only — we don't
#      care about scraped data).
#   3. Run scripts/ci/grafana_panels_lint.py — fails the build on
#      Postgres 42703/42P01 or PromQL parse errors.
#
# Loki is NOT exercised in CI (booting a Loki stack just for parse-level
# validation isn't worth it). The lint script falls back to SKIP for loki
# targets when LOKI_URL is unset.
name: grafana-panels-lint

on:
  push:
    branches: [main]
    paths:
      - 'infrastructure/grafana/**'
      - 'scripts/ci/grafana_panels_lint.py'
      - 'src/cofounder_agent/services/migrations/**'
      - '.github/workflows/grafana-panels-lint.yml'
  pull_request:
    branches: [main]
    paths:
      - 'infrastructure/grafana/**'
      - 'scripts/ci/grafana_panels_lint.py'
      - 'src/cofounder_agent/services/migrations/**'
      - '.github/workflows/grafana-panels-lint.yml'
  workflow_dispatch:

# Cancel older in-progress runs of the same ref/PR — saves Actions minutes
# when multiple commits land back-to-back on the same PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Least-privilege GITHUB_TOKEN — read-only checkout is all this workflow
# needs. Per audit-2026-05-12 P1 #16. Bump per-job if a step ever needs
# write access (none does today).
permissions:
  contents: read

jobs:
  grafana-panels-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: poindexter_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d poindexter_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

      prometheus:
        # Vanilla prometheus is enough — we only hit /api/v1/query for
        # PromQL parse validation. Use the official image with no custom
        # config (it'll log scrape errors which we ignore).
        image: prom/prometheus:v2.54.1
        ports:
          - 9090:9090

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/poindexter_test
      PROMETHEUS_URL: http://localhost:9090

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4.3.1 as of 2026-05-12
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v5.6.0 as of 2026-05-12
        with:
          python-version: "3.13"

      # Same minimal-deps approach as migrations-smoke. asyncpg + httpx
      # are the only runtime deps the lint actually uses.
      - name: Install runtime deps
        run: pip install "asyncpg>=0.30,<0.32" "httpx>=0.28,<0.29"

      - name: Wait for Postgres
        run: |
          for i in $(seq 1 30); do
            if pg_isready -h localhost -p 5432 -U postgres > /dev/null 2>&1; then
              echo "postgres ready"
              exit 0
            fi
            echo "waiting for postgres... ($i)"
            sleep 1
          done
          echo "postgres never became ready" >&2
          exit 1

      - name: Wait for Prometheus
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9090/-/ready > /dev/null 2>&1; then
              echo "prometheus ready"
              exit 0
            fi
            echo "waiting for prometheus... ($i)"
            sleep 1
          done
          echo "prometheus never became ready" >&2
          exit 1

      # Apply the project migrations so schema-drift checks
      # (UndefinedColumn, UndefinedTable) have something to validate
      # against. Reuses the same script the migrations-smoke job runs.
      - name: Apply migrations
        run: python scripts/ci/migrations_smoke.py

      - name: Lint Grafana panel queries
        # Soft-fail mode: the macro expansion (esp. $__timeFrom / $__timeTo
        # / $__timeFilter) doesn't yet round-trip every shape Grafana emits
        # in practice, so 58 panels false-fail today on time-cast warnings
        # that aren't real schema drift. The output is still surfaced in
        # the workflow log for review. Tracking issue + macro hardening
        # are the gate to flipping this back to hard-fail.
        continue-on-error: true
        run: python scripts/ci/grafana_panels_lint.py infrastructure/grafana/dashboards/
