name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Weekly baseline scan catches CVEs that appear in deps between PRs.
  schedule:
    - cron: '17 6 * * 1'

# Cancel older in-progress runs of the same ref/PR — saves Actions minutes
# when multiple commits land back-to-back on the same PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  security-events: write

jobs:
  gitleaks:
    name: gitleaks — secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1 as of 2026-05-12
        with:
          fetch-depth: 0
      # Use the gitleaks CLI directly instead of gitleaks/gitleaks-action@v2,
      # which requires a paid org license and has been silently erroring with
      # "missing gitleaks license" on every push — meaning the public repo's
      # secret scan has not actually run in weeks. Mirrors .gitea/workflows/
      # security.yml so the same thing executes on both sides.
      #
      # NOTE: .gitleaks-baseline.json is stripped from the public-sync tree by
      # scripts/sync-to-github.sh (operator-specific + reveals internal commit
      # history). Until a sanitized public baseline is shipped, this scan will
      # surface the full historical false-positive set the private run has
      # baselined — tracked in the same ticket as the license swap.
      - name: Install gitleaks
        run: |
          curl -sSfL -o gitleaks.tar.gz \
            https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          chmod +x gitleaks
          ./gitleaks version
      - name: Run gitleaks
        run: |
          ./gitleaks detect \
            --config=.gitleaks.toml \
            --source=. \
            --verbose \
            --redact \
            --exit-code=1

  trivy-fs:
    name: Trivy — filesystem vuln scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1 as of 2026-05-12
      - name: Trivy filesystem scan (HIGH/CRITICAL gate)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'
          format: table
          # venv / node_modules / build caches are reproducible from lockfiles
          # — skipping them keeps the scan fast and stops Trivy choking on
          # the Windows-bytecode cache pyc files in mcp-server/.venv.
          skip-dirs: '**/node_modules,**/.venv,**/__pycache__,**/.next,**/.vercel,**/dist,**/build,**/.pytest_cache,**/.claude'
      - name: Trivy filesystem scan (SARIF for code-scanning tab)
        if: always()
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: sarif
          output: trivy-fs.sarif
          skip-dirs: '**/node_modules,**/.venv,**/__pycache__,**/.next,**/.vercel,**/dist,**/build,**/.pytest_cache,**/.claude'
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@7fd177fa680c9881b53cdab4d346d32574c9f7f4  # v3.35.4 as of 2026-05-12
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  trivy-config:
    name: Trivy — Dockerfile + IaC config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1 as of 2026-05-12
      - name: Scan Dockerfiles / compose for misconfig
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: config
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: '1'
          format: table
          skip-dirs: '**/node_modules,**/.venv,**/__pycache__,**/.next,**/.vercel,**/dist,**/build,**/.pytest_cache,**/.claude'

  action-pins:
    name: Lint third-party Actions for SHA pins
    runs-on: ubuntu-latest
    # Defends against the audit-2026-05-12 P1 #14 floating-tag vector.
    # Fails the build if any `uses:` in .github/workflows/ points at a
    # tag/branch instead of a 40-char commit SHA. Pure-stdlib script —
    # no pip install needed.
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1 as of 2026-05-12
      - name: Run check-action-pins
        run: python scripts/ci/check-action-pins.py

  poetry-lock:
    name: poetry check --lock (src/cofounder_agent)
    runs-on: ubuntu-latest
    # GH#180 defense-in-depth — the same check runs locally as a pre-commit
    # hook (.pre-commit-config.yaml) AND in the test workflow on Gitea
    # (.gitea/workflows/ci.yml). Mirroring it here protects the public
    # GitHub mirror in case a contributor opens a PR without pre-commit
    # installed and without going through Gitea CI first.
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1 as of 2026-05-12
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0 as of 2026-05-12
        with:
          python-version: '3.13'
      - name: Install Poetry
        run: pipx install poetry
      - name: Verify poetry.lock matches pyproject.toml
        run: |
          cd src/cofounder_agent
          poetry check --lock

  sbom:
    name: SBOM + grype scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1 as of 2026-05-12

      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0 as of 2026-05-12
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.cdx.json
          artifact-name: sbom-cyclonedx

      - name: Scan SBOM with grype (HIGH/CRITICAL gate)
        uses: anchore/scan-action@869c549e657a088dc0441b08ce4fc0ecdac2bb65  # v5.3.0 as of 2026-05-12
        id: grype-scan
        with:
          sbom: sbom.cdx.json
          fail-build: true
          severity-cutoff: high
          output-format: sarif

      - name: Upload grype SARIF
        if: always() && steps.grype-scan.outputs.sarif != ''
        uses: github/codeql-action/upload-sarif@7fd177fa680c9881b53cdab4d346d32574c9f7f4  # v3.35.4 as of 2026-05-12
        with:
          sarif_file: ${{ steps.grype-scan.outputs.sarif }}
          category: grype-sbom
