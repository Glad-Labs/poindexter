global:
  scrape_interval: 15s

scrape_configs:
  - job_name: nvidia-smi
    static_configs:
      - targets: ["host.docker.internal:9835"]

  - job_name: poindexter-worker
    metrics_path: /api/prometheus
    static_configs:
      - targets: ["worker:8002"]

  # System-level metrics (CPU, RAM, disk, network)
  # windows_exporter running on host at :9182
  - job_name: windows
    scrape_interval: 30s
    static_configs:
      - targets: ["host.docker.internal:9182"]
