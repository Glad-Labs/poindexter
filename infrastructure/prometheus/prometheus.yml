global:
  scrape_interval: 15s

# Alertmanager connection — Phase D (GitHub #68).
# Brain daemon will subscribe to Alertmanager webhooks for auto-remediation
# once parallel-run is verified; legacy brain probes continue to run in the
# meantime so there's no coverage gap.
alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  # Static alerts shipped with the repo — safety net if DB seeding is broken.
  - alerts/*.yml
  # DB-sourced rules rendered by RenderPrometheusRulesJob every 5 min.
  # Volume is shared with the worker; `/-/reload` picks up changes without
  # a container restart (see docker-compose.local.yml prometheus.command).
  - rules/*.yml

scrape_configs:
  - job_name: nvidia-smi
    # Scrape via docker DNS (container-to-container) instead of
    # host.docker.internal — Windows Docker Desktop occasionally fails
    # the gateway resolution for sibling containers, producing intermittent
    # "connection refused" up=0 reports even when the exporter is healthy
    # on the host's port-forward. The gpu-exporter container is on the
    # same compose network so the service name resolves directly.
    static_configs:
      - targets: ["gpu-exporter:9835"]

  # CPU package power — sourced from the host nvidia-smi-exporter.py.
  # The container above can't read AMD RAPL (Linux can't pull Windows
  # Energy Meter perfcounters), so the host-side pythonw service is the
  # authoritative source for system_cpu_package_power_watts. We pull
  # ONLY the cpu_* metrics here to avoid duplicating the GPU/system
  # metrics the container already provides (Prometheus would otherwise
  # see two series with different ``job`` labels and Grafana panels
  # would draw double lines). The metric_relabel_configs ``keep`` rule
  # drops everything except the CPU family.
  - job_name: nvidia-smi-host-cpu
    scrape_interval: 30s
    static_configs:
      - targets: ["host.docker.internal:9835"]
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: 'system_cpu_.*'
        action: keep

  # Canonical worker metrics — exposition produced via prometheus_client.
  # Gitea #269 folded the legacy /api/prometheus exposer into this path;
  # there's now a single scrape job for all poindexter_* metrics.
  - job_name: poindexter-worker
    metrics_path: /metrics
    static_configs:
      - targets: ["worker:8002"]

  # System-level metrics (CPU, RAM, disk, network)
  # windows_exporter running on host at :9182
  - job_name: windows
    scrape_interval: 30s
    static_configs:
      - targets: ["host.docker.internal:9182"]

  # Uptime Kuma — HTTP / TCP monitor response times & up/down status.
  # Auth via API key (password-only basic auth). The key lives in the
  # `uptime_kuma_api_key` row of `app_settings` (is_secret=true). Brain
  # writes the decrypted value to the password_file path on each cycle
  # (see brain/prometheus_secret_writer.py). Prometheus reads the file
  # at scrape time — no Prometheus restart needed when the key rotates,
  # no plaintext credential ever lands in git, no env-var sprawl.
  #
  # Operator workflow to rotate:
  #   1. Generate / rotate the key in Uptime Kuma admin UI
  #      (Settings -> API Keys).
  #   2. `poindexter set uptime_kuma_api_key <new-key>`.
  #   3. Within ~5 min (next brain cycle) the file is overwritten and
  #      the next prometheus scrape uses the new value. No restart.
  - job_name: uptime-kuma
    scrape_interval: 30s
    metrics_path: /metrics
    basic_auth:
      username: ""
      password_file: /etc/prometheus/secrets/uptime-kuma-api-key
    static_configs:
      - targets: ["uptime-kuma:3001"]

  # Tempo internal metrics (ingest rate, block uploads, RED of the
  # metrics_generator). Pairs with the tempo-config.yml metrics_generator
  # that remote_writes span-metrics back into Prometheus.
  - job_name: tempo
    scrape_interval: 30s
    static_configs:
      - targets: ["tempo:3200"]

  # Pyroscope self-metrics (ingest rate, active profiles).
  - job_name: pyroscope
    scrape_interval: 30s
    static_configs:
      - targets: ["pyroscope:4040"]
