# Gitea Actions CI — local test runner
name: CI — Test

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Backend unit tests
        run: |
          pip install --upgrade pip poetry
          poetry config virtualenvs.create false
          cd src/cofounder_agent && poetry install --no-root
          poetry run pytest tests/unit/ -q --tb=short --ignore=tests/unit/services/test_web_research.py --ignore=tests/unit/agents/test_content_agent_pexels_client.py --ignore=tests/unit/agents/test_content_agent_postgres_image_agent.py --ignore=tests/unit/routes/test_newsletter_routes.py --ignore=tests/unit/services/test_memory_client.py -x
