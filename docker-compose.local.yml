# Poindexter — Self-Hosted Operations Stack
# Everything local, open source, $0/month
#
# Start all:  docker compose -f docker-compose.local.yml up -d
# Start core: docker compose -f docker-compose.local.yml up -d postgres-local grafana
# Start git:  docker compose -f docker-compose.local.yml up -d gitea gitea-runner

services:
  postgres-local:
    image: pgvector/pgvector:pg16
    container_name: poindexter-postgres-local
    restart: unless-stopped
    ports:
      - "15432:5432"
    environment:
      POSTGRES_DB: ${LOCAL_POSTGRES_DB:-poindexter_brain}
      POSTGRES_USER: ${LOCAL_POSTGRES_USER:-poindexter}
      POSTGRES_PASSWORD: ${LOCAL_POSTGRES_PASSWORD:?Run 'poindexter setup' — LOCAL_POSTGRES_PASSWORD is generated in bootstrap.toml}
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=512MB"
      - "-c"
      - "effective_cache_size=2GB"
      - "-c"
      - "work_mem=8MB"
      - "-c"
      - "maintenance_work_mem=128MB"
      - "-c"
      - "checkpoint_timeout=10min"
      - "-c"
      - "max_wal_size=2GB"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "shared_preload_libraries=pg_stat_statements"
      - "-c"
      - "pg_stat_statements.track=all"
    shm_size: "256mb"
    volumes:
      - postgres-local-data:/var/lib/postgresql/data
      - ./infrastructure/local-db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${LOCAL_POSTGRES_USER:-poindexter}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================
  # Prometheus — scrapes nvidia-smi exporter for GPU metrics
  # ===========================================
  prometheus:
    image: prom/prometheus:latest
    container_name: poindexter-prometheus
    restart: unless-stopped
    ports:
      - "9091:9090"
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3

  grafana:
    image: grafana/grafana-oss:latest
    container_name: poindexter-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:?Run 'poindexter setup' or 'bash scripts/start-stack.sh'}
      GF_INSTALL_PLUGINS: grafana-clock-panel
      LOCAL_POSTGRES_PASSWORD: ${LOCAL_POSTGRES_PASSWORD:?Run 'poindexter setup' — LOCAL_POSTGRES_PASSWORD is generated in bootstrap.toml}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      DISCORD_OPS_WEBHOOK_URL: ${DISCORD_OPS_WEBHOOK_URL:-}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning
      - ./infrastructure/grafana/dashboards:/etc/grafana/dashboards
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      postgres-local:
        condition: service_healthy
      prometheus:
        condition: service_healthy

  # ===========================================
  # Gitea — self-hosted git (replaces GitHub)
  # ===========================================
  gitea:
    image: gitea/gitea:latest
    container_name: gladlabs-gitea
    restart: unless-stopped
    # Operator-only: customers fork the public Poindexter repo on GitHub.
    # Start explicitly: docker compose --profile operator up -d gitea
    profiles: ["operator"]
    ports:
      - "3001:3000"
      - "2222:22"
    environment:
      USER_UID: 1000
      USER_GID: 1000
      GITEA__database__DB_TYPE: postgres
      GITEA__database__HOST: postgres-local:5432
      GITEA__database__NAME: ${LOCAL_POSTGRES_DB:-poindexter_brain}
      GITEA__database__USER: ${LOCAL_POSTGRES_USER:-poindexter}
      GITEA__database__PASSWD: ${LOCAL_POSTGRES_PASSWORD:?Run 'poindexter setup' — LOCAL_POSTGRES_PASSWORD is generated in bootstrap.toml}
      GITEA__server__ROOT_URL: http://localhost:3001
      GITEA__server__SSH_DOMAIN: localhost
      GITEA__server__SSH_PORT: 2222
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - gitea-data:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/v1/version"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      postgres-local:
        condition: service_healthy

  # ===========================================
  # Gitea Actions Runner — native CI (replaces Woodpecker)
  # ===========================================
  gitea-runner:
    build:
      context: ./infrastructure/gitea-runner
    container_name: gladlabs-gitea-runner
    restart: unless-stopped
    # Operator-only: only runs alongside gitea
    profiles: ["operator"]
    environment:
      GITEA_INSTANCE_URL: http://gitea:3000
      GITEA_RUNNER_REGISTRATION_TOKEN: ${GITEA_RUNNER_TOKEN:-}
      GITEA_RUNNER_NAME: local-runner
      GITEA_RUNNER_LABELS: "ubuntu-latest:host"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - gitea-runner-data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - gitea

  # ===========================================
  # Brain Daemon — standalone monitor, self-healer, knowledge graph
  # ===========================================
  brain-daemon:
    build:
      context: ./brain
      dockerfile: Dockerfile
    container_name: poindexter-brain-daemon
    restart: unless-stopped
    environment:
      # Primary DB is local Postgres.
      DATABASE_URL: "postgresql://${LOCAL_POSTGRES_USER:-poindexter}:${LOCAL_POSTGRES_PASSWORD:?Run 'poindexter setup' — LOCAL_POSTGRES_PASSWORD is generated in bootstrap.toml}@postgres-local:5432/${LOCAL_POSTGRES_DB:-poindexter_brain}"
      # CLOUD_DATABASE_URL removed — Railway eliminated. All data on local Postgres + R2.
      # No Telegram tokens — OpenClaw owns Telegram/Discord connections
      API_URL: "http://worker:8002"
      WORKER_API_URL: "http://worker:8002"
      SITE_URL: ${SITE_URL:-https://www.gladlabs.io}
      OLLAMA_URL: "http://host.docker.internal:11434"
      GRAFANA_URL: "http://grafana:3000"
      GRAFANA_PASSWORD: ${GRAFANA_PASSWORD:?Run 'poindexter setup' — GRAFANA_PASSWORD is generated in bootstrap.toml}
      GITEA_URL: "http://gitea:3000"
      GITEA_USER: ${GITEA_USER:-gladlabs}
      GITEA_PASS: ${GITEA_PASSWORD:-}
      DISCORD_LAB_LOGS_WEBHOOK_URL: ${DISCORD_LAB_LOGS_WEBHOOK_URL:-}
      DISCORD_OPS_WEBHOOK_URL: ${DISCORD_OPS_WEBHOOK_URL:-}
      IN_DOCKER: "true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./brain:/brain:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import os,signal; os.kill(1, 0)' 2>/dev/null || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
    depends_on:
      postgres-local:
        condition: service_healthy

  # ===========================================
  # Content Pipeline Worker — claims tasks, runs Ollama inference
  # ===========================================
  worker:
    build:
      context: ./src/cofounder_agent
      dockerfile: Dockerfile.worker
    container_name: poindexter-worker
    restart: unless-stopped
    ports:
      - "8002:8002"
    environment:
      DEPLOYMENT_MODE: worker
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DEVELOPMENT_MODE: "true"
      PORT: "8002"
      # Secrets loaded from DB (app_settings) at startup — no env vars needed
      # Primary DB is local Postgres.
      DATABASE_URL: "postgresql://${LOCAL_POSTGRES_USER:-poindexter}:${LOCAL_POSTGRES_PASSWORD:?Run 'poindexter setup' — LOCAL_POSTGRES_PASSWORD is generated in bootstrap.toml}@postgres-local:5432/${LOCAL_POSTGRES_DB:-poindexter_brain}"
      # CLOUD_DATABASE_URL removed — Railway eliminated. All data on local Postgres + R2.
      OLLAMA_BASE_URL: "http://host.docker.internal:11434"
      # MemoryClient / auto-embed read OLLAMA_URL (not OLLAMA_BASE_URL).
      # Keep both set to the same value to avoid a silent "no Ollama" error
      # when /api/memory/* is called from the worker (#198).
      OLLAMA_URL: "http://host.docker.internal:11434"
      PEXELS_API_KEY: ${PEXELS_API_KEY:-}
      DEFAULT_OLLAMA_MODEL: ${DEFAULT_OLLAMA_MODEL:-auto}
      # No Telegram tokens — OpenClaw owns Telegram/Discord connections
      SITE_NAME: ${SITE_NAME:-Glad Labs}
      SITE_DOMAIN: ${SITE_DOMAIN:-gladlabs.io}
      SITE_URL: ${SITE_URL:-https://www.gladlabs.io}
      API_BASE_URL: ${API_BASE_URL:-http://localhost:8002}
      COMPANY_NAME: ${COMPANY_NAME:-Glad Labs}
      HOST_HOME: ${HOST_HOME:-${USERPROFILE:-/root}}
      API_TOKEN: ${API_TOKEN:?Run 'poindexter setup' — API_TOKEN is generated in bootstrap.toml}
      PYTHONDONTWRITEBYTECODE: "1"
    volumes:
      - ${USERPROFILE:-.}/.poindexter:/root/.poindexter
      - ${USERPROFILE:-.}/Downloads/glad-labs-generated-images:/root/Downloads/glad-labs-generated-images
      # Dev mount: edit Python files on host, restart worker to pick up changes.
      # No docker cp needed. Read-only to prevent __pycache__ writes to source.
      - ./src/cofounder_agent:/app:ro
      - ./scripts:/opt/scripts:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Worker reads every tunable from app_settings (models, prompts, QA
    # thresholds). Wait for brain-daemon to seed + validate before booting
    # so we don't start a pipeline that silently falls through to defaults.
    depends_on:
      postgres-local:
        condition: service_healthy
      brain-daemon:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,json; r=json.loads(urllib.request.urlopen('http://localhost:8002/api/health').read()); e=r.get('components',{}).get('task_executor',{}); exit(1 if isinstance(e,dict) and e.get('success_count',0)==0 and e.get('error_count',0)>5 else 0)"]
      interval: 60s
      timeout: 10s
      retries: 3

  # ===========================================
  # SDXL Image Server — GPU-accelerated image generation
  # ===========================================
  sdxl-server:
    build:
      context: ./scripts
      dockerfile: Dockerfile.sdxl
    container_name: poindexter-sdxl-server
    restart: unless-stopped
    ports:
      - "9836:9836"
    environment:
      POINDEXTER_BRAIN_URL: "postgresql://${LOCAL_POSTGRES_USER:-poindexter}:${LOCAL_POSTGRES_PASSWORD:?Run 'poindexter setup' — LOCAL_POSTGRES_PASSWORD is generated in bootstrap.toml}@postgres-local:5432/${LOCAL_POSTGRES_DB:-poindexter_brain}"
    volumes:
      - ${USERPROFILE:-.}/.poindexter/generated-images:/root/.poindexter/generated-images
      - ${USERPROFILE:-.}/.cache/huggingface:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # SDXL reads image_generation_model / image_negative_prompt / style
    # settings from app_settings. Wait for brain to seed them first.
    depends_on:
      postgres-local:
        condition: service_healthy
      brain-daemon:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:9836/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===========================================
  # pgAdmin — PostgreSQL web UI
  # ===========================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: poindexter-pgadmin
    restart: unless-stopped
    # Optional DB GUI — start with: docker compose --profile operator up -d pgadmin
    profiles: ["operator"]
    ports:
      - "5480:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@gladlabs.io}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:?Run 'poindexter setup' — PGADMIN_PASSWORD is generated in bootstrap.toml}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
      - ./infrastructure/pgadmin/servers.json:/pgadmin4/servers.json:ro
      - ./infrastructure/pgadmin/pgpass:/tmp/pgpass_src:ro
    entrypoint: >
      /bin/sh -c "
      cp /tmp/pgpass_src /tmp/pgpass &&
      chmod 0600 /tmp/pgpass &&
      /entrypoint.sh
      "
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80/misc/ping"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      postgres-local:
        condition: service_healthy

  # ===========================================
  # Discord Voice Bot — hands-free voice meetings with Claude
  # ===========================================
  voice-bot:
    build:
      context: .
      dockerfile: scripts/Dockerfile.voice-bot
    container_name: poindexter-voice-bot
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql://${LOCAL_POSTGRES_USER:-poindexter}:${LOCAL_POSTGRES_PASSWORD:?Run 'poindexter setup' — LOCAL_POSTGRES_PASSWORD is generated in bootstrap.toml}@postgres-local:5432/${LOCAL_POSTGRES_DB:-poindexter_brain}"
    volumes:
      - ./scripts/discord-voice-bot.py:/app/discord-voice-bot.py:ro
      - ./brain:/brain:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import os,signal; os.kill(1, 0)' 2>/dev/null || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
    # Voice bot reads discord_voice_bot_token + LLM config from app_settings.
    # Wait for brain to seed before booting.
    depends_on:
      postgres-local:
        condition: service_healthy
      brain-daemon:
        condition: service_healthy

  # ===========================================
  # Auto-Embed — hourly pgvector embedding sync
  # ===========================================
  auto-embed:
    build:
      context: .
      dockerfile: scripts/Dockerfile.auto-embed
    container_name: poindexter-auto-embed
    restart: unless-stopped
    environment:
      # Only DATABASE_URL is an env var by policy; everything else — ollama_url,
      # gitea_url, etc. — lives in the app_settings DB and is loaded at runtime.
      # The script translates `localhost:PORT` to in-network service names when
      # it detects it's running inside Docker (IN_DOCKER=true).
      DATABASE_URL: "postgresql://${LOCAL_POSTGRES_USER:-poindexter}:${LOCAL_POSTGRES_PASSWORD:?Run 'poindexter setup' — LOCAL_POSTGRES_PASSWORD is generated in bootstrap.toml}@postgres-local:5432/${LOCAL_POSTGRES_DB:-poindexter_brain}"
      IN_DOCKER: "true"
      # Point the script at the container-mount locations instead of Path.home().
      # Mounting the whole projects/ dir means every C--* scope gets embedded
      # automatically — no more silent skips when cwd changes (2026-04-18 incident).
      CLAUDE_PROJECTS_DIR: /memory/claude-projects
      OPENCLAW_MEMORY_DIR: /memory/openclaw
    volumes:
      - ./scripts/auto-embed.py:/app/auto-embed.py:ro
      - ./brain:/brain:ro
      - ${USERPROFILE:-.}/.claude/projects:/memory/claude-projects:ro
      - ${USERPROFILE:-.}/.openclaw/workspace/memory:/memory/openclaw:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Boot order: postgres (data) → brain-daemon (seeds + self-checks) → auto-embed
    # (populates pgvector) → everything else. Per 2026-04-18 architecture discussion.
    depends_on:
      postgres-local:
        condition: service_healthy
      brain-daemon:
        condition: service_healthy

  # ===========================================
  # GPU Metrics Exporter — nvidia-smi + HWiNFO to Prometheus
  # ===========================================
  gpu-exporter:
    build:
      context: .
      dockerfile: scripts/Dockerfile.gpu-exporter
    container_name: poindexter-gpu-exporter
    restart: unless-stopped
    ports:
      - "9835:9835"
    environment:
      DATABASE_URL: "postgresql://${LOCAL_POSTGRES_USER:-poindexter}:${LOCAL_POSTGRES_PASSWORD:?Run 'poindexter setup' — LOCAL_POSTGRES_PASSWORD is generated in bootstrap.toml}@postgres-local:5432/${LOCAL_POSTGRES_DB:-poindexter_brain}"
    volumes:
      - ./scripts/nvidia-smi-exporter.py:/app/nvidia-smi-exporter.py:ro
      - ./brain:/brain:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      postgres-local:
        condition: service_healthy

# Volumes deliberately keep the gladlabs-* prefix from the pre-rebrand era.
# Renaming a docker volume in compose creates a fresh empty volume and
# orphans the old one — that means data loss for any existing instance.
# Volumes are rarely customer-visible (only in `docker volume ls`) so the
# name mismatch is acceptable to preserve user data across the rebrand.
volumes:
  postgres-local-data:
    name: gladlabs-postgres-local-data
  grafana-data:
    name: gladlabs-grafana-data
  gitea-data:
    name: gladlabs-gitea-data
  gitea-runner-data:
    name: gladlabs-gitea-runner-data
  prometheus-data:
    name: gladlabs-prometheus-data
  pgadmin-data:
    name: gladlabs-pgadmin-data
