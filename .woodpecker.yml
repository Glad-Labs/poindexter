# =============================================================================
# Woodpecker CI — Local test runner (Gitea)
#
# Runs tests on push to main. Deploys are handled by GitHub Actions.
# This gives fast local feedback while GitHub Actions handles production.
# =============================================================================

when:
  branch: main
  event: push

clone:
  git:
    image: woodpeckerci/plugin-git:2.8.1
    settings:
      remote: http://gitea:3000/gladlabs/glad-labs-codebase.git
      depth: 1

steps:
  backend-unit-tests:
    image: python:3.12-bookworm
    directory: src/cofounder_agent
    commands:
      - pip install --upgrade pip poetry
      - poetry config virtualenvs.create false
      - poetry install --no-root
      - poetry run pytest tests/unit/ -q --tb=short --ignore=tests/unit/services/test_web_research.py

  frontend-tests:
    image: node:22-bookworm
    commands:
      - npm ci
      - npm run test:ci
    environment:
      NODE_ENV: test

  linting:
    image: node:22-bookworm
    commands:
      - npm ci
      - npm run lint

  # Deploys handled by GitHub Actions — not Woodpecker
  # See .github/workflows/ci.yml

  notify-success:
    image: curlimages/curl:latest
    commands:
      - |
        COMMIT_SHA=$(echo $CI_COMMIT_SHA | cut -c1-7)
        curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
          -d chat_id="$TELEGRAM_CHAT_ID" \
          -d parse_mode="Markdown" \
          -d text="Woodpecker: Tests Passed

        Commit: $COMMIT_SHA — $CI_COMMIT_MESSAGE"
    environment:
      TELEGRAM_BOT_TOKEN:
        from_secret: TELEGRAM_BOT_TOKEN
      TELEGRAM_CHAT_ID:
        from_secret: TELEGRAM_CHAT_ID
    when:
      status: [success]

  notify-failure:
    image: curlimages/curl:latest
    commands:
      - |
        COMMIT_SHA=$(echo $CI_COMMIT_SHA | cut -c1-7)
        curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
          -d chat_id="$TELEGRAM_CHAT_ID" \
          -d parse_mode="Markdown" \
          -d text="Woodpecker: Tests FAILED

        Commit: $COMMIT_SHA — $CI_COMMIT_MESSAGE

        Fix and push again."
    environment:
      TELEGRAM_BOT_TOKEN:
        from_secret: TELEGRAM_BOT_TOKEN
      TELEGRAM_CHAT_ID:
        from_secret: TELEGRAM_CHAT_ID
    when:
      status: [failure]
