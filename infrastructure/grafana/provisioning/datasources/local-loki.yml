apiVersion: 1

datasources:
  - name: Loki
    type: loki
    uid: local-loki
    access: proxy
    url: http://loki:3100
    isDefault: false
    editable: true
    jsonData:
      # Matches the tenant_id promtail ships with. Loki runs with
      # auth_enabled: false so this is mostly cosmetic, but keeping
      # it consistent avoids "No matching streams" surprises.
      httpHeaderName1: X-Scope-OrgID
    secureJsonData:
      httpHeaderValue1: glad-labs
