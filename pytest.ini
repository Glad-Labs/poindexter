[pytest]
# Test discovery
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Test paths - consolidated to root tests directory
testpaths =
    tests
    playwright-tests

# Markers for test organization
markers =
    unit: Unit tests for individual components
    integration: Integration tests with multiple components
    e2e: End-to-end tests using Playwright
    slow: Tests that take more than 5 seconds
    smoke: Fast smoke tests for CI pipelines
    websocket: Tests involving WebSocket connections
    performance: Performance benchmarking tests
    asyncio: Async/await tests

# Async test configuration
asyncio_mode = auto

# Output and verbosity
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    -ra

# Test timeout (seconds) - prevent hanging tests
timeout = 300

# Minimum Python version
minversion = 3.10

# Coverage configuration
[coverage:run]
source = src/cofounder_agent
omit =
    */tests/*
    */test_*.py
    */__pycache__/*
    */venv/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
    if __debug__:

