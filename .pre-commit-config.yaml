repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
        # gitleaks' pre-commit hook runs `protect --staged` by default, which
        # scans only what's in the commit — it won't hit the historical 336
        # findings frozen in .gitleaks-baseline.json.

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
        args: ['--maxkb=5120']
      - id: check-merge-conflict
      - id: check-yaml
        args: ['--allow-multiple-documents']
        exclude: '^infrastructure/grafana/dashboards/.*\.json$'
      - id: end-of-file-fixer
        exclude: '\.(svg|json)$'
      - id: trailing-whitespace
        exclude: '\.md$'

  # Warn (don't block) when the repo isn't configured to sign commits.
  # See docs/operations/commit-signing.md + scripts/setup-git-signing.sh.
  - repo: local
    hooks:
      - id: warn-unsigned-commits
        name: warn if commit.gpgsign is off
        entry: scripts/check-commit-signing.sh
        language: script
        stages: [pre-commit]
        always_run: true
        pass_filenames: false
        # Must not fail the commit — emit warning only. The script always
        # exits 0; this flag is belt-and-suspenders.
        verbose: true
