# Default prompts — functional but basic. Premium prompts available at gladlabs.io

- key: task.creative_blog_generation
  category: blog_generation
  description: "Default prompt — upgrade to Glad Labs Premium Prompts for production-quality output"
  output_format: markdown
  template: |
    Create a blog post about: {topic}
    Style: {style}. Length: {length} words.
    {research_context}

- key: task.qa_content_evaluation
  category: content_qa
  description: "Default prompt — upgrade to Glad Labs Premium Prompts for production-quality output"
  output_format: json
  template: |
    Evaluate this content for quality. Return JSON with keys: overall_score, readability, accuracy, suggestions.
    Content: {content}

