# Glad Labs — Self-Hosted Operations Stack
# Everything local, open source, $0/month
#
# Start all:  docker compose -f docker-compose.local.yml up -d
# Start core: docker compose -f docker-compose.local.yml up -d postgres-local grafana headscale
# Start git:  docker compose -f docker-compose.local.yml up -d gitea woodpecker-server woodpecker-agent

services:
  # ===========================================
  # Headscale — self-hosted Tailscale (replaces Tailscale cloud)
  # ===========================================
  headscale:
    image: headscale/headscale:latest
    container_name: gladlabs-headscale
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "9090:9090"
    command: serve
    volumes:
      - headscale-data:/var/lib/headscale
      - ./infrastructure/headscale/config.yaml:/etc/headscale/config.yaml
      - ./infrastructure/headscale/certs:/etc/headscale/certs
    healthcheck:
      test: ["CMD", "headscale", "health"]
      interval: 30s
      timeout: 5s
      retries: 3

  postgres-local:
    image: pgvector/pgvector:pg16
    container_name: gladlabs-postgres-local
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ${LOCAL_POSTGRES_DB:-gladlabs_brain}
      POSTGRES_USER: ${LOCAL_POSTGRES_USER:-gladlabs}
      POSTGRES_PASSWORD: ${LOCAL_POSTGRES_PASSWORD:?LOCAL_POSTGRES_PASSWORD must be set}
    volumes:
      - postgres-local-data:/var/lib/postgresql/data
      - ./infrastructure/local-db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gladlabs"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================
  # Prometheus — scrapes nvidia-smi exporter for GPU metrics
  # ===========================================
  prometheus:
    image: prom/prometheus:latest
    container_name: gladlabs-prometheus
    restart: unless-stopped
    ports:
      - "9091:9090"
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3

  grafana:
    image: grafana/grafana-oss:latest
    container_name: gladlabs-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:?Set GRAFANA_PASSWORD in .env}
      GF_INSTALL_PLUGINS: grafana-clock-panel
      LOCAL_POSTGRES_PASSWORD: ${LOCAL_POSTGRES_PASSWORD:?LOCAL_POSTGRES_PASSWORD must be set}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning
      - ./infrastructure/grafana/dashboards:/etc/grafana/dashboards
    depends_on:
      postgres-local:
        condition: service_healthy
      prometheus:
        condition: service_healthy

  # ===========================================
  # Gitea — self-hosted git (replaces GitHub)
  # ===========================================
  gitea:
    image: gitea/gitea:latest
    container_name: gladlabs-gitea
    restart: unless-stopped
    ports:
      - "3001:3000"
      - "2222:22"
    environment:
      USER_UID: 1000
      USER_GID: 1000
      GITEA__database__DB_TYPE: postgres
      GITEA__database__HOST: postgres-local:5432
      GITEA__database__NAME: gladlabs_brain
      GITEA__database__USER: gladlabs
      GITEA__database__PASSWD: ${LOCAL_POSTGRES_PASSWORD:?LOCAL_POSTGRES_PASSWORD must be set}
      GITEA__server__ROOT_URL: http://localhost:3001
      GITEA__server__SSH_DOMAIN: localhost
      GITEA__server__SSH_PORT: 2222
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - gitea-data:/data
    depends_on:
      postgres-local:
        condition: service_healthy

  # ===========================================
  # Woodpecker CI — pipelines (replaces GitHub Actions)
  # ===========================================
  woodpecker-server:
    image: woodpeckerci/woodpecker-server:next
    container_name: gladlabs-woodpecker
    restart: unless-stopped
    ports:
      - "8280:8000"
    environment:
      WOODPECKER_OPEN: "true"
      WOODPECKER_HOST: ${WOODPECKER_HOST:-http://localhost:8280}
      WOODPECKER_GITEA: "true"
      WOODPECKER_GITEA_URL: http://gitea:3000
      WOODPECKER_GITEA_SKIP_VERIFY: "true"
      WOODPECKER_GITEA_CLIENT: ${WOODPECKER_GITEA_CLIENT:-change-me}
      WOODPECKER_GITEA_SECRET: ${WOODPECKER_GITEA_SECRET:-change-me}
      WOODPECKER_SECRET: ${WOODPECKER_SECRET:?Set in .env}
      WOODPECKER_ADMIN: gladlabs
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "localhost:host-gateway"
    volumes:
      - woodpecker-data:/var/lib/woodpecker
    depends_on:
      - gitea

  woodpecker-agent:
    image: woodpeckerci/woodpecker-agent:next
    container_name: gladlabs-woodpecker-agent
    restart: unless-stopped
    environment:
      WOODPECKER_SERVER: woodpecker-server:9000
      WOODPECKER_AGENT_SECRET: "ZSUZYFMJVQBIUKMC7NVEAFL536C37XUYIRKGR4BUPJQACQCNDI4Q===="
      WOODPECKER_BACKEND_DOCKER_NETWORK: glad-labs-website_default
      WOODPECKER_BACKEND_DOCKER_EXTRA_HOSTS: "localhost:host-gateway"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - woodpecker-server

  # ===========================================
  # Brain Daemon — standalone monitor, self-healer, knowledge graph
  # ===========================================
  brain-daemon:
    build:
      context: ./brain
      dockerfile: Dockerfile
    container_name: gladlabs-brain-daemon
    restart: unless-stopped
    environment:
      # Primary DB is local Postgres.
      DATABASE_URL: "postgresql://${LOCAL_POSTGRES_USER:-gladlabs}:${LOCAL_POSTGRES_PASSWORD:?LOCAL_POSTGRES_PASSWORD must be set}@postgres-local:5432/${LOCAL_POSTGRES_DB:-gladlabs_brain}"
      # CLOUD_DATABASE_URL removed — Railway eliminated. All data on local Postgres + R2.
      # No Telegram tokens — OpenClaw owns Telegram/Discord connections
      API_URL: "http://worker:8002"
      WORKER_API_URL: "http://worker:8002"
      SITE_URL: ${SITE_URL:-https://www.gladlabs.io}
      OLLAMA_URL: "http://host.docker.internal:11434"
      GRAFANA_URL: "http://grafana:3000"
      GRAFANA_PASSWORD: ${GRAFANA_PASSWORD:?GRAFANA_PASSWORD must be set}
      GITEA_URL: "http://gitea:3000"
      GITEA_USER: ${GITEA_USER:-gladlabs}
      GITEA_PASS: ${GITEA_PASSWORD:-}
      IN_DOCKER: "true"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres-local:
        condition: service_healthy

  # ===========================================
  # Content Pipeline Worker — claims tasks, runs Ollama inference
  # ===========================================
  worker:
    build:
      context: ./src/cofounder_agent
      dockerfile: Dockerfile.worker
    container_name: gladlabs-worker
    restart: unless-stopped
    ports:
      - "8002:8002"
    environment:
      DEPLOYMENT_MODE: worker
      ENVIRONMENT: production
      DEVELOPMENT_MODE: "true"
      PORT: "8002"
      # Secrets loaded from DB (app_settings) at startup — no env vars needed
      # Primary DB is local Postgres.
      DATABASE_URL: "postgresql://${LOCAL_POSTGRES_USER:-gladlabs}:${LOCAL_POSTGRES_PASSWORD:?LOCAL_POSTGRES_PASSWORD must be set}@postgres-local:5432/${LOCAL_POSTGRES_DB:-gladlabs_brain}"
      # CLOUD_DATABASE_URL removed — Railway eliminated. All data on local Postgres + R2.
      OLLAMA_BASE_URL: "http://host.docker.internal:11434"
      PEXELS_API_KEY: ${PEXELS_API_KEY:-}
      DEFAULT_OLLAMA_MODEL: ${DEFAULT_OLLAMA_MODEL:-auto}
      # No Telegram tokens — OpenClaw owns Telegram/Discord connections
      SITE_NAME: ${SITE_NAME:-Glad Labs}
      SITE_DOMAIN: ${SITE_DOMAIN:-gladlabs.io}
      SITE_URL: ${SITE_URL:-https://www.gladlabs.io}
      API_BASE_URL: ${API_BASE_URL:-http://localhost:8002}
      COMPANY_NAME: ${COMPANY_NAME:-Glad Labs}
      HOST_HOME: ${HOST_HOME:-${USERPROFILE:-/root}}
      API_TOKEN: ${API_TOKEN:?API_TOKEN must be set}
    volumes:
      - ${USERPROFILE:-.}/.poindexter:/root/.poindexter
      - ${USERPROFILE:-.}/Downloads/glad-labs-generated-images:/root/Downloads/glad-labs-generated-images
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres-local:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/api/health')"]
      interval: 60s
      timeout: 10s
      retries: 3

  # ===========================================
  # pgAdmin — PostgreSQL web UI
  # ===========================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: gladlabs-pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@localhost}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:?PGADMIN_PASSWORD must be set}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
      - ./infrastructure/pgadmin/servers.json:/pgadmin4/servers.json:ro
      - ./infrastructure/pgadmin/pgpass:/tmp/pgpass_src:ro
    entrypoint: >
      /bin/sh -c "
      cp /tmp/pgpass_src /tmp/pgpass &&
      chmod 0600 /tmp/pgpass &&
      /entrypoint.sh
      "
    depends_on:
      postgres-local:
        condition: service_healthy

volumes:
  postgres-local-data:
    name: gladlabs-postgres-local-data
  grafana-data:
    name: gladlabs-grafana-data
  gitea-data:
    name: gladlabs-gitea-data
  woodpecker-data:
    name: gladlabs-woodpecker-data
  headscale-data:
    name: gladlabs-headscale-data
  prometheus-data:
    name: gladlabs-prometheus-data
  pgadmin-data:
    name: gladlabs-pgadmin-data
