apiVersion: 1

datasources:
  - name: Local Brain DB
    uid: local-brain-db
    type: grafana-postgresql-datasource
    access: proxy
    url: postgres-local:5432
    database: poindexter_brain
    user: poindexter
    secureJsonData:
      password: $__env{LOCAL_POSTGRES_PASSWORD}
    jsonData:
      sslmode: disable
      postgresVersion: 1600
      defaultDatabase: poindexter_brain
    isDefault: true
    editable: true
