name: 🚀 Create GitHub Release (Main Only)

on:
    push:
        branches:
            - main
        tags:
            - "v*"

permissions:
    contents: write

jobs:
    create-release:
        runs-on: ubuntu-latest

        # Only run when pushed to main (not on tags themselves)
        if: github.ref == 'refs/heads/main'

        steps:
            - name: 📥 Checkout code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: 📖 Get latest tag
              id: latest-tag
              run: |
                  TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "no-tag")
                  echo "tag=$TAG" >> $GITHUB_OUTPUT
                  echo "Latest tag: $TAG"

            - name: 📝 Generate release notes
              id: release-notes
              run: |
                  TAG="${{ steps.latest-tag.outputs.tag }}"

                  if [ "$TAG" = "no-tag" ]; then
                    # First release
                    COMMITS=$(git log --oneline --format="- %s")
                  else
                    # Release notes since last tag
                    COMMITS=$(git log $TAG..HEAD --oneline --format="- %s")
                  fi

                  # Escape multi-line output
                  COMMITS="${COMMITS//'%'/'%25'}"
                  COMMITS="${COMMITS//$'\n'/'%0A'}"
                  COMMITS="${COMMITS//$'\r'/'%0D'}"

                  echo "commits<<EOF" >> $GITHUB_OUTPUT
                  echo "$COMMITS" >> $GITHUB_OUTPUT
                  echo "EOF" >> $GITHUB_OUTPUT

            - name: 🚀 Create GitHub Release
              uses: actions/create-release@v1
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  tag_name: ${{ steps.latest-tag.outputs.tag }}
                  release_name: Release ${{ steps.latest-tag.outputs.tag }}
                  body: |
                      ## Changes in this release
                      ${{ steps.release-notes.outputs.commits }}
                  draft: false
                  prerelease: false
