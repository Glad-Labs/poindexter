name: 🔙 Emergency Version Rollback

on:
    workflow_dispatch:
        inputs:
            rollback_to:
                description: "Version to rollback to (e.g., 3.0.1)"
                required: true
                type: string
            reason:
                description: "Reason for rollback"
                required: false
                type: string

permissions:
    contents: write

jobs:
    rollback:
        runs-on: ubuntu-latest

        steps:
            - name: 📥 Checkout code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: 🔧 Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "22"

            - name: 🔐 Configure git
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

            - name: 🔙 Rollback version
              run: |
                  ROLLBACK_VERSION="${{ inputs.rollback_to }}"
                  REASON="${{ inputs.reason || 'Emergency rollback' }}"

                  # Update all version files to rollback version
                  node scripts/bump-version.js \
                    --force-version "$ROLLBACK_VERSION" \
                    --skip-git

            - name: 📦 Commit rollback
              run: |
                  git add .
                  git commit -m "chore: rollback version to ${{ inputs.rollback_to }} - ${{ inputs.reason || 'Emergency rollback' }} [skip ci]"

            - name: 🏷️ Create rollback tag
              run: |
                  git tag -a v${{ inputs.rollback_to }}-rollback -m "Rollback to ${{ inputs.rollback_to }}"

            - name: 📤 Push changes
              run: |
                  git push origin ${{ github.ref }}
                  git push origin --tags

            - name: ✅ Rollback complete
              run: |
                  echo "✅ Rolled back to version ${{ inputs.rollback_to }}"
                  echo "📋 Reason: ${{ inputs.reason || 'Emergency rollback' }}"
                  echo "🔗 Tag: v${{ inputs.rollback_to }}-rollback"
