name: CodeQL

# Static-analysis security scanner from GitHub. Free on public repos —
# the public Glad-Labs/poindexter mirror gets it; the private
# glad-labs-stack does not (would require GitHub Advanced Security at
# $49/seat/month, intentionally not enabled per the asymmetric-repo
# strategy).
#
# Same `if:` conditional pattern as release-please.yml — the workflow
# file mirrors to the public repo via sync-to-github.sh, but only
# actually executes there because of the repository-name check.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly re-scan catches new CodeQL rules + transitive issues.
    - cron: '23 4 * * 2'

# Cancel older in-progress runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    if: github.repository == 'Glad-Labs/poindexter'

    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript-typescript]

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1 as of 2026-05-12

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7fd177fa680c9881b53cdab4d346d32574c9f7f4  # v3.35.4 as of 2026-05-12
        with:
          languages: ${{ matrix.language }}
          # Default queries + the security-extended pack catch more
          # without false-positive overload from security-and-quality.
          queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@7fd177fa680c9881b53cdab4d346d32574c9f7f4  # v3.35.4 as of 2026-05-12
        with:
          category: "/language:${{ matrix.language }}"
