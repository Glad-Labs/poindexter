name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the problem or use case.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you solve it? Include technical details if you have them.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about.
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Content Pipeline
        - Quality / QA
        - Publishing / Export
        - Monitoring / Grafana
        - Brain Daemon
        - MCP Server
        - Docker / Infrastructure
        - Documentation
        - Other
    validations:
      required: true
