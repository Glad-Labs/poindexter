apiVersion: 1

datasources:
  - name: Local Brain DB
    type: postgres
    access: proxy
    url: postgres-local:5432
    database: gladlabs_brain
    user: gladlabs
    secureJsonData:
      password: gladlabs-brain-local
    jsonData:
      sslmode: disable
      maxOpenConns: 10
      maxIdleConns: 5
      connMaxLifetime: 14400
      postgresVersion: 1600
      timescaledb: false
    isDefault: true
    editable: true
