name: CI — Test & Deploy

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Install Python dependencies
        run: |
          cd src/cofounder_agent
          poetry config virtualenvs.create false
          poetry install --no-root --no-interaction

      - name: Unit tests — agents
        run: |
          cd src/cofounder_agent
          python -m pytest tests/unit/agents/ -q --tb=short -p no:cacheprovider

      - name: Unit tests — middleware
        run: |
          cd src/cofounder_agent
          python -m pytest tests/unit/middleware/ -q --tb=short -p no:cacheprovider

      - name: Unit tests — routes
        run: |
          cd src/cofounder_agent
          python -m pytest tests/unit/routes/ -q --tb=short -p no:cacheprovider

      - name: Unit tests — services (forked)
        run: |
          cd src/cofounder_agent
          python -m pytest tests/unit/services/ -q --tb=short --forked \
            --ignore=tests/unit/services/test_memory_client.py \
            --ignore=tests/unit/services/test_memory_system.py \
            --ignore=tests/unit/services/test_web_research.py \
            -p no:cacheprovider

      - name: Unit tests — utils
        run: |
          cd src/cofounder_agent
          python -m pytest tests/unit/utils/ -q --tb=short -p no:cacheprovider

      - name: Integration tests
        run: |
          cd src/cofounder_agent
          python -m pytest tests/integration/ -q --tb=short -p no:cacheprovider

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci

      - name: Frontend tests
        run: npm test

  deploy:
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://www.gladlabs.io

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci

      - name: Deploy to Vercel
        run: |
          npx vercel deploy --prod \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --scope=${{ secrets.VERCEL_ORG_ID }} \
            --yes
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.PUBLIC_SITE_PROD_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}

      - name: Smoke test
        run: |
          sleep 30
          curl -sf --retry 3 --retry-delay 10 "https://www.gladlabs.io" > /dev/null && echo "Site is up" || echo "Site not ready"
        continue-on-error: true

      - name: Telegram — Success
        if: success()
        run: |
          COMMIT_SHA=$(git rev-parse --short HEAD)
          COMMIT_MSG=$(git log -1 --pretty=format:'%s')
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="Markdown" \
            -d text="Deployed to Production

          Commit: ${COMMIT_SHA} — ${COMMIT_MSG}

          Vercel deploy complete.

          [View Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
        continue-on-error: true

      - name: Telegram — Failure
        if: failure()
        run: |
          COMMIT_SHA=$(git rev-parse --short HEAD)
          COMMIT_MSG=$(git log -1 --pretty=format:'%s')
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="Markdown" \
            -d text="Deploy FAILED

          Commit: ${COMMIT_SHA} — ${COMMIT_MSG}

          [View Logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
        continue-on-error: true
