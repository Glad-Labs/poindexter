# Glad Labs — Self-Hosted Operations Stack
# Everything local, open source, $0/month
#
# Start all:  docker compose -f docker-compose.local.yml up -d
# Start core: docker compose -f docker-compose.local.yml up -d postgres-local grafana headscale
# Start git:  docker compose -f docker-compose.local.yml up -d gitea woodpecker-server woodpecker-agent

services:
  # ===========================================
  # Headscale — self-hosted Tailscale (replaces Tailscale cloud)
  # ===========================================
  headscale:
    image: headscale/headscale:latest
    container_name: gladlabs-headscale
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "9090:9090"
    command: serve
    volumes:
      - headscale-data:/var/lib/headscale
      - ./infrastructure/headscale/config.yaml:/etc/headscale/config.yaml
      - ./infrastructure/headscale/certs:/etc/headscale/certs
    healthcheck:
      test: ["CMD", "headscale", "health"]
      interval: 30s
      timeout: 5s
      retries: 3

  postgres-local:
    image: pgvector/pgvector:pg16
    container_name: gladlabs-postgres-local
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: gladlabs_brain
      POSTGRES_USER: gladlabs
      POSTGRES_PASSWORD: gladlabs-brain-local
    volumes:
      - postgres-local-data:/var/lib/postgresql/data
      - ./infrastructure/local-db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gladlabs"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana-oss:latest
    container_name: gladlabs-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: gladlabs
      GF_INSTALL_PLUGINS: grafana-clock-panel
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning
      - ./infrastructure/grafana/dashboards:/etc/grafana/dashboards
    depends_on:
      postgres-local:
        condition: service_healthy

  # ===========================================
  # Gitea — self-hosted git (replaces GitHub)
  # ===========================================
  gitea:
    image: gitea/gitea:latest
    container_name: gladlabs-gitea
    restart: unless-stopped
    ports:
      - "3001:3000"
      - "2222:22"
    environment:
      USER_UID: 1000
      USER_GID: 1000
      GITEA__database__DB_TYPE: postgres
      GITEA__database__HOST: postgres-local:5432
      GITEA__database__NAME: gladlabs_brain
      GITEA__database__USER: gladlabs
      GITEA__database__PASSWD: gladlabs-brain-local
      GITEA__server__ROOT_URL: http://localhost:3001
      GITEA__server__SSH_DOMAIN: localhost
      GITEA__server__SSH_PORT: 2222
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - gitea-data:/data
    depends_on:
      postgres-local:
        condition: service_healthy

  # ===========================================
  # Woodpecker CI — pipelines (replaces GitHub Actions)
  # ===========================================
  woodpecker-server:
    image: woodpeckerci/woodpecker-server:v3
    container_name: gladlabs-woodpecker
    restart: unless-stopped
    ports:
      - "8280:8000"
    environment:
      WOODPECKER_OPEN: "true"
      WOODPECKER_HOST: http://localhost:8280
      WOODPECKER_GITEA: "true"
      WOODPECKER_GITEA_URL: http://localhost:3001
      WOODPECKER_GITEA_SKIP_VERIFY: "true"
      WOODPECKER_GITEA_CLIENT: "0efd0251-1892-47e7-b434-a2b5df4d250b"
      WOODPECKER_GITEA_SECRET: "***REMOVED***"
      WOODPECKER_SECRET: ***REMOVED***
      WOODPECKER_ADMIN: gladlabs
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "localhost:host-gateway"
    volumes:
      - woodpecker-data:/var/lib/woodpecker
    depends_on:
      - gitea

  woodpecker-agent:
    image: woodpeckerci/woodpecker-agent:v3
    container_name: gladlabs-woodpecker-agent
    restart: unless-stopped
    environment:
      WOODPECKER_SERVER: woodpecker-server:9000
      WOODPECKER_AGENT_SECRET: "***REMOVED***"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - woodpecker-server

  # ===========================================
  # Content Pipeline Worker — claims tasks, runs Ollama inference
  # ===========================================
  worker:
    build:
      context: ./src/cofounder_agent
      dockerfile: Dockerfile.worker
    container_name: gladlabs-worker
    restart: unless-stopped
    ports:
      - "8002:8002"
    environment:
      DEPLOYMENT_MODE: worker
      ENVIRONMENT: production
      PORT: "8002"
      DATABASE_URL: "postgresql://postgres:***REMOVED***@hopper.proxy.rlwy.net:32382/railway"
      LOCAL_DATABASE_URL: "postgresql://gladlabs:gladlabs-brain-local@postgres-local:5432/gladlabs_brain"
      OLLAMA_BASE_URL: "http://host.docker.internal:11434"
      SITE_NAME: "Glad Labs"
      SITE_DOMAIN: "gladlabs.io"
      SITE_URL: "https://www.gladlabs.io"
      API_BASE_URL: "https://cofounder-production.up.railway.app"
      COMPANY_NAME: "Glad Labs"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres-local:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/api/health')"]
      interval: 60s
      timeout: 10s
      retries: 3

volumes:
  postgres-local-data:
    name: gladlabs-postgres-local-data
  grafana-data:
    name: gladlabs-grafana-data
  gitea-data:
    name: gladlabs-gitea-data
  woodpecker-data:
    name: gladlabs-woodpecker-data
  headscale-data:
    name: gladlabs-headscale-data
