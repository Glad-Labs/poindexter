# Frontend Jest gate (Glad-Labs/poindexter#1290). web/public-site holds 464
# Jest tests that executed NOWHERE on the path to production — no CI job ran
# them, the pre-commit hook only lints, and Vercel deploys the revenue surface
# (AdSense / affiliate links / page-view beacon) on every push with no test
# gate. This job activates them on any PR/push that touches the public site.
#
# Path-filtered (NOT a required branch-protection check). A required check
# can't be path-filtered — it would never report on PRs outside the path and
# block merge forever (see the unit-tests.yml header for that reasoning). This
# gate's purpose is to RUN the dormant tests on frontend changes; promoting it
# to a required gate later would mean switching to the always-run + internal
# change-detection + skip-as-success pattern unit-tests.yml uses.
name: jest-unit

on:
  push:
    branches: [main]
    paths:
      - "web/public-site/**"
      - ".github/workflows/jest-unit.yml"
  pull_request:
    branches: [main]
    paths:
      - "web/public-site/**"
      - ".github/workflows/jest-unit.yml"

# Cancel superseded in-progress runs on the same PR/ref to save Actions minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  jest-unit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4.3.1 as of 2026-05-12

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24" # root package.json engines: node >=24.0.0
          cache: "npm"

      # Root install brings up the public-site workspace (and its jest +
      # jest-environment-jsdom devDeps). web/public-site is gitignored-but-tracked,
      # so the CI checkout has the source even though local .gitignore-aware tools
      # may skip it (see reference: public-site gitignored-but-tracked).
      - name: Install dependencies
        run: npm ci

      # test:ci is the repo's canonical CI jest entry:
      #   jest --ci --coverage --watchAll=false --maxWorkers=2  (on web/public-site)
      # Keeping the behavior in package.json (not duplicated here) means the job
      # tracks the script. A failing test fails the job — that's the whole point.
      - name: Jest — web/public-site
        run: npm run test:ci
