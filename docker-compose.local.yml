# Poindexter — Self-Hosted Operations Stack
# Everything local, open source, $0/month
#
# Start all:  docker compose -f docker-compose.local.yml up -d
# Start core: docker compose -f docker-compose.local.yml up -d postgres-local grafana

services:
  postgres-local:
    image: pgvector/pgvector:pg16
    container_name: poindexter-postgres-local
    restart: unless-stopped
    ports:
      # Host publish for host-side tools only (poindexter CLI, start-stack token
      # helpers). In-container services reach the DB at postgres-local:5432 and are
      # unaffected by this mapping. The host port is operator-tunable because
      # Windows (Hyper-V/WSL) dynamically reserves TCP ranges that shift across
      # updates: 15432 landed inside a reserved range (15424-15523) and became
      # unbindable (WSAEACCES), silently dropping the publish. Default 5433 (low,
      # outside the Hyper-V grabs); override via POSTGRES_HOST_PORT in bootstrap.toml
      # if it's reserved on your box (`netsh int ipv4 show excludedportrange
      # protocol=tcp`). Keep in sync with the port in bootstrap.toml's database_url.
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    environment:
      POSTGRES_DB: ${LOCAL_POSTGRES_DB:-poindexter_brain}
      POSTGRES_USER: ${LOCAL_POSTGRES_USER:-poindexter}
      POSTGRES_PASSWORD: ${LOCAL_POSTGRES_PASSWORD:?Run 'poindexter setup' — LOCAL_POSTGRES_PASSWORD is generated in bootstrap.toml}
    command:
      - "postgres"
      # GH-92: max_connections raised from the 100 default to 300. Each
      # connection is ~5-10 MB resident, so 300 × ~10 MB ≈ 1.5-3 GB worst
      # case — well within the 64 GB host budget. Headroom reasoning:
      #   worker primary pool  (max)        = 50
      #   worker local pool    (max)        = 20
      #   brain-daemon                       = 3
      #   auto-embed                         = 4
      #   memory client per tap (shared)     = ~5
      #   gitea / pgadmin / psql ad-hoc      = ~10
      #   ancillary (voice-bot, sdxl, etc.)  = ~10
      #   --- steady state ~100, transient peaks to ~150 under stress.
      # 300 gives 2× headroom for concurrent stress tests + future SaaS
      # auth fan-out. Revisit if pgbouncer is added (deferred, GH-92).
      - "-c"
      - "max_connections=300"
      - "-c"
      - "shared_buffers=512MB"
      - "-c"
      - "effective_cache_size=2GB"
      - "-c"
      - "work_mem=8MB"
      - "-c"
      - "maintenance_work_mem=128MB"
      - "-c"
      - "checkpoint_timeout=10min"
      - "-c"
      - "max_wal_size=2GB"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "shared_preload_libraries=pg_stat_statements"
      - "-c"
      - "pg_stat_statements.track=all"
    shm_size: "256mb"
    # poindexter#328: ``init.sql`` was deleted — the schema it created
    # (pgvector + pg_trgm + pg_stat_statements extensions, plus the
    # embeddings / audit_log / system_devices / gpu_metrics /
    # affiliate_links tables) lives in
    # ``services/migrations/0000_baseline.schema.sql`` which the
    # migrations runner applies on first boot via ``0000_baseline.py``.
    # Both used ``IF NOT EXISTS`` so the rip-out is idempotent on
    # existing databases.
    volumes:
      - postgres-local-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "psql -U ${LOCAL_POSTGRES_USER:-poindexter} -d ${LOCAL_POSTGRES_DB:-poindexter_brain} -c 'SELECT 1' > /dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================
  # Prometheus — scrapes nvidia-smi exporter for GPU metrics
  # ===========================================
  prometheus:
    image: prom/prometheus:v3.11.3
    container_name: poindexter-prometheus
    restart: unless-stopped
    # Startup sidecar: chmod the shared rules volume world-writable so
    # RenderPrometheusRulesJob (runs as appuser uid 1001 in the worker)
    # can drop dynamic.yml into it. Fresh Docker volumes come owned by
    # root with 0755 perms, which would lock the worker out otherwise.
    user: root
    entrypoint: ["sh", "-c", "chmod 0777 /etc/prometheus/rules && exec /bin/prometheus --config.file=/etc/prometheus/prometheus.yml --storage.tsdb.path=/prometheus --web.console.libraries=/usr/share/prometheus/console_libraries --web.console.templates=/usr/share/prometheus/consoles --web.enable-lifecycle --web.enable-remote-write-receiver"]
    ports:
      - "9091:9090"
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infrastructure/prometheus/alerts:/etc/prometheus/alerts:ro
      - prometheus-rules:/etc/prometheus/rules
      - prometheus-data:/prometheus
      # Uptime Kuma metrics API key (and any future scrape secrets)
      # written by brain/prometheus_secret_writer.py from app_settings.
      # See brain-daemon's volumes block — same host dir, mounted rw
      # there and ro here.
      - ./infrastructure/prometheus/secrets:/etc/prometheus/secrets:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Alertmanager — Phase D (GitHub #68) + dead-man's switch (#524).
  # Consumes Prometheus alert rules, routes them to Telegram/Discord webhooks.
  # Brain daemon will subscribe to the webhook endpoint for auto-remediation
  # once parallel-run with legacy probes is verified.
  #
  # #524: the config file is no longer the committed repo YAML — it is
  # RENDERED by RenderAlertmanagerConfigJob (in the worker) from
  # alertmanager.yml.tmpl into the shared `alertmanager-config` volume (the
  # template carries a ${ALERTMANAGER_TELEGRAM_CHAT_ID} placeholder so a
  # real chat_id never lands in the public mirror). Mirrors how
  # prometheus-rules is shared between worker (writer) and prometheus
  # (reader). The startup sidecar chmods the dir + seeds a minimal config
  # so Alertmanager can boot before the first render lands (≤5 min).
  alertmanager:
    image: prom/alertmanager:v0.32.1
    container_name: poindexter-alertmanager
    restart: unless-stopped
    user: root
    entrypoint:
      - "sh"
      - "-c"
      - >-
        chmod 0777 /etc/alertmanager/config
        && [ -f /etc/alertmanager/config/alertmanager.yml ]
        || printf 'route:\n  receiver: poindexter-webhook\nreceivers:\n  - name: poindexter-webhook\n' > /etc/alertmanager/config/alertmanager.yml
        && exec /bin/alertmanager
        --config.file=/etc/alertmanager/config/alertmanager.yml
        --storage.path=/alertmanager
    ports:
      - "9093:9093"
    volumes:
      # Rendered config dir — RenderAlertmanagerConfigJob (worker) writes
      # alertmanager.yml here; Alertmanager reads it. POST /-/reload picks
      # up changes without a restart (Alertmanager enables it by default —
      # unlike Prometheus, it has NO --web.enable-lifecycle flag).
      - alertmanager-config:/etc/alertmanager/config
      - alertmanager-data:/alertmanager
      # Bearer token for the Poindexter webhook receiver. Must match
      # app_settings.alertmanager_webhook_token. Rotate via:
      #   UPDATE app_settings ... ; echo -n <new> > file ; docker restart poindexter-alertmanager
      - ${USERPROFILE:-.}/.poindexter/alertmanager-webhook-token:/etc/alertmanager/webhook-token:ro
      # #524 — native-Telegram bot token for the dead-man's-switch receiver.
      # The whole prometheus secrets dir is mounted ro (same host dir the
      # prometheus container mounts). brain/prometheus_secret_writer.py
      # decrypts app_settings.telegram_bot_token (is_secret=true) and writes
      # it to `alertmanager-telegram-token` in this dir every brain cycle,
      # alongside the uptime-kuma key. alertmanager.yml.tmpl's
      # bot_token_file points at the file below. No plaintext token in git.
      # Mounting the dir (not a single file) avoids the "Docker creates a
      # directory when the bind source doesn't exist yet" bootstrap trap.
      - ./infrastructure/prometheus/secrets:/etc/alertmanager/secrets:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3

  grafana:
    image: grafana/grafana-oss:13.0.1
    container_name: poindexter-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:?Run 'poindexter setup' or 'bash scripts/start-stack.sh'}
      GF_INSTALL_PLUGINS: grafana-clock-panel
      LOCAL_POSTGRES_PASSWORD: ${LOCAL_POSTGRES_PASSWORD:?Run 'poindexter setup' — LOCAL_POSTGRES_PASSWORD is generated in bootstrap.toml}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      DISCORD_OPS_WEBHOOK_URL: ${DISCORD_OPS_WEBHOOK_URL:-}
      # Pre-issued long-TTL JWT for the Poindexter Webhook contact point's
      # Authorization header (finding #2, 2026-05-19 jank-audit fix).
      # Substituted into provisioning/alerting/contact-points.yml so
      # Grafana posts authenticated to
      # ``http://worker:8002/api/webhooks/alertmanager``. Decrypted from
      # ``app_settings.grafana_webhook_oauth_jwt`` by
      # ``bash scripts/start-stack.sh`` before docker-compose up. Empty
      # fallback so fresh installs without a minted JWT still boot;
      # webhook calls then 401 loudly until the operator runs
      # ``poindexter auth mint-grafana-token --persist``.
      GRAFANA_WEBHOOK_TOKEN: ${GRAFANA_WEBHOOK_TOKEN:-}
    env_file:
      # Auto-managed by scripts/start-stack.sh. Holds the decrypted
      # GRAFANA_WEBHOOK_TOKEN so plain ``docker restart`` /
      # ``docker compose up -d`` (outside start-stack.sh) still
      # picks up the JWT instead of falling back to the empty
      # default (which causes ~200 401s/day on the worker — see
      # Glad-Labs/glad-labs-stack#231 hardening of the 2026-05-27
      # alertmanager-spam fix).
      #
      # The ``required: false`` flag keeps fresh installs from
      # crashing when the file doesn't exist yet (first
      # start-stack.sh run creates it).
      - path: .poindexter-grafana.env
        required: false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning
      - ./infrastructure/grafana/dashboards:/etc/grafana/dashboards
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      postgres-local:
        condition: service_healthy
      prometheus:
        condition: service_healthy

  # ===========================================
  # Brain Daemon — standalone monitor, self-healer, knowledge graph
  # ===========================================
  brain-daemon:
    build:
      context: ./brain
      dockerfile: Dockerfile
    container_name: poindexter-brain-daemon
    restart: unless-stopped
    # Run as root so the brain can read the host's docker.sock (root-owned
    # on Docker Desktop). The Dockerfile creates appuser:docker, but on
    # Docker Desktop the in-container socket is `srw-rw---- root:root`,
    # so docker-group membership doesn't help. Without root the
    # compose-drift + restart paths silently lose access (PR #141 added
    # a pre-flight check that surfaces this clearly). Brain already has
    # docker-socket-equivalent privilege via the bind-mount, so root vs
    # appuser is no real security boundary in this container.
    user: "0:0"
    environment:
      # Primary DB is local Postgres.
      DATABASE_URL: "postgresql://${LOCAL_POSTGRES_USER:-poindexter}:${LOCAL_POSTGRES_PASSWORD:?Run 'poindexter setup' — LOCAL_POSTGRES_PASSWORD is generated in bootstrap.toml}@postgres-local:5432/${LOCAL_POSTGRES_DB:-poindexter_brain}"
      # Postgres component vars — needed so compose_drift_probe can run
      # `docker compose up` from inside the container. compose parses the
      # whole file (not just the target service) and hits the :? sentinel on
      # every DATABASE_URL / DATA_SOURCE_NAME if these aren't in scope.
      LOCAL_POSTGRES_PASSWORD: ${LOCAL_POSTGRES_PASSWORD:?Run 'poindexter setup' — LOCAL_POSTGRES_PASSWORD is generated in bootstrap.toml}
      LOCAL_POSTGRES_USER: ${LOCAL_POSTGRES_USER:-poindexter}
      LOCAL_POSTGRES_DB: ${LOCAL_POSTGRES_DB:-poindexter_brain}
      # CLOUD_DATABASE_URL removed — Railway eliminated. All data on local Postgres + R2.
      # No Telegram tokens — OpenClaw owns Telegram/Discord connections
      API_URL: "http://worker:8002"
      WORKER_API_URL: "http://worker:8002"
      SITE_URL: ${SITE_URL:-https://www.gladlabs.io}
      OLLAMA_URL: "http://host.docker.internal:11434"
      GRAFANA_URL: "http://grafana:3000"
      GRAFANA_PASSWORD: ${GRAFANA_PASSWORD:?Run 'poindexter setup' — GRAFANA_PASSWORD is generated in bootstrap.toml}
      # GITEA_* env vars removed — brain now reads gitea_url/user/password
      # from app_settings and translates URLs with docker_utils.localize_url
      # when IN_DOCKER=true (GitHub #61). Other URLs (API, OLLAMA, GRAFANA)
      # are separately tracked for the same DB-first treatment.
      DISCORD_LAB_LOGS_WEBHOOK_URL: ${DISCORD_LAB_LOGS_WEBHOOK_URL:-}
      DISCORD_OPS_WEBHOOK_URL: ${DISCORD_OPS_WEBHOOK_URL:-}
      IN_DOCKER: "true"
      # Mirror of bootstrap.toml poindexter_secret_key — needed so the
      # brain can read is_secret=true rows via get_secret().
      POINDEXTER_SECRET_KEY: ${POINDEXTER_SECRET_KEY:?Set POINDEXTER_SECRET_KEY in .env}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Glad-Labs/poindexter#456 — the historical `- ./brain:/brain:ro`
      # mount was decorative: brain_daemon imports use bare-name form
      # (e.g. `from operator_url_probe import ...`), which resolves
      # against `/app` (WORKDIR), not `/brain`. The bind-mount made it
      # LOOK like host-side edits to brain/ were live, but Python always
      # loaded the image-baked copy at /app/ — leading to 30+ min
      # debug-edit-restart cycles that never picked up the change. We
      # now require a `docker compose build brain-daemon` (or full
      # `up --build`) for every brain code edit, matching how every
      # other container in the stack works. The same `./brain` directory
      # is still mounted as `/opt/poindexter/brain:ro` in OTHER services
      # (worker, voice agents, etc.) where it IS on PYTHONPATH and the
      # bind-mount is functional.
      # GH#213 — compose-spec drift probe needs to read the compose file
      # to compare against `docker inspect` for each service. Read-only —
      # the brain only inspects, it never edits the spec.
      - ./docker-compose.local.yml:/app/docker-compose.local.yml:ro
      # glad-labs-stack#942 — read-only host .git so brain/branch_drift_probe.py
      # can read the running checkout's HEAD SHA (the one fact nothing else in a
      # container can supply) and detect when prod has fallen behind origin/main.
      # Top-level mount — NOT the forbidden ./.git:/app/.git:ro WORKER mount
      # (that one broke under the worker's :ro /app via overlayfs child-mount
      # rejection, #348). The brain's /app is the image filesystem, not a :ro
      # bind, and the brain runs as root, so a read-only .git mount here is safe.
      # Read-only on purpose: the probe never fetches/writes; it reads local HEAD
      # and gets origin/main from the GitHub API.
      - ${POINDEXTER_DEPLOY_ROOT:-.}/.git:/host-git:ro
      # Brain writes Prometheus scrape secrets here (uptime_kuma_api_key
      # etc.) — see brain/prometheus_secret_writer.py. Same host dir is
      # mounted into the prometheus container at /etc/prometheus/secrets/
      # (ro), so prometheus.yml's password_file: directives resolve to
      # whatever brain wrote on its last cycle. Rotating a secret is just
      # `poindexter settings set <key> <new>`; brain syncs within 5 min.
      - ./infrastructure/prometheus/secrets:/host-prometheus/secrets:rw
      # Read-only mount of the host's pg_dump backup directory so
      # backup_watcher.py can age-check actual files. Without this the
      # watcher is blind: app_settings.backup_watcher_backup_dir points
      # at a host path that doesn't exist inside the brain container,
      # so the "backups stopped writing" alert never fires. Audit
      # 2026-05-08 (.shared-context/audits/2026-05-08-self-healing-...).
      # Pair with: setting backup_watcher_backup_dir to /host-backups/auto.
      - ${USERPROFILE:-${HOME}}/.poindexter/backups:/host-backups:ro
      # Glad-Labs/poindexter#444 — sentinel files dropped by the
      # host-side dr-backup scripts at ~/.poindexter/scripts/dr-backup/
      # when the script's primary Telegram alert path failed (creds
      # missing, postgres down, network broken). brain/backup_watcher.py
      # scans /host-backup-logs each cycle and surfaces any sentinels
      # via alert_events — second line of defense behind the in-stack
      # age check above. Pair with: app_settings.backup_watcher_sentinel_dir
      # = /host-backup-logs (default seeded by the migration).
      - ${USERPROFILE:-${HOME}}/.poindexter/logs:/host-backup-logs:ro
      # Glad-Labs/poindexter#228 — DEDICATED deploy checkout for the
      # migration-drift probe's genuine self-heal step. When
      # app_settings.migration_drift_auto_sync_enabled=true the probe runs
      # `git reset --hard origin/main` + `git clean -fd` HERE before
      # restarting the worker, so the restart applies correct, un-polluted
      # migration files (the 2026-06-07 drift storm was a stray untracked
      # scaffold polluting the live checkout). RW because the probe resets it;
      # SAFE because nothing else ever touches this checkout (no human, no
      # scheduled agent), so reset --hard can never clobber uncommitted work.
      # Ships DARK: auto_sync defaults false, and brain/migration_drift_probe.py
      # `_sync_deploy_checkout` guards with `git rev-parse --is-inside-work-tree`
      # — so until the operator runs scripts/setup-deploy-checkout.sh to clone
      # here, an empty auto-created dir simply makes sync a graceful no-op that
      # falls back to a plain restart. See docs/operations/migration-drift-self-heal.md.
      - ${USERPROFILE:-${HOME}}/.poindexter/deploy/glad-labs-stack:/host-deploy:rw
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import os,signal; os.kill(1, 0)' 2>/dev/null || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
    depends_on:
      postgres-local:
        condition: service_healthy

  # ===========================================
  # Content Pipeline Worker — claims tasks, runs Ollama inference
  # ===========================================
  worker:
    build:
      context: ./src/cofounder_agent
      dockerfile: Dockerfile.worker
    container_name: poindexter-worker
    restart: unless-stopped
    ports:
      - "8002:8002"
    environment:
      DEPLOYMENT_MODE: worker
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DEVELOPMENT_MODE: "true"
      PORT: "8002"
      # Secrets loaded from DB (app_settings) at startup — no env vars needed
      # Primary DB is local Postgres.
      DATABASE_URL: "postgresql://${LOCAL_POSTGRES_USER:-poindexter}:${LOCAL_POSTGRES_PASSWORD:?Run 'poindexter setup' — LOCAL_POSTGRES_PASSWORD is generated in bootstrap.toml}@postgres-local:5432/${LOCAL_POSTGRES_DB:-poindexter_brain}"
      # CLOUD_DATABASE_URL removed — Railway eliminated. All data on local Postgres + R2.
      OLLAMA_BASE_URL: "http://host.docker.internal:11434"
      # OLLAMA_URL was historically set separately because MemoryClient +
      # auto-embed only read OLLAMA_URL. GH#93 Phase 1: MemoryClient now
      # falls back to OLLAMA_BASE_URL when OLLAMA_URL isn't set, so the
      # duplicate is retired. Standalone CLI paths (outside the worker
      # container) can still set OLLAMA_URL directly if preferred.
      PEXELS_API_KEY: ${PEXELS_API_KEY:-}
      # No Telegram tokens — OpenClaw owns Telegram/Discord connections.
      # SITE_NAME / SITE_DOMAIN / SITE_URL / COMPANY_NAME / DEFAULT_OLLAMA_MODEL
      # are DB-first settings in app_settings (site_name, site_domain, site_url,
      # company_name, default_ollama_model). GH-93 audit 2026-04-21 confirmed
      # no code reads these env vars; removed from the worker env to keep the
      # "no env-var drift, app_settings is the single source" contract clean.
      API_BASE_URL: ${API_BASE_URL:-http://localhost:8002}
      HOST_HOME: ${HOST_HOME:-${USERPROFILE:-/root}}
      # OpenTelemetry — exposed as env vars so services/telemetry.py's
      # module-level setup_telemetry() call in main.py can wire the
      # FastAPIInstrumentor middleware BEFORE the FastAPI middleware
      # stack is finalised. Without these env vars, the module-load
      # setup_telemetry() reads the cold SiteConfig (no DB yet,
      # ENABLE_TRACING default 'false') and early-returns. The later
      # lifespan-time setup_telemetry() call DOES see enable_tracing=true
      # (DB-loaded by then), but by then the middleware stack is closed
      # and instrument_app silently no-ops — leaving Tempo dark. Closes
      # Glad-Labs/poindexter#505.
      ENABLE_TRACING: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://tempo:4318/v1/traces"
      API_TOKEN: ${API_TOKEN:?Run 'poindexter setup' — API_TOKEN is generated in bootstrap.toml}
      # Symmetric key for decrypting is_secret=true rows in app_settings.
      # Mirrored from ~/.poindexter/bootstrap.toml poindexter_secret_key.
      # Without this, plugins/secrets.py raises SecretsError on read.
      POINDEXTER_SECRET_KEY: ${POINDEXTER_SECRET_KEY:?Set POINDEXTER_SECRET_KEY in .env (mirror of bootstrap.toml poindexter_secret_key)}
      # The /app mount is read-only, so file logging inside the container
      # fails silently. Rely on stdout — Docker's log driver captures it
      # and ``docker logs poindexter-worker`` plus any centralized log
      # shipper (Loki/Promtail later) can read from there.
      LOG_TO_FILE: "false"
      PYTHONDONTWRITEBYTECODE: "1"
      # brain/ is a sibling package imported by config/__init__.py +
      # services/* for the resolve_database_url() bootstrap-toml fallback.
      # Mounted at /opt/poindexter/brain below; add /opt/poindexter to
      # sys.path so `from brain.bootstrap import ...` resolves.
      PYTHONPATH: "/app:/opt/poindexter"
      # Prefect 3 — content pipeline orchestration (#206). Worker
      # imports the @flow decorated entry point and submits flow runs
      # to the local Prefect server for observability + retry plumbing.
      # Server runs in `prefect-server` service, postgres-backed via
      # the shared postgres-local container's `prefect` database.
      PREFECT_API_URL: "http://prefect-server:4200/api"
      # Langfuse v3 — LLM observability (#202, #203). SDK reads these
      # to authenticate against the local langfuse-web container.
      # Headless-init creates this org/project/key pair on first boot.
      LANGFUSE_HOST: "http://langfuse-web:3000"
      # Worker authenticates against the local Langfuse using the same
      # init pair that seeded langfuse-web's first boot. Both come from
      # ~/.poindexter/bootstrap.toml (poindexter#413).
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_INIT_PROJECT_PUBLIC_KEY:?Run 'poindexter setup' — LANGFUSE_INIT_PROJECT_PUBLIC_KEY is generated in bootstrap.toml}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_INIT_PROJECT_SECRET_KEY:?Run 'poindexter setup' — LANGFUSE_INIT_PROJECT_SECRET_KEY is generated in bootstrap.toml}
      # Langfuse 3.14.6 serializer recursion bug — @observe decorators hang
      # the event loop on cyclic object graphs. Disable at SDK level until
      # upstream fixes cycle detection on dict/list/__slots__ paths.
      # See memory: reference_langfuse_serializer_recursion_bug.md
      # Re-applied 2026-06-11 after recurrence within hours of lifting.
      LANGFUSE_TRACING_ENABLED: "false"
      # LiveKit credentials — voice_routes.py mints a 7-day JWT for the
      # phone-tap-to-join HTML page (poindexter#389). Same key/secret as
      # the livekit + voice-agent-livekit containers; LIVEKIT_PUBLIC_WSS_URL
      # is the user-facing wss endpoint (Tailscale-funneled).
      LIVEKIT_API_KEY: "${LIVEKIT_API_KEY:?Run 'poindexter setup' — value generated in bootstrap.toml}"
      LIVEKIT_API_SECRET: "${LIVEKIT_API_SECRET:?Run 'poindexter setup' — value generated in bootstrap.toml}"
      LIVEKIT_ROOM: "${LIVEKIT_ROOM:-poindexter}"
      LIVEKIT_DEFAULT_IDENTITY: "${LIVEKIT_DEFAULT_IDENTITY:-matt}"
      LIVEKIT_PUBLIC_WSS_URL: "${LIVEKIT_PUBLIC_WSS_URL:-wss://nightrider.taild4f626.ts.net/livekit-signal/}"
      # GH_TOKEN — GitHub PAT with `repo` scope. Read by the `gh` CLI when
      # findings_alert_router._dispatch_github_issue files issues. Empty default:
      # without a token the delivery falls back to the page channel (Discord/Telegram)
      # rather than failing. Set in bootstrap.toml or .env; rotated via GitHub PAT UI.
      # Closes poindexter#550.
      GH_TOKEN: "${GH_TOKEN:-}"
    volumes:
      # The worker Dockerfile runs the FastAPI process as user `appuser`
      # (UID 1001), so the in-container HOME is /home/appuser. Code paths
      # that resolve ``~/.poindexter`` (podcast_service, video_service,
      # r2_upload_service) write to /home/appuser/.poindexter — NOT
      # /root/.poindexter. Pre-2026-05-12 this only mounted /root and
      # silently broke media generation: writes went to a container-local
      # path that disappeared on restart and was never picked up by the
      # R2 upload step. 13 days of "podcast generation queued" log lines
      # produced zero output files on the host (last successful mp3:
      # 2026-04-29 14:00 UTC).
      #
      # Mount media subdirs at the appuser home so generation writes
      # persist on the host. Pinpoint-subdir mounts (not the whole
      # ~/.poindexter dir) to keep bootstrap.toml OUT of appuser's HOME
      # — resolve_database_url() reads ~/.poindexter/bootstrap.toml as
      # priority 1, and the host file's DSN points at localhost:5433
      # (the postgres host publish, see postgres-local.ports) which is
      # unreachable from inside the worker container.
      - ${USERPROFILE:-.}/.poindexter/podcast:/home/appuser/.poindexter/podcast
      - ${USERPROFILE:-.}/.poindexter/video:/home/appuser/.poindexter/video
      - ${USERPROFILE:-.}/.poindexter/generated-images:/home/appuser/.poindexter/generated-images
      - ${USERPROFILE:-.}/.poindexter/generated-videos:/home/appuser/.poindexter/generated-videos
      # DbBackupJob writes pg_dumps here. Without this mount the script's
      # mkdir at ${HOME}/.poindexter/backups fails Permission denied — the
      # /home/appuser/.poindexter dir created implicitly by Docker is
      # root-owned. GlitchTip #223 first seen 2026-05-27. Backups stop
      # silently when this is missing, so the read-only /host-backups
      # bind on the backup_watcher service (line 270) appears empty.
      - ${USERPROFILE:-.}/.poindexter/backups:/home/appuser/.poindexter/backups
      # Legacy /root mount stays for code paths that still reference
      # /root/.poindexter or HOST_HOME=/root.
      - ${USERPROFILE:-.}/.poindexter:/root/.poindexter
      - ${USERPROFILE:-.}/Downloads/glad-labs-generated-images:/home/appuser/Downloads/glad-labs-generated-images
      - ${USERPROFILE:-.}/Downloads/glad-labs-generated-images:/root/Downloads/glad-labs-generated-images
      # Corsair iCUE LINK CSV exports — read-only mount so the
      # tap.corsair_csv handler (services/integrations/handlers/
      # tap_corsair_csv.py) can ingest sensor data without leaving the
      # worker container. iCUE writes to the host path on Windows; the
      # tap's row.config.directory is set to the in-container path
      # (/host/sensor_logs) so the same handler works regardless of
      # whether the operator runs the worker via Docker or natively.
      - ${USERPROFILE:-.}/sensor_logs:/host/sensor_logs:ro
      # Dev mount: edit Python files on host, restart worker to pick up changes.
      # No docker cp needed. Read-only to prevent __pycache__ writes to source.
      #
      # POINDEXTER_DEPLOY_ROOT (Glad-Labs/poindexter#228) — the source root for
      # ALL runtime code mounts (this :/app and the ./brain mounts below + in the
      # other 4 src-mounting services). UNSET → '.' → the live dev checkout
      # (today's behavior, zero change, what fresh operators get). SET to the
      # dedicated deploy clone (~/.poindexter/deploy/glad-labs-stack) → the worker
      # runs pinned origin/main code, so the migration-drift probe's
      # `git reset --hard origin/main` on that clone + `docker restart` actually
      # changes what the worker runs. ONE var moves the whole stack together (no
      # split-brain); `docker restart` keeps a container's existing mount, so the
      # probe's restart works regardless. Build contexts intentionally stay on '.'
      # (you build from the dev tree). See docs/operations/migration-drift-self-heal.md.
      - ${POINDEXTER_DEPLOY_ROOT:-.}/src/cofounder_agent:/app:ro
      # Mount brain alongside /app (which is :ro and can't host a child
      # mount) and tell voice_agent_*.py where to find it via
      # POINDEXTER_BRAIN_PARENT below.
      - ${POINDEXTER_DEPLOY_ROOT:-.}/brain:/opt/poindexter/brain:ro
      - ./scripts:/opt/scripts:ro
      # NOTE: The ``./.git:/app/.git:ro`` mount that #259/#348 added is
      # gone -- after the Docker Desktop upgrade ~2026-04-30 the
      # underlying overlayfs hard-rejects child mounts under a ``:ro``
      # parent (``/app`` is read-only above), which prevented the
      # worker from starting at all. The mount was originally added so
      # ``dev_diary_source.py`` could run ``git log``; #294 (2026-05-06)
      # rewrote that source to hit the GitHub REST API via ``httpx``
      # instead, so the bind-mount is no longer required. If you need
      # repo metadata in the worker, prefer the API path -- do NOT
      # re-add this mount or the worker will refuse to start.
      # Shared with the prometheus container — RenderPrometheusRulesJob
      # writes the DB-sourced rule YAML here; prometheus reads it.
      - prometheus-rules:/etc/prometheus/rules
      # #524 — shared with the alertmanager container.
      # RenderAlertmanagerConfigJob reads the template below, substitutes
      # the chat_id placeholder, and writes the rendered alertmanager.yml
      # into this volume; alertmanager reads it + /-/reload picks it up.
      - alertmanager-config:/etc/alertmanager/config
      # Read-only mount of the alertmanager config template so the render
      # job can read it (the worker mounts ./src at /app:ro, not the
      # infrastructure tree, so the template needs its own mount).
      - ./infrastructure/prometheus/alertmanager.yml.tmpl:/etc/alertmanager/alertmanager.yml.tmpl:ro
      # RenderGrafanaAlertsJob reads the .tmpl and writes the rendered
      # alert-rules.yml into this dir; Grafana reads it from the same host
      # path via its existing provisioning/alerting bind mount.
      - ./infrastructure/grafana/provisioning/alerting:/etc/grafana-alerting:rw
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Worker reads every tunable from app_settings (models, prompts, QA
    # thresholds). Wait for brain-daemon to seed + validate before booting
    # so we don't start a pipeline that silently falls through to defaults.
    depends_on:
      postgres-local:
        condition: service_healthy
      brain-daemon:
        condition: service_healthy
      # Prefect server is non-blocking — pipeline still runs without it
      # (we wrap the flow submission in best-effort), so use service_started
      # not service_healthy to avoid a startup deadlock if Prefect is down.
      prefect-server:
        condition: service_started
    # Liveness probe (poindexter#630). The previous test parsed
    # components.task_executor and only exited non-zero when
    # success_count==0 AND error_count>5 — both LIFETIME counters. A
    # worker that processed a few tasks then wedged kept a non-zero
    # success_count forever and reported "healthy" while doing nothing.
    # Probe /api/health for a live HTTP 200 instead: curl -f exits
    # non-zero on any non-2xx (or a hung/refused connection), so a
    # wedged event loop or a crashed app surfaces as unhealthy.
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8002/api/health"]
      interval: 60s
      timeout: 10s
      retries: 3

  # ===========================================
  # Poindexter pipeline Telegram bot — operator chat surface
  # ===========================================
  # Long-polls @poindexterai_bot, routes /health, /tasks, /approve,
  # /reject, /stats, /publish, /cli, /help to the worker via
  # ``http://worker:8002``. Standalone redundancy path so phone-side
  # control of the pipeline doesn't depend on OpenClaw being alive
  # (OpenClaw lives on its own bot, @OpenClawGladbot, since 2026-05-03).
  #
  # Reuses the worker image (same dep set + scripts mount) — no
  # separate Dockerfile or pip install needed. Auth credentials
  # (OAuth client_id/secret) come from app_settings via plugins.secrets
  # at startup; secret_key for decryption is plumbed in through env.
  pipeline-bot:
    build:
      context: ./src/cofounder_agent
      dockerfile: Dockerfile.worker
    container_name: poindexter-pipeline-bot
    restart: unless-stopped
    command: ["python", "-u", "/opt/scripts/telegram-bot.py"]
    environment:
      # Worker URL inside the docker network (NOT localhost — the bot
      # runs in its own container, "localhost" would point at itself).
      POINDEXTER_API_URL: "http://worker:8002"
      DATABASE_URL: "postgresql://${LOCAL_POSTGRES_USER:-poindexter}:${LOCAL_POSTGRES_PASSWORD:?Run 'poindexter setup' — LOCAL_POSTGRES_PASSWORD is generated in bootstrap.toml}@postgres-local:5432/${LOCAL_POSTGRES_DB:-poindexter_brain}"
      POINDEXTER_SECRET_KEY: ${POINDEXTER_SECRET_KEY:?Set POINDEXTER_SECRET_KEY in .env (mirror of bootstrap.toml poindexter_secret_key)}
      LOG_TO_FILE: "false"
      PYTHONDONTWRITEBYTECODE: "1"
      # /app for ``services.*`` imports (plugins.secrets, etc.); /opt/poindexter
      # for ``brain.bootstrap`` (resolve_database_url fallback).
      PYTHONPATH: "/app:/opt/poindexter"
    volumes:
      - ${USERPROFILE:-.}/.poindexter:/root/.poindexter
      - ${POINDEXTER_DEPLOY_ROOT:-.}/src/cofounder_agent:/app:ro
      # Mount brain alongside /app (which is :ro and can't host a child
      # mount) and tell voice_agent_*.py where to find it via
      # POINDEXTER_BRAIN_PARENT below.
      - ${POINDEXTER_DEPLOY_ROOT:-.}/brain:/opt/poindexter/brain:ro
      - ./scripts:/opt/scripts:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres-local:
        condition: service_healthy
      worker:
        condition: service_started
    healthcheck:
      # The bot is alive if the python process is alive — there's no
      # HTTP server to probe. Use pgrep on the bot script. Returns 0
      # when at least one matching process exists.
      test: ["CMD", "pgrep", "-f", "telegram-bot.py"]
      interval: 60s
      timeout: 5s
      retries: 3

  # ===========================================
  # Prefect 3 — content pipeline orchestration (#206 / #410)
  # ===========================================
  # Four services per the canonical 3-latest self-host pattern:
  #   prefect-redis    — messaging broker (event bus between server + services)
  #   prefect-server   — API + UI on :4200, postgres-backed via shared
  #                      postgres-local container (`prefect` database)
  #   prefect-services — background workers that run inside Prefect (event
  #                      processor, scheduler, etc). Separate container
  #                      because `prefect server start` needs --no-services
  #                      when paired with a dedicated services process.
  #   prefect-worker   — pulls flow runs from `content-pool`, executes
  #                      `content_generation_flow` as a subprocess. Added
  #                      2026-05-10 alongside #410 phase 0 (replaces
  #                      task_executor.py's polling daemon). Reuses the
  #                      worker image for matching deps + code mount.
  prefect-redis:
    image: redis:7
    container_name: poindexter-prefect-redis
    restart: unless-stopped
    volumes:
      - prefect-redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  prefect-server:
    # Pinned alongside the prefect client pin in src/cofounder_agent/pyproject.toml.
    # The ``3-latest`` tag is non-deterministic and silently drifted past
    # the worker's version 2026-05-25, killing the content pipeline for 28h
    # (worker prints "server is older" warning, then fails to claim runs).
    # Bump both image tags + the pyproject pin together when upgrading.
    #
    # 2026-05-27: prefer the ``-python3.12`` suffix — Prefect does NOT
    # publish a bare ``3.6.29`` Docker tag (only ``3-latest`` and the
    # python-version-suffixed variants exist), so an unsuffixed pin
    # would 404 on pull (caught by the compose_drift_probe).
    image: prefecthq/prefect:3.6.29-python3.12
    container_name: poindexter-prefect-server
    restart: unless-stopped
    depends_on:
      postgres-local:
        condition: service_healthy
      prefect-redis:
        condition: service_healthy
    environment:
      PREFECT_API_DATABASE_CONNECTION_URL: "postgresql+asyncpg://${LOCAL_POSTGRES_USER:-poindexter}:${LOCAL_POSTGRES_PASSWORD:?Run 'poindexter setup' — LOCAL_POSTGRES_PASSWORD is generated in bootstrap.toml}@postgres-local:5432/prefect"
      PREFECT_SERVER_API_HOST: 0.0.0.0
      # The UI's bundled JS calls this URL from the BROWSER, so it has
      # to be an address the browser can reach — not a service-network
      # name. Workstation's tailscale IP works from both the host's own
      # browser and from any phone on the tailnet (verified via
      # `tailscale status`: nightrider = 100.81.93.12). Plain
      # `localhost:4200/api` breaks the moment the operator opens the
      # UI from their phone — the browser resolves "localhost" against
      # the phone, not against the server.
      PREFECT_SERVER_UI_API_URL: "http://100.81.93.12:4200/api"
      PREFECT_API_URL: "http://prefect-server:4200/api"
      PREFECT_MESSAGING_BROKER: prefect_redis.messaging
      PREFECT_MESSAGING_CACHE: prefect_redis.messaging
      PREFECT_REDIS_MESSAGING_HOST: prefect-redis
      PREFECT_REDIS_MESSAGING_PORT: "6379"
      PREFECT_REDIS_MESSAGING_DB: "0"
    command: prefect server start --no-services
    ports:
      - "4200:4200"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request as u; u.urlopen('http://localhost:4200/api/health', timeout=2)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  prefect-services:
    # Same pin as prefect-server — must match each other and the worker's
    # prefect package version (src/cofounder_agent/pyproject.toml).
    image: prefecthq/prefect:3.6.29-python3.12
    container_name: poindexter-prefect-services
    restart: unless-stopped
    depends_on:
      prefect-server:
        condition: service_healthy
    environment:
      PREFECT_API_DATABASE_CONNECTION_URL: "postgresql+asyncpg://${LOCAL_POSTGRES_USER:-poindexter}:${LOCAL_POSTGRES_PASSWORD:?Run 'poindexter setup' — LOCAL_POSTGRES_PASSWORD is generated in bootstrap.toml}@postgres-local:5432/prefect"
      PREFECT_API_URL: "http://prefect-server:4200/api"
      PREFECT_MESSAGING_BROKER: prefect_redis.messaging
      PREFECT_MESSAGING_CACHE: prefect_redis.messaging
      PREFECT_REDIS_MESSAGING_HOST: prefect-redis
      PREFECT_REDIS_MESSAGING_PORT: "6379"
      PREFECT_REDIS_MESSAGING_DB: "0"
    command: prefect server services start
    healthcheck:
      # No HTTP endpoint, and the prefect image ships no pgrep (procps absent).
      # pidof IS present — probe the python services process directly. A dead
      # process → no match → unhealthy → automatic restart. (Verified #1154:
      # the prior `pgrep -f 'prefect server services'` exited 127 in-image,
      # which would have flipped the container permanently unhealthy.)
      test: ["CMD-SHELL", "pidof python || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Prefect worker — pulls runs from `content-pool` and executes them as
  # subprocesses. Reuses `Dockerfile.worker` so it has the full pipeline
  # dep tree (asyncpg, structlog, langchain, etc.) — a vanilla
  # prefecthq/prefect:3-latest image lacks them and the flow body's
  # ``from services.content_router_service import ...`` would fail.
  #
  # Code is mounted read-only from the host (matches the worker
  # container's pattern); flow runs spawn in subprocesses inside this
  # container, isolated from the legacy ``poindexter-worker``'s
  # cofounder_agent.log (which it holds open and rotates). No more
  # WinError 32 file-locking conflicts.
  prefect-worker:
    build:
      context: ./src/cofounder_agent
      dockerfile: Dockerfile.worker
    container_name: poindexter-prefect-worker
    restart: unless-stopped
    command: ["prefect", "worker", "start", "--pool", "content-pool", "--name", "prefect-worker-1", "--type", "process"]
    environment:
      # Database lives in the postgres-local container; bootstrap.toml
      # mounted below resolves to the same DSN.
      DATABASE_URL: "postgresql://${LOCAL_POSTGRES_USER:-poindexter}:${LOCAL_POSTGRES_PASSWORD:?Run 'poindexter setup' — LOCAL_POSTGRES_PASSWORD is generated in bootstrap.toml}@postgres-local:5432/${LOCAL_POSTGRES_DB:-poindexter_brain}"
      POINDEXTER_SECRET_KEY: ${POINDEXTER_SECRET_KEY:?Set POINDEXTER_SECRET_KEY in .env (mirror of bootstrap.toml poindexter_secret_key)}
      # Don't write to /app/logs (read-only mount); Docker captures
      # stdout instead. This is what sidesteps Phase 1's WinError 32
      # mess — no file rotation contention with the legacy worker.
      LOG_TO_FILE: "false"
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONPATH: "/app:/opt/poindexter"
      PYTHONUTF8: "1"
      # Talk to the Prefect API server on the docker network, NOT
      # localhost. The worker container's localhost is itself.
      PREFECT_API_URL: "http://prefect-server:4200/api"
      # Langfuse credentials so flow-run telemetry traces correctly
      # — the flow body calls into the same LLM dispatchers as the
      # legacy worker, which expect these.
      LANGFUSE_HOST: "http://langfuse-web:3000"
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_INIT_PROJECT_PUBLIC_KEY:?Run 'poindexter setup' — LANGFUSE_INIT_PROJECT_PUBLIC_KEY is generated in bootstrap.toml}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_INIT_PROJECT_SECRET_KEY:?Run 'poindexter setup' — LANGFUSE_INIT_PROJECT_SECRET_KEY is generated in bootstrap.toml}
      # Langfuse 3.14.6 serializer recursion bug — same fix as worker block.
      LANGFUSE_TRACING_ENABLED: "false"
      # OpenTelemetry — mirror of the FastAPI worker's setup so pipeline
      # stages emit spans to Tempo. Without these the prefect-worker
      # (which actually runs the canonical_blog template) was invisible
      # to Tempo — only the FastAPI worker's GET /health + /metrics
      # spans appeared, never any pipeline stage. Finding #6 from the
      # 2026-05-19 stress test. ``OTEL_SERVICE_NAME`` is distinct from
      # the FastAPI worker's so Grafana can filter on per-process span
      # source; the worker's tracing setup uses the OTEL_SERVICE_NAME
      # env var when set, otherwise defaults to "cofounder-agent".
      ENABLE_TRACING: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://tempo:4318/v1/traces"
      OTEL_SERVICE_NAME: "cofounder-agent-prefect"
      # Ollama lives on the host (RTX 5090); the flow body's LLM
      # dispatchers (LiteLLM, direct httpx) need the URL or they
      # default to localhost — which inside this container is the
      # prefect-worker process itself, not Ollama. Without this env
      # var every dev_diary narrate_bundle call fails with
      # "Connect call failed ('127.0.0.1', 11434)" and falls back
      # to the deterministic changelog. Verified 2026-05-17 vacation
      # session: the legacy poindexter-worker has this env, the
      # prefect-worker didn't — that asymmetry was masking the LLM
      # outage entirely.
      OLLAMA_BASE_URL: "http://host.docker.internal:11434"
    volumes:
      - ${USERPROFILE:-.}/.poindexter:/root/.poindexter
      - ${POINDEXTER_DEPLOY_ROOT:-.}/src/cofounder_agent:/app:ro
      - ${POINDEXTER_DEPLOY_ROOT:-.}/brain:/opt/poindexter/brain:ro
      - ./scripts:/opt/scripts:ro
    extra_hosts:
      # Ollama + SDXL servers run on the host machine, not in the
      # docker network. host.docker.internal resolves to host-gateway
      # so flow bodies can reach them when invoked by this worker.
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres-local:
        condition: service_healthy
      prefect-server:
        condition: service_healthy
      brain-daemon:
        condition: service_healthy
    healthcheck:
      # The worker is alive if its process is alive. There's no HTTP
      # endpoint to probe; the API-side heartbeat covers run-pickup.
      test: ["CMD", "pgrep", "-f", "prefect worker start"]
      interval: 60s
      timeout: 5s
      retries: 3

  # ===========================================
  # Langfuse v3 — LLM observability + prompt management + experiments (#202, #203)
  # ===========================================
  # Six containers per the canonical v3 self-host pattern:
  #   langfuse-clickhouse — OLAP store for traces/observations/scores
  #   langfuse-minio      — S3-compatible blob store for events + media
  #   langfuse-redis      — messaging broker between web + worker
  #   langfuse-worker     — async ingestion + batch jobs
  #   langfuse-web        — UI on :3010 + REST API
  #
  # Postgres is shared via the existing postgres-local container (separate
  # `langfuse` database, created at deploy time).
  #
  # Heavy stack on purpose: per Matt's "learning industry standards" goal,
  # operating ClickHouse + MinIO + Langfuse v3 is part of the curriculum,
  # not the cost. See feedback_learning_is_primary_goal.md.
  langfuse-clickhouse:
    image: clickhouse/clickhouse-server
    container_name: poindexter-langfuse-clickhouse
    restart: unless-stopped
    user: "101:101"
    # Memory cap. Docs recommend 8G for production scale; we run 50
    # LLM calls/day so a 4G ceiling is plenty. Cap means a runaway
    # query restarts this one container instead of starving the rest
    # of the stack on Matt's 64G workstation.
    mem_limit: 4g
    mem_reservation: 1g
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: clickhouse
    volumes:
      - langfuse-clickhouse-data:/var/lib/clickhouse
      - langfuse-clickhouse-logs:/var/log/clickhouse-server
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  langfuse-minio:
    image: minio/minio
    container_name: poindexter-langfuse-minio
    restart: unless-stopped
    mem_limit: 1g
    mem_reservation: 256m
    entrypoint: sh
    command: -c 'mkdir -p /data/langfuse && minio server --address ":9000" --console-address ":9001" /data'
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: miniosecret
    # No host port mapping — MinIO is internal-only. Worker + langfuse-web
    # reach it via the compose network at langfuse-minio:9000 (S3 API) and
    # langfuse-minio:9001 (console). Previously bound 127.0.0.1:9091→9001
    # for browser access to the console, but that conflicted with the
    # prometheus service (also 9091 on host), leaving MinIO with no Docker
    # network attached on every fresh `docker compose up` (#377). To browse
    # the MinIO console manually, either:
    #   - `docker exec -it poindexter-langfuse-minio sh` and curl from inside, or
    #   - re-add a host port mapping on a free port (e.g. 9095:9001) locally.
    volumes:
      - langfuse-minio-data:/data
    # `mc ready local` (the canonical Langfuse health pattern) needs
    # an `mc alias set` first — which we don't run in the entrypoint
    # override above. The image has no wget either. curl IS present;
    # use it against MinIO's health endpoint.
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  langfuse-redis:
    image: redis:7
    container_name: poindexter-langfuse-redis
    restart: unless-stopped
    mem_limit: 512m
    mem_reservation: 128m
    command: --requirepass langfuseredis --maxmemory 384mb --maxmemory-policy allkeys-lru
    volumes:
      - langfuse-redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a langfuseredis ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  langfuse-worker:
    image: langfuse/langfuse-worker:3
    container_name: poindexter-langfuse-worker
    restart: unless-stopped
    mem_limit: 2g
    mem_reservation: 512m
    healthcheck:
      # Worker exposes /api/health on :3030 — the same endpoint Langfuse's own
      # compose probes, and a real liveness signal (a wedged worker stops
      # answering) rather than the prior `pgrep -f node`, which matched ANY node
      # process. It binds to the container's own hostname/IP, NOT localhost, so
      # probe $$(hostname) — localhost connection-refuses. ($$ escapes compose
      # interpolation so the container's sh evaluates $(hostname) at runtime.)
      test: ["CMD-SHELL", "wget -q -O /dev/null http://$$(hostname):3030/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on: &langfuse-depends-on
      postgres-local:
        condition: service_healthy
      langfuse-clickhouse:
        condition: service_healthy
      langfuse-minio:
        condition: service_healthy
      langfuse-redis:
        condition: service_healthy
    environment: &langfuse-env
      DATABASE_URL: "postgresql://${LOCAL_POSTGRES_USER:-poindexter}:${LOCAL_POSTGRES_PASSWORD:?Run 'poindexter setup' — LOCAL_POSTGRES_PASSWORD is generated in bootstrap.toml}@postgres-local:5432/langfuse"
      # SALT + ENCRYPTION_KEY persist across restarts. If you rotate
      # them, existing encrypted rows become unreadable. Sourced from
      # ~/.poindexter/bootstrap.toml via `start-stack.sh` (poindexter#413).
      SALT: ${LANGFUSE_SALT:?Run 'poindexter setup' — LANGFUSE_SALT is generated in bootstrap.toml}
      ENCRYPTION_KEY: ${LANGFUSE_ENCRYPTION_KEY:?Run 'poindexter setup' — LANGFUSE_ENCRYPTION_KEY is generated in bootstrap.toml}
      TELEMETRY_ENABLED: "false"
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "true"
      CLICKHOUSE_MIGRATION_URL: "clickhouse://langfuse-clickhouse:9000"
      CLICKHOUSE_URL: "http://langfuse-clickhouse:8123"
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: clickhouse
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: minio
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: miniosecret
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: "http://langfuse-minio:9000"
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_EVENT_UPLOAD_PREFIX: "events/"
      LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_MEDIA_UPLOAD_REGION: auto
      LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: minio
      LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: miniosecret
      LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: "http://langfuse-minio:9000"
      LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_MEDIA_UPLOAD_PREFIX: "media/"
      REDIS_HOST: langfuse-redis
      REDIS_PORT: "6379"
      REDIS_AUTH: langfuseredis
      REDIS_TLS_ENABLED: "false"

  langfuse-web:
    image: langfuse/langfuse:3
    container_name: poindexter-langfuse-web
    restart: unless-stopped
    mem_limit: 2g
    mem_reservation: 512m
    healthcheck:
      # Next.js standalone binds to $$HOSTNAME (the container's own IP), NOT
      # localhost — so the prior `localhost:3000` probe connection-refused and
      # would have flipped the container permanently unhealthy. Probe
      # $$(hostname) instead. ($$ escapes compose interpolation so the
      # container's sh evaluates $(hostname) at runtime; verified #1154 the
      # endpoint returns {"status":"OK"}.)
      test: ["CMD-SHELL", "wget -q -O /dev/null http://$$(hostname):3000/api/public/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    depends_on: *langfuse-depends-on
    ports:
      # Avoid the existing :3000 binding (Grafana). Map :3010 → :3000
      # so the operator browses to localhost:3010 / tailscale-ip:3010.
      - "3010:3000"
    environment:
      <<: *langfuse-env
      NEXTAUTH_URL: "http://localhost:3010"
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:?Run 'poindexter setup' — LANGFUSE_NEXTAUTH_SECRET is generated in bootstrap.toml}
      # Headless initialization (Langfuse 2024-09-04). The first boot
      # creates the org, project, owner user, and API key pair from
      # these vars. After they exist, the env vars become inert
      # (Langfuse skips already-initialized resources). All secrets
      # sourced from ~/.poindexter/bootstrap.toml (poindexter#413).
      LANGFUSE_INIT_ORG_ID: glad-labs
      LANGFUSE_INIT_ORG_NAME: "Glad Labs"
      LANGFUSE_INIT_PROJECT_ID: poindexter
      LANGFUSE_INIT_PROJECT_NAME: "Poindexter Pipeline"
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: ${LANGFUSE_INIT_PROJECT_PUBLIC_KEY:?Run 'poindexter setup' — LANGFUSE_INIT_PROJECT_PUBLIC_KEY is generated in bootstrap.toml}
      LANGFUSE_INIT_PROJECT_SECRET_KEY: ${LANGFUSE_INIT_PROJECT_SECRET_KEY:?Run 'poindexter setup' — LANGFUSE_INIT_PROJECT_SECRET_KEY is generated in bootstrap.toml}
      LANGFUSE_INIT_USER_EMAIL: ${LANGFUSE_INIT_USER_EMAIL:?Run 'poindexter setup' — LANGFUSE_INIT_USER_EMAIL is generated in bootstrap.toml}
      LANGFUSE_INIT_USER_NAME: ${LANGFUSE_INIT_USER_NAME:?Run 'poindexter setup' — LANGFUSE_INIT_USER_NAME is generated in bootstrap.toml}
      LANGFUSE_INIT_USER_PASSWORD: ${LANGFUSE_INIT_USER_PASSWORD:?Run 'poindexter setup' — LANGFUSE_INIT_USER_PASSWORD is generated in bootstrap.toml}

  # ===========================================
  # SDXL Image Server — GPU-accelerated image generation
  # ===========================================
  sdxl-server:
    build:
      context: ./scripts
      dockerfile: Dockerfile.sdxl
    container_name: poindexter-sdxl-server
    restart: unless-stopped
    ports:
      - "9836:9836"
    environment:
      POINDEXTER_BRAIN_URL: "postgresql://${LOCAL_POSTGRES_USER:-poindexter}:${LOCAL_POSTGRES_PASSWORD:?Run 'poindexter setup' — LOCAL_POSTGRES_PASSWORD is generated in bootstrap.toml}@postgres-local:5432/${LOCAL_POSTGRES_DB:-poindexter_brain}"
    volumes:
      # Mount under /home/appuser — Dockerfile.sdxl runs as USER appuser, so the
      # server's OUTPUT_DIR (expanduser("~")/.poindexter/generated-images) and HF
      # cache resolve to /home/appuser. Mounting at /root left renders + the model
      # cache in the container's ephemeral layer (the worker, which reads from the
      # host-shared dir, never saw them). Matches the worker's own mount.
      - ${USERPROFILE:-.}/.poindexter/generated-images:/home/appuser/.poindexter/generated-images
      - ${USERPROFILE:-.}/.cache/huggingface:/home/appuser/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # SDXL reads image_generation_model / image_negative_prompt / style
    # settings from app_settings. Wait for brain to seed them first.
    depends_on:
      postgres-local:
        condition: service_healthy
      brain-daemon:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:9836/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===========================================
  # Wan 2.1 1.3B Video Server — GPU-accelerated text-to-video
  # Sidecar mate of sdxl-server. Listens on 9840; the
  # ``Wan21Provider`` plugin POSTs to it via host.docker.internal:9840.
  # Idle timeout (~120s) auto-unloads the model so SDXL / Ollama can
  # reclaim VRAM when no video work is queued.
  # ===========================================
  wan-server:
    build:
      context: ./scripts
      dockerfile: Dockerfile.wan
    container_name: poindexter-wan-server
    restart: unless-stopped
    ports:
      - "9840:9840"
    environment:
      # Wan 2.2 TI2V-5B — unified text+image-to-video (i2v hero renderer,
      # video-quality spec §3.3, Piece 4). Apache-2.0. ~24GB resident in
      # VRAM; the worker's gpu.lock("video") evicts Ollama before a render
      # so the 5B model fits the 32GB card. Override per-host via this env.
      WAN_MODEL_ID: "Wan-AI/Wan2.2-TI2V-5B-Diffusers"
      WAN_IDLE_TIMEOUT_S: "900"
    volumes:
      # Mount under /home/appuser — Dockerfile.wan runs as USER appuser, so the
      # server's OUTPUT_DIR (expanduser("~")/.poindexter/generated-videos) and HF
      # cache resolve to /home/appuser. Mounting at /root left renders + the model
      # cache in the container's ephemeral layer (the worker, which reads from the
      # host-shared dir, never saw them). Matches the worker's own mount + #1703.
      - ${USERPROFILE:-.}/.poindexter/generated-videos:/home/appuser/.poindexter/generated-videos
      - ${USERPROFILE:-.}/.cache/huggingface:/home/appuser/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:9840/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===========================================
  # Speaches — warm STT + TTS sidecar (#1088)
  # ONE GPU container serving BOTH OpenAI-compatible endpoints:
  #   POST /v1/audio/transcriptions  (faster-whisper)
  #   POST /v1/audio/speech          (Kokoro — same bf_emma/bf_isabella
  #                                   voices the in-process path uses)
  # Voice agents become thin clients (Pipecat OpenAISTTService /
  # OpenAITTSService -> http://speaches:8000/v1) only when
  # voice_agent_stt_mode / voice_agent_tts_mode = sidecar. WHISPER__TTL=-1
  # keeps the model resident so a voice-container restart never reloads it
  # (the whole point of #1088 — move the ~12s cold-start to Speaches' boot).
  # ===========================================
  speaches:
    image: ghcr.io/speaches-ai/speaches@sha256:6ec12ebf890a17e0d4b242a8ba9e0eb1fb836e60e8a3c857aea9838d541579ac
    container_name: poindexter-speaches
    restart: unless-stopped
    ports:
      - "8001:8000"
    environment:
      # -1 = never idle-offload, so the model stays resident and warm.
      WHISPER__TTL: "-1"
      # Pin the HF cache to an explicit mount (don't guess the image user's
      # HOME); shares downloaded weights with sdxl/wan via the same host dir.
      HF_HOME: /cache/huggingface
    volumes:
      - ${USERPROFILE:-.}/.cache/huggingface:/cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # ===========================================
  # pgAdmin — PostgreSQL web UI
  # ===========================================
  pgadmin:
    image: dpage/pgadmin4@sha256:ff557f69d9808085dc3554f56c1b06a36ac8cddabe4485212920b9604261abdb
    container_name: poindexter-pgadmin
    restart: unless-stopped
    # Optional DB GUI — start with: docker compose --profile operator up -d pgadmin
    profiles: ["operator"]
    ports:
      # 5480 → 18443 (2026-05-01): Windows wslrelay rejecting connections to
      # 5480/5481 with stuck SYN_RECEIVED even after a full Docker Desktop +
      # `wsl --shutdown` cycle. Other forwards (worker 8002, grafana 3000)
      # still work, so it's port-specific. Moving way out of the typical
      # range as a workaround. See #222 for the underlying Docker Desktop bug.
      - "18443:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@gladlabs.io}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:?Run 'poindexter setup' — PGADMIN_PASSWORD is generated in bootstrap.toml}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
      - ./infrastructure/pgadmin/servers.json:/pgadmin4/servers.json:ro
      - ./infrastructure/pgadmin/pgpass:/tmp/pgpass_src:ro
    # Guard the pgpass copy (glad-labs-stack#979). ./infrastructure/pgadmin/pgpass
    # is optional and absent on fresh checkouts; when it's missing the bind
    # mounts an empty dir (or nothing), so an unconditional `cp` aborted the
    # entrypoint and pgAdmin never started. Only copy + chmod when the source
    # file is actually present; otherwise fall through to the normal entrypoint
    # and let the operator add servers/passwords in the UI.
    entrypoint: >
      /bin/sh -c "
      if [ -f /tmp/pgpass_src ]; then cp /tmp/pgpass_src /tmp/pgpass && chmod 0600 /tmp/pgpass; fi &&
      /entrypoint.sh
      "
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80/misc/ping"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      postgres-local:
        condition: service_healthy

  # ===========================================
  # Discord Voice Bot — RETIRED 2026-05-08
  # ===========================================
  # Superseded by the voice-agent-livekit + voice-agent-webrtc pair
  # (PRs #313, #315, #316). The legacy bot used discord.py voice channels
  # directly; the new pair uses LiveKit + Pipecat for a session-agnostic
  # surface that any client (browser, mobile, MCP) can join.
  # Container had been zombie (exit 137) since 2026-05-05 — restart-policy
  # didn't auto-recover because the kill came from a Docker shutdown
  # (interpreted as "user stopped it"). Removed from compose during the
  # 2026-05-08 self-healing audit.

  # ===========================================
  # Auto-Embed — hourly pgvector embedding sync
  # ===========================================
  auto-embed:
    build:
      context: .
      dockerfile: scripts/Dockerfile.auto-embed
    container_name: poindexter-auto-embed
    restart: unless-stopped
    environment:
      # Only DATABASE_URL is an env var by policy; everything else — ollama_url,
      # gitea_url, etc. — lives in the app_settings DB and is loaded at runtime.
      # The script translates `localhost:PORT` to in-network service names when
      # it detects it's running inside Docker (IN_DOCKER=true).
      DATABASE_URL: "postgresql://${LOCAL_POSTGRES_USER:-poindexter}:${LOCAL_POSTGRES_PASSWORD:?Run 'poindexter setup' — LOCAL_POSTGRES_PASSWORD is generated in bootstrap.toml}@postgres-local:5432/${LOCAL_POSTGRES_DB:-poindexter_brain}"
      IN_DOCKER: "true"
      # OpenClaw memory embedding retired 2026-06-07 (Matt): operations memories
      # live in the DB as structured data, not in pgvector. The "__skip__"
      # sentinel makes the memory tap's _resolve() return a non-existent path,
      # so the openclaw source is skipped on every run. The .openclaw bind mount
      # below is left in place (harmless) for any future openclaw_sqlite tap.
      OPENCLAW_MEMORY_DIR: __skip__
      # auto-embed calls get_secret('gitea_password') to auth against
      # the local Gitea tap. Needs the symmetric key to decrypt it.
      POINDEXTER_SECRET_KEY: ${POINDEXTER_SECRET_KEY:?Set POINDEXTER_SECRET_KEY in .env}
    volumes:
      - ./scripts/auto-embed.py:/app/auto-embed.py:ro
      - ${POINDEXTER_DEPLOY_ROOT:-.}/brain:/brain:ro
      - ${USERPROFILE:-.}/.claude/projects:/home/embedder/.claude/projects:ro
      - ${USERPROFILE:-.}/.openclaw/workspace/memory:/memory/openclaw:ro
      # Persist ~/.gladlabs/auto-embed.log to the host so `tail -f` works
      # without needing `docker exec`. Script writes to Path.home()/.gladlabs
      # which resolves to /root/.gladlabs inside the container (GitHub #62).
      - ${USERPROFILE:-.}/.gladlabs:/root/.gladlabs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Boot order: postgres (data) → brain-daemon (seeds + self-checks) → auto-embed
    # (populates pgvector) → everything else. Per 2026-04-18 architecture discussion.
    depends_on:
      postgres-local:
        condition: service_healthy
      brain-daemon:
        condition: service_healthy

  # ===========================================
  # Loki — log aggregation (stdout from every container, queryable in Grafana)
  # ===========================================
  loki:
    image: grafana/loki:3.3.2
    container_name: poindexter-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yml
    ports:
      - "3100:3100"
    volumes:
      - ./infrastructure/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3100/ready | grep -q ready"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ===========================================
  # Promtail — tails every container's json log file and ships to Loki
  # ===========================================
  promtail:
    image: grafana/promtail:3.3.2
    container_name: poindexter-promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./infrastructure/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      # Read-only access to Docker's container log files.
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      # Docker socket for service discovery (container labels, names).
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Promtail remembers where it left off across restarts.
      - promtail-positions:/var/log
    # Promtail's image is minimal Debian: /bin/sh is dash and there is NO
    # in-container HTTP client (curl/wget/nc/busybox all absent), so the /ready
    # endpoint on :9080 cannot be probed from inside the container — the prior
    # `wget …/ready` exited 127 and would have flipped it permanently unhealthy.
    # `restart: unless-stopped` still recovers crashes; a wedged-but-running
    # promtail (logs silently stop reaching Loki) is caught EXTERNALLY by the
    # PromtailDown Prometheus alert — up{job="promtail"}==0 via the new promtail
    # scrape job in infrastructure/prometheus/prometheus.yml. Mirrors pyroscope's
    # honest-disable above; a perma-"unhealthy" probe would be cosmetic. (#1154)
    healthcheck:
      disable: true
    depends_on:
      loki:
        condition: service_healthy

  # ===========================================
  # Uptime Kuma — uptime monitoring + public status page
  # ===========================================
  # Covers GH #74. Pings the worker /api/health, Grafana, Postgres,
  # Ollama, and any external dependencies on a schedule. Exposes a
  # Prometheus /metrics endpoint so Grafana can graph uptime history
  # alongside the rest of the poindexter dashboards. Status page
  # served on 3002 for humans.
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: poindexter-uptime-kuma
    restart: unless-stopped
    ports:
      - "3002:3001"
    volumes:
      - uptime-kuma-data:/app/data
    healthcheck:
      test: ["CMD", "node", "extra/healthcheck.js"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ===========================================
  # Tempo — distributed tracing (OTLP) backend
  # ===========================================
  # Receives OTLP spans from the worker (services/telemetry.py wires
  # FastAPIInstrumentor + the LLM-dispatcher spans from v2.7). Grafana
  # reads from Tempo via the provisioned datasource. No public port —
  # only Grafana and the worker need to reach it, and they do so via
  # the shared docker network.
  tempo:
    image: grafana/tempo:2.7.0
    container_name: poindexter-tempo
    restart: unless-stopped
    command: ["-config.file=/etc/tempo/tempo-config.yml"]
    ports:
      - "3200:3200"   # Tempo HTTP (Grafana datasource)
      - "4317:4317"   # OTLP gRPC (worker exports traces here)
      - "4318:4318"   # OTLP HTTP (alt path)
    volumes:
      - ./infrastructure/tempo/tempo-config.yml:/etc/tempo/tempo-config.yml:ro
      - tempo-data:/var/tempo
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3200/ready | grep -q ready"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ===========================================
  # Pyroscope — continuous profiling (the P in LGTM+P)
  # ===========================================
  # Covers GH #75. Accepts pprof samples from the worker when the
  # Python agent is enabled (enable_pyroscope=true in app_settings).
  # Grafana reads profiles via the provisioned datasource. No external
  # port — only Grafana and the worker need to reach it.
  pyroscope:
    image: grafana/pyroscope:1.9.1
    container_name: poindexter-pyroscope
    restart: unless-stopped
    command: ["server"]
    ports:
      - "4040:4040"   # Pyroscope HTTP (Grafana datasource + worker ingest)
    volumes:
      - pyroscope-data:/var/lib/pyroscope
    # Pyroscope's image ships the pyroscope binary only — no shell, no wget,
    # no curl — so there's no in-container way to probe the /ready endpoint.
    # The service is reachable on port 4040 (Grafana + worker verify this on
    # every scrape/ingest). Keeping `disable: true` is the honest state —
    # silent "unhealthy" would hide real outages behind cosmetic green.
    healthcheck:
      disable: true

  # ===========================================
  # cAdvisor — per-container CPU/memory/network/IO metrics (poindexter#648)
  # ===========================================
  # Exports container_* metrics scraped by Prometheus (job: cadvisor).
  # No host port — only Prometheus needs to reach it on the Docker network.
  # Runs privileged so it can read cgroup v2 stats from the Docker VM.
  # On Docker Desktop for Windows the mounts resolve inside the Linux VM,
  # not on the Windows host filesystem — this is correct behaviour.
  cadvisor:
    image: gcr.io/cadvisor/cadvisor@sha256:3de2bd5203120b866d74a9b283b2ffb8ec382fbf9dc321814700c6ea6f44ec57
    container_name: poindexter-cadvisor
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:8080/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ===========================================
  # postgres_exporter — deep Postgres metrics (poindexter#650)
  # ===========================================
  # Exports pg_stat_* family metrics (locks, slow queries, cache-hit ratio,
  # bloat, index usage) scraped by Prometheus (job: postgres-exporter).
  # Points at poindexter_brain — the primary OLTP database.
  # No host port — only Prometheus needs to reach it on the Docker network.
  # Natural home for its panels: the Database dashboard (/d/database).
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.19.1
    container_name: poindexter-postgres-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://${LOCAL_POSTGRES_USER:-poindexter}:${LOCAL_POSTGRES_PASSWORD:?Run 'poindexter setup' — LOCAL_POSTGRES_PASSWORD is generated in bootstrap.toml}@postgres-local:5432/${LOCAL_POSTGRES_DB:-poindexter_brain}?sslmode=disable"
    depends_on:
      postgres-local:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:9187/metrics 2>/dev/null | head -1 | grep -q '#' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ===========================================
  # GlitchTip — Sentry-compatible error tracking (OSS)
  # ===========================================
  # Covers GH #77. Runs three containers: web (Django), worker (Celery),
  # and its own Postgres. The worker is intentionally separate from the
  # poindexter Postgres to keep error-tracking state isolated from
  # business data (different backup cadence, different retention).
  # DSN lives in app_settings.sentry_dsn — services/sentry_integration.py
  # already reads it and points the existing SDK at whatever URL is
  # there. Set it to http://glitchtip:8000/<project_id>/<public_key> to
  # route worker exceptions to GlitchTip instead of Sentry SaaS.
  glitchtip-db:
    image: postgres:16-alpine
    container_name: poindexter-glitchtip-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: glitchtip
      POSTGRES_PASSWORD: ${GLITCHTIP_DB_PASSWORD:?Run 'poindexter setup' — GLITCHTIP_DB_PASSWORD is generated in bootstrap.toml}
      POSTGRES_DB: glitchtip
    volumes:
      - glitchtip-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U glitchtip"]
      interval: 10s
      timeout: 5s
      retries: 5

  glitchtip-redis:
    image: redis:7-alpine
    container_name: poindexter-glitchtip-redis
    restart: unless-stopped
    volumes:
      - glitchtip-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  glitchtip-web:
    image: glitchtip/glitchtip:6.1.6
    container_name: poindexter-glitchtip-web
    restart: unless-stopped
    ports:
      - "8080:8000"
    environment:
      DATABASE_URL: "postgres://glitchtip:${GLITCHTIP_DB_PASSWORD:?Run 'poindexter setup' — GLITCHTIP_DB_PASSWORD is generated in bootstrap.toml}@glitchtip-db:5432/glitchtip"
      REDIS_URL: "redis://glitchtip-redis:6379/0"
      SECRET_KEY: ${GLITCHTIP_SECRET_KEY:?Run 'poindexter setup' — GLITCHTIP_SECRET_KEY is generated in bootstrap.toml}
      PORT: "8000"
      EMAIL_URL: "consolemail://"   # drops emails into container logs; swap for real SMTP when you want invites
      GLITCHTIP_DOMAIN: "${GLITCHTIP_DOMAIN:-http://localhost:8080}"
      DEFAULT_FROM_EMAIL: "glitchtip@localhost"
      CELERY_WORKER_AUTOSCALE: "1,3"
    depends_on:
      glitchtip-db:
        condition: service_healthy
      glitchtip-redis:
        condition: service_healthy
    # GlitchTip's base image has neither curl nor wget; it does have Python.
    # /api/0/ returns {"version":"0", ...} without auth — solid liveness signal.
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/0/', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  glitchtip-worker:
    image: glitchtip/glitchtip:6.1.6
    container_name: poindexter-glitchtip-worker
    restart: unless-stopped
    command: ./bin/run-celery-with-beat.sh
    environment:
      DATABASE_URL: "postgres://glitchtip:${GLITCHTIP_DB_PASSWORD:?Run 'poindexter setup' — GLITCHTIP_DB_PASSWORD is generated in bootstrap.toml}@glitchtip-db:5432/glitchtip"
      REDIS_URL: "redis://glitchtip-redis:6379/0"
      SECRET_KEY: ${GLITCHTIP_SECRET_KEY:?Run 'poindexter setup' — GLITCHTIP_SECRET_KEY is generated in bootstrap.toml}
      EMAIL_URL: "consolemail://"
      DEFAULT_FROM_EMAIL: "glitchtip@localhost"
      CELERY_WORKER_AUTOSCALE: "1,3"
    depends_on:
      glitchtip-db:
        condition: service_healthy
      glitchtip-redis:
        condition: service_healthy
    healthcheck:
      # Worker — no HTTP. The image ships no pgrep, AND the process runs as
      # `python /code/manage.py runworker` (NOT a `celery`-named process), so
      # the prior `pgrep -f celery` was doubly wrong (exit 127 + wrong name) and
      # would have flipped the container permanently unhealthy. pidof IS present
      # — probe the python worker process (verified #1154 → PID 1).
      test: ["CMD-SHELL", "pidof python || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ===========================================
  # GPU Metrics Exporter — nvidia-smi + HWiNFO to Prometheus
  # ===========================================
  gpu-exporter:
    # Profile-gated OFF by default (incident 2026-06-21): on Windows Docker
    # Desktop this Linux container can't reach the NVIDIA driver (`nvidia-smi`
    # -> "Driver Not Loaded"), so it serves zero nvidia_gpu_* metrics — and its
    # :9835 publish shadows the working host-side nvidia-smi-exporter.py on IPv6,
    # which broke gpu-scraper.py and starved Prometheus of GPU data. On Windows
    # the host exporter is the GPU source (see prometheus.yml job "nvidia-smi").
    # This service stays defined for a future Linux host with real GPU
    # passthrough; start it there with:
    #   docker compose --profile linux-gpu up -d gpu-exporter
    profiles: ["linux-gpu"]
    build:
      context: .
      dockerfile: scripts/Dockerfile.gpu-exporter
    container_name: poindexter-gpu-exporter
    restart: unless-stopped
    ports:
      - "9835:9835"
    environment:
      DATABASE_URL: "postgresql://${LOCAL_POSTGRES_USER:-poindexter}:${LOCAL_POSTGRES_PASSWORD:?Run 'poindexter setup' — LOCAL_POSTGRES_PASSWORD is generated in bootstrap.toml}@postgres-local:5432/${LOCAL_POSTGRES_DB:-poindexter_brain}"
    volumes:
      - ./scripts/nvidia-smi-exporter.py:/app/nvidia-smi-exporter.py:ro
      - ${POINDEXTER_DEPLOY_ROOT:-.}/brain:/brain:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Healthcheck (issue #319): catches the silent-hang failure mode where the
    # HTTP socket stays LISTENING but stops accepting connections. python:3.12-slim
    # has no wget/curl, so we use the bundled Python urllib (3s timeout matches
    # the prometheus scrape budget). When this fails 3× docker restarts the container.
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request,sys; urllib.request.urlopen('http://localhost:9835/metrics', timeout=3).read(); sys.exit(0)"
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      postgres-local:
        condition: service_healthy

  # ===========================================
  # Always-on voice agents (Glad-Labs/poindexter#383)
  # ===========================================
  # Two containers, one image (scripts/Dockerfile.voice-agent), each
  # running the same Pipecat pipeline (Whisper -> Ollama -> Kokoro)
  # against a different transport:
  #
  #   voice-agent-livekit  — joins the configured LiveKit room and stays
  #                          joined. The headline "talk to Poindexter
  #                          from anywhere" surface; Matt joins via the
  #                          LiveKit hosted client (https://meet.livekit.io)
  #                          or a mobile LiveKit app.
  #
  #   voice-agent-webrtc   — serves the Pipecat prebuilt SmallWebRTC UI on
  #                          port 8003. Direct browser-to-bot (no LiveKit
  #                          SFU in the loop) — useful when the SFU is
  #                          flaky or for local-only quick tests.
  #
  # Both are sibling services to the legacy `voice-bot` (Discord-only).
  # The legacy bot stays running for slash-command + Discord-voice flows
  # that aren't Pipecat-driven; the new pair is the always-live STT->TTS
  # surface.
  #
  # `unless-stopped` restart policy + DB-driven enabled flag means an
  # operator can take either surface offline by:
  #   poindexter settings set voice_agent_livekit_enabled false
  #   docker restart poindexter-voice-agent-livekit
  # ...and the container will exit 0 on next boot (no crash-loop).
  voice-agent-livekit:
    build:
      context: .
      dockerfile: scripts/Dockerfile.voice-agent
    image: poindexter-voice-agent:latest
    container_name: poindexter-voice-agent-livekit
    restart: unless-stopped
    command: ["python", "-m", "services.voice_agent_livekit", "--service"]
    environment:
      DATABASE_URL: "postgresql://${LOCAL_POSTGRES_USER:-poindexter}:${LOCAL_POSTGRES_PASSWORD:?Run 'poindexter setup' — LOCAL_POSTGRES_PASSWORD is generated in bootstrap.toml}@postgres-local:5432/${LOCAL_POSTGRES_DB:-poindexter_brain}"
      # Symmetric key for pgcrypto-decrypted is_secret rows. The voice
      # agent only reads non-secret settings today, but the SiteConfig
      # loader needs the key present so secret-row decryption errors
      # don't crash startup.
      POINDEXTER_SECRET_KEY: ${POINDEXTER_SECRET_KEY:?Set POINDEXTER_SECRET_KEY in .env}
      # LiveKit credentials. Match the pair on the `livekit` service so
      # the bot can mint a valid room-join JWT. Override both halves
      # together when rotating away from the dev defaults.
      LIVEKIT_API_KEY: "${LIVEKIT_API_KEY:?Run 'poindexter setup' — value generated in bootstrap.toml}"
      LIVEKIT_API_SECRET: "${LIVEKIT_API_SECRET:?Run 'poindexter setup' — value generated in bootstrap.toml}"
      # Bot's POV of the LiveKit server is in-network (compose service
      # name); the human-facing URL goes to the SFU's exposed host port.
      LIVEKIT_URL: "ws://livekit:7880"
      # Tell _ensure_brain_on_path() where brain/bootstrap.py lives,
      # since /app:ro hides the parent-walk from finding it.
      POINDEXTER_BRAIN_PARENT: "/opt/poindexter"
      # Voice tools call the worker's HTTP API (check_pipeline_health,
      # get_published_post_count, get_ai_spending_status). The default
      # in voice_agent_livekit.py is localhost:8002 — wrong from inside
      # this container; localhost there is the container itself. Use
      # the compose service name on the shared poindexter-network.
      POINDEXTER_API_URL: "http://worker:8002"
    volumes:
      - ${POINDEXTER_DEPLOY_ROOT:-.}/src/cofounder_agent:/app:ro
      # Mount brain alongside /app (which is :ro and can't host a child
      # mount) and tell voice_agent_*.py where to find it via
      # POINDEXTER_BRAIN_PARENT below.
      - ${POINDEXTER_DEPLOY_ROOT:-.}/brain:/opt/poindexter/brain:ro
      # Persist Whisper / Silero / Kokoro model weights across rebuilds.
      # First boot downloads ~470 MB total; cached after that.
      # poindexter#488 — container now runs as the non-root `voiceagent`
      # user (uid 1001), so the cache lives under that user's HOME.
      - voice-agent-cache:/home/voiceagent/.cache
      # Bind-mount the host's ~/.claude READ-WRITE so the in-container
      # `claude` subprocess (spawned by voice_agent_claude_code.py)
      # picks up the host operator's OAuth tokens, skills, plugins,
      # MCP servers, and memory files — AND can write its session
      # JSONL files. Read-only blocks --session-id writes on first turn,
      # which then breaks --resume on subsequent turns (the bridge
      # design uses fresh-uuid-per-call so each voice session creates
      # its own JSONL).
      #
      # poindexter#488 — target moved from /root/.claude to
      # /home/voiceagent/.claude after the Dockerfile dropped privileges.
      # The container's HOME=/home/voiceagent so the claude CLI's
      # default $HOME/.claude lookup lands on the bind-mount.
      #
      # Race risk: voice agent and host's terminal Claude both write
      # to MEMORY.md (auto-memory). Writes are rare (only on memory
      # save events) and atomic-style replacement, so the practical
      # collision window is small. Session JSONLs are per-uuid so
      # don't conflict.
      - ${USERPROFILE:-${HOME}}/.claude:/home/voiceagent/.claude
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    # Healthcheck: the bot has no HTTP listener, so we probe the python
    # process. PID 1 alive == voice loop running. Same pattern as
    # voice-bot + brain-daemon.
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import os,signal; os.kill(1, 0)' 2>/dev/null || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
    depends_on:
      postgres-local:
        condition: service_healthy
      brain-daemon:
        condition: service_healthy
      livekit:
        condition: service_healthy

  # ===========================================
  # Claude-Code voice room — the dev-on-the-go twin (#1006 two-room split)
  # ===========================================
  # Same image + env + volumes + GPU as voice-agent-livekit above; the ONLY
  # divergences are `container_name` and `command` (--service-profile
  # claude-code instead of the default poindexter profile). The profile makes
  # the bot read the voice_agent_claude_code_* app_settings namespace
  # (enabled / room_name / identity, seeded by migration 20260604_030000) and
  # PINS the brain to claude-code — so a flip of the global
  # voice_agent_brain_mode (the poindexter room's Emma/GLM selector) can never
  # silently turn this container into an ollama bot.
  #
  # Kept as a full sibling rather than a YAML anchor to match the dominant
  # house style (only langfuse-* uses anchors). Two bots, two rooms: a LiveKit
  # participant identity lives in exactly one room, so simultaneous presence
  # in `poindexter` and `claude-code` needs two processes. Shares the
  # voice-agent-cache volume (Whisper/Kokoro weights cached once) and the
  # host's ~/.claude bind mount (session JSONLs are per-uuid; the poindexter
  # bot runs ollama and never spawns `claude`, so no write contention).
  voice-agent-claude-code:
    build:
      context: .
      dockerfile: scripts/Dockerfile.voice-agent
    image: poindexter-voice-agent:latest
    container_name: poindexter-voice-agent-claude-code
    restart: unless-stopped
    # Opt-in only: the claude-code/dev voice room is gated behind the `voice-dev`
    # compose profile, so a plain `docker compose up -d` does NOT start it. It was
    # retired 2026-06-21 (sat unused for weeks and was the only paid voice path —
    # host-brain shells to `claude -p`, ~$0.40+/turn). Bring it up explicitly:
    #   docker compose --profile voice-dev up -d voice-agent-claude-code
    # Host-brain mode additionally needs its host daemon/scheduled task enabled.
    profiles: ["voice-dev"]
    command: ["python", "-m", "services.voice_agent_livekit", "--service", "--service-profile", "claude-code"]
    environment:
      DATABASE_URL: "postgresql://${LOCAL_POSTGRES_USER:-poindexter}:${LOCAL_POSTGRES_PASSWORD:?Run 'poindexter setup' — LOCAL_POSTGRES_PASSWORD is generated in bootstrap.toml}@postgres-local:5432/${LOCAL_POSTGRES_DB:-poindexter_brain}"
      # Symmetric key for pgcrypto-decrypted is_secret rows. The claude-code
      # bot DOES read a secret (voice_agent_claude_code_host_brain_token) when
      # host-brain mode is on, so the key must be present.
      POINDEXTER_SECRET_KEY: ${POINDEXTER_SECRET_KEY:?Set POINDEXTER_SECRET_KEY in .env}
      # LiveKit credentials. Same pair as the `livekit` service so the bot can
      # mint a valid room-join JWT for the claude-code room.
      LIVEKIT_API_KEY: "${LIVEKIT_API_KEY:?Run 'poindexter setup' — value generated in bootstrap.toml}"
      LIVEKIT_API_SECRET: "${LIVEKIT_API_SECRET:?Run 'poindexter setup' — value generated in bootstrap.toml}"
      LIVEKIT_URL: "ws://livekit:7880"
      # Tell _ensure_brain_on_path() where brain/bootstrap.py lives, since
      # /app:ro hides the parent-walk from finding it.
      POINDEXTER_BRAIN_PARENT: "/opt/poindexter"
      # Voice tools call the worker's HTTP API; localhost would be this
      # container. Use the compose service name on the shared network.
      POINDEXTER_API_URL: "http://worker:8002"
    volumes:
      - ${POINDEXTER_DEPLOY_ROOT:-.}/src/cofounder_agent:/app:ro
      # Mount brain alongside /app (which is :ro and can't host a child mount).
      - ${POINDEXTER_DEPLOY_ROOT:-.}/brain:/opt/poindexter/brain:ro
      # Share the model-weight cache with voice-agent-livekit (named volume,
      # so Whisper / Silero / Kokoro weights download once for both bots).
      - voice-agent-cache:/home/voiceagent/.cache
      # Bind-mount the host's ~/.claude RW so the in-container (or, in
      # host-brain mode, the host's) `claude` picks up the operator's OAuth
      # tokens, skills, plugins, MCP servers, and memory — AND can write its
      # per-uuid session JSONL files (poindexter#488 dropped privileges, so
      # HOME=/home/voiceagent).
      - ${USERPROFILE:-${HOME}}/.claude:/home/voiceagent/.claude
    extra_hosts:
      # Needed for host-brain mode: voice_agent_claude_code_host_brain_url
      # points at http://host.docker.internal:8123/turn (the host daemon).
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    # Healthcheck: the bot has no HTTP listener, so we probe the python
    # process. PID 1 alive == voice loop running. Same pattern as
    # voice-agent-livekit + brain-daemon.
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import os,signal; os.kill(1, 0)' 2>/dev/null || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
    depends_on:
      postgres-local:
        condition: service_healthy
      brain-daemon:
        condition: service_healthy
      livekit:
        condition: service_healthy

  # voice-agent-webrtc retired 2026-05-08 — voice_agent_livekit is the
  # canonical voice surface. The WebRTC alternative transport carried
  # the same Whisper → Ollama → Kokoro pipeline as livekit but via
  # Pipecat's SmallWebRTC prebuilt UI, which never settled into Matt's
  # daily flow and duplicated maintenance surface area. The shared
  # voice utilities (services/voice_agent.py, voice_pipecat.py,
  # voice_agent_claude_code.py) stay as livekit's dependency tree.

  # ===========================================
  # In-stack Postgres backup (Glad-Labs/poindexter#385)
  # ===========================================
  # Tier 1 of the backup story: hourly + daily pg_dump → bind-mounted host
  # directory (~/.poindexter/backups/auto/). Bind mount, NOT a docker named
  # volume — named volumes die with `docker volume prune` and Docker
  # Desktop reinstalls (the exact failure mode that bit us 2026-05-05).
  #
  # Two sibling containers, one image, two cadences:
  #   backup-hourly  — every hour, keeps last 24 dumps
  #   backup-daily   — every 24h, keeps last 7 dumps
  #
  # Tier 2 (off-machine: USB / S3 / B2 via restic) is a separate concern;
  # see Matt's GladLabs-DR-Backup scheduled task or future
  # `poindexter setup` --backup-target prompts. The two tiers are
  # independent so a failure in one doesn't take down the other.
  #
  # Failure path: writes a row to alert_events, severity=critical. The
  # brain daemon's alert_dispatcher picks it up on its 30s sweep and
  # routes to Telegram (critical) + Discord (warning) through the same
  # pipeline Grafana alerts use. One notification surface.
  backup-hourly:
    build:
      context: .
      dockerfile: scripts/Dockerfile.backup
    image: poindexter-backup:latest
    container_name: poindexter-backup-hourly
    restart: unless-stopped
    environment:
      BACKUP_TIER: hourly
      PG_HOST: postgres-local
      PG_PORT: "5432"
      PG_USER: ${LOCAL_POSTGRES_USER:-poindexter}
      PG_DATABASE: ${LOCAL_POSTGRES_DB:-poindexter_brain}
      PGPASSWORD: ${LOCAL_POSTGRES_PASSWORD:?Run 'poindexter setup' — LOCAL_POSTGRES_PASSWORD is generated in bootstrap.toml}
      TZ: ${TZ:-UTC}
    volumes:
      # Bind mount (NOT named volume) so backups survive `docker volume
      # prune` and Docker Desktop reinstalls. Tilde doesn't expand in
      # compose env-var defaults; ${USERPROFILE:-${HOME}} does — and
      # this is the SAME expansion the brain uses for its read-only
      # /host-backups mount above. Earlier the backup tier used bare
      # ${HOME}, which is empty in the Compose env on Windows Docker
      # Desktop. That silently bound the volume to a Docker-internal
      # /.poindexter/backups/auto path invisible to the brain —
      # backups wrote fine but the brain's freshness probe read stale
      # dumps and paged "33h stale" continuously. Operators can
      # override POINDEXTER_BACKUP_DIR (e.g. to a second drive)
      # without editing compose.
      - ${POINDEXTER_BACKUP_DIR:-${USERPROFILE:-${HOME}}/.poindexter/backups/auto}:/backups
    depends_on:
      postgres-local:
        condition: service_healthy
    healthcheck:
      # Container is healthy if the latest hourly dump is < 90 minutes old.
      # Detects the silent-stop failure mode where the loop exits cleanly
      # but stops producing output (one-off mtime check is cheap).
      test:
        - "CMD-SHELL"
        - "find /backups/hourly -name 'poindexter_brain_*.dump' -mmin -90 | grep -q ."
      interval: 5m
      timeout: 10s
      retries: 3
      start_period: 5m

  backup-daily:
    build:
      context: .
      dockerfile: scripts/Dockerfile.backup
    image: poindexter-backup:latest
    container_name: poindexter-backup-daily
    restart: unless-stopped
    environment:
      BACKUP_TIER: daily
      PG_HOST: postgres-local
      PG_PORT: "5432"
      PG_USER: ${LOCAL_POSTGRES_USER:-poindexter}
      PG_DATABASE: ${LOCAL_POSTGRES_DB:-poindexter_brain}
      PGPASSWORD: ${LOCAL_POSTGRES_PASSWORD:?Run 'poindexter setup' — LOCAL_POSTGRES_PASSWORD is generated in bootstrap.toml}
      TZ: ${TZ:-UTC}
    volumes:
      # Bind mount (NOT named volume) so backups survive `docker volume
      # prune` and Docker Desktop reinstalls. Tilde doesn't expand in
      # compose env-var defaults; ${USERPROFILE:-${HOME}} does — and
      # this is the SAME expansion the brain uses for its read-only
      # /host-backups mount above. Earlier the backup tier used bare
      # ${HOME}, which is empty in the Compose env on Windows Docker
      # Desktop. That silently bound the volume to a Docker-internal
      # /.poindexter/backups/auto path invisible to the brain —
      # backups wrote fine but the brain's freshness probe read stale
      # dumps and paged "33h stale" continuously. Operators can
      # override POINDEXTER_BACKUP_DIR (e.g. to a second drive)
      # without editing compose.
      - ${POINDEXTER_BACKUP_DIR:-${USERPROFILE:-${HOME}}/.poindexter/backups/auto}:/backups
    depends_on:
      postgres-local:
        condition: service_healthy
    healthcheck:
      # Daily dumps are only produced every 24h; healthy if the latest
      # is < 26 hours old (90 min slack like the hourly).
      test:
        - "CMD-SHELL"
        - "find /backups/daily -name 'poindexter_brain_*.dump' -mmin -1560 | grep -q ."
      interval: 30m
      timeout: 10s
      retries: 3
      start_period: 30m

  # ===========================================
  # Tier 2 — off-machine backup (poindexter#386). Same image as the Tier 1
  # backup services (restic baked in), but runs scripts/backup-offsite/run.sh:
  # restic backup of the daily dump dir → an S3-compatible bucket, weekly
  # restic check, append-only-safe (no prune by default). OPT-IN: idles until
  # `poindexter backup setup` writes the repo + creds. Secrets arrive via the
  # env_file start-stack.sh materializes from encrypted app_settings; the
  # ${VAR:-} defaults (NOT :?) keep the service dormant — not erroring — on a
  # fresh stack. Staleness/auto-retry is owned by the brain offsite_backup_watch
  # probe, so there is intentionally no healthcheck here.
  backup-offsite:
    build:
      context: .
      dockerfile: scripts/Dockerfile.backup
    image: poindexter-backup:latest
    container_name: poindexter-backup-offsite
    restart: unless-stopped
    entrypoint: ["/app/run-offsite.sh"]
    environment:
      PG_HOST: postgres-local
      PG_PORT: "5432"
      PG_USER: ${LOCAL_POSTGRES_USER:-poindexter}
      PG_DATABASE: ${LOCAL_POSTGRES_DB:-poindexter_brain}
      PGPASSWORD: ${LOCAL_POSTGRES_PASSWORD:?Run 'poindexter setup' — LOCAL_POSTGRES_PASSWORD is generated in bootstrap.toml}
      TZ: ${TZ:-UTC}
    env_file:
      # Auto-managed by scripts/start-stack.sh from encrypted app_settings
      # (offsite_backup_restic_password / _s3_access_key_id /
      # _s3_secret_access_key). Holds RESTIC_PASSWORD + AWS_ACCESS_KEY_ID +
      # AWS_SECRET_ACCESS_KEY. Git-ignored. Empty assignments when unconfigured
      # ⇒ the runner idles loudly. required:false so a bare `docker compose up`
      # before start-stack.sh has generated the file doesn't error — the runner
      # simply idles until the creds exist.
      - path: .poindexter-backup-offsite.env
        required: false
    volumes:
      # Read-only: the offsite tier only READS the Tier 1 dumps and ships them.
      - ${POINDEXTER_BACKUP_DIR:-${USERPROFILE:-${HOME}}/.poindexter/backups/auto}:/backups:ro
    depends_on:
      postgres-local:
        condition: service_healthy

  # ===========================================
  # LiveKit Server — multi-party WebRTC for the conference-call voice agent.
  # MIT-licensed. One container hosts every voice room.
  # ``--dev`` mode: in-memory room store, no TLS (Tailscale Funnel terminates
  # TLS upstream), trivially-recoverable on restart since rooms are ephemeral.
  # API key/secret default to dev values; operators override via env or
  # bootstrap.toml before exposing the port outside the tailnet.
  # ===========================================
  livekit:
    image: livekit/livekit-server:v1.11.0
    container_name: poindexter-livekit
    restart: unless-stopped
    # --node-ip pins what LiveKit advertises to clients in the SDP
    # answer. Without it, --dev auto-detects via STUN and picks the
    # docker-internal IP (e.g. 172.18.0.x) — which the phone's WebRTC
    # client can't reach. Pinning to the Tailscale IP means clients on
    # the tailnet (Matt's pixel-9, his desktop, etc.) hit the LiveKit
    # RTC port directly, bypassing Docker NAT entirely. Override via
    # LIVEKIT_NODE_IP for non-tailnet operators.
    command:
      - "--dev"
      - "--bind"
      - "0.0.0.0"
      - "--node-ip"
      - "${LIVEKIT_NODE_IP:-100.81.93.12}"
    ports:
      - "7880:7880"        # HTTP/WebSocket signalling
      - "7881:7881"        # TCP RTC fallback
      - "7882:7882/udp"    # UDP RTC primary (single port — sufficient for
                           # solo-operator small rooms; expand to a 50000-60000
                           # range later if we run >5 simultaneous peers)
    environment:
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY:?Run 'poindexter setup' — value generated in bootstrap.toml}: ${LIVEKIT_API_SECRET:?Run 'poindexter setup' — value generated in bootstrap.toml}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:7880/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ===========================================
  # GitHub Actions self-hosted CI runners (cloud CI minutes → $0)
  # ===========================================
  # One persistent runner that executes the `unit-tests` workflow on this PC
  # instead of paying GitHub-hosted minutes — unit-tests alone was ~60% of a
  # ~30k-min/month bill. Scope is deliberately just unit-tests; every other
  # workflow stays on ubuntu-latest. The runner stays registered and runs jobs
  # back-to-back; the Actions agent cleans the workspace between runs and the
  # pip/poetry cache volume stays warm so multi-GB wheels (torch /
  # sentence-transformers) download once. (Sized for one runner because the
  # WSL2 VM is the real budget — see the cpus/mem_limit note below.)
  #
  # Opt-in by design: the `ci-runner` profile keeps this OUT of the default
  # `docker compose -f docker-compose.local.yml up -d`, so the stack is
  # unaffected until you enable it (COMPOSE_PROFILES=ci-runner in .env).
  #
  # Auth = a dedicated GitHub App ("glad-labs-ci-runner") installed on
  # Glad-Labs/glad-labs-stack with Administration: Read+write (register runners)
  # and Variables: Read+write (the runner-healthcheck workflow flips the
  # `CI_RUNNER` variable the unit-tests runs-on seam reads). Chosen over a PAT
  # because an App key has no 1-year fine-grained-PAT expiry cliff and mints
  # short-lived (1h) installation tokens on demand. The SAME App ID + private
  # key also go in as repo secrets CI_RUNNER_APP_ID / CI_RUNNER_APP_PRIVATE_KEY
  # for that workflow. Full setup, kill-switch (CI_RUNNER_MODE=off) and tuning:
  # docs/operations/self-hosted-ci-runner.md.
  #
  # ---- SECURITY (load-bearing) ---------------------------------------------
  #  Self-hosted runners must NEVER serve a PUBLIC repo: a fork PR would run
  #  arbitrary code on this machine. The public mirror (Glad-Labs/poindexter)
  #  has no CI_RUNNER variable, so its workflows resolve runs-on to
  #  ubuntu-latest by construction. Do NOT register this runner against
  #  poindexter, and do NOT hardcode `self-hosted` in any workflow file.
  github-runner-1:
    image: myoung34/github-runner:latest
    container_name: poindexter-ci-runner-1
    profiles: ["ci-runner"]
    restart: unless-stopped
    # Clear stale runner registration before the image entrypoint runs. This
    # runner registers fresh on every start ("reusage disabled"), but an
    # UNGRACEFUL restart (Docker Engine / WSL restart, PC sleep, a job killed
    # mid-run) leaves a half-written /actions-runner/.runner + .credentials the
    # entrypoint can neither reuse nor remove ("Cannot configure the runner
    # because it is already configured" + "Value cannot be null (Parameter
    # 'configuredSettings')"). With `restart: unless-stopped` that then
    # crash-loops the SAME container forever, and a plain `compose up -d` can't
    # heal it (config matches desired, so nothing recreates it) — it took a
    # manual `--force-recreate`. Wiping the config first makes every start a
    # clean re-register, so the runner self-recovers from any restart. The image
    # CMD is forwarded verbatim via "$@" (entrypoint=/entrypoint.sh,
    # workdir=/actions-runner are the image's own settings; validated against the
    # pinned image).
    entrypoint:
      - /bin/bash
      - -c
      - 'rm -f /actions-runner/.runner /actions-runner/.credentials /actions-runner/.credentials_rsaparams 2>/dev/null; exec /entrypoint.sh "$@"'
      - --
    # Compose's `entrypoint:` override CLEARS the image's default CMD, so restore
    # it explicitly — otherwise the wrapper execs /entrypoint.sh with an empty
    # "$@", the runner configures then has nothing to run, and it exits right
    # after "Settings Saved" (a register→exit→restart crash loop).
    command: ["./bin/Runner.Listener", "run", "--startuptype", "service"]
    # IMPORTANT — caps are relative to the WSL2 VM, NOT the 64 GB host.
    # `.wslconfig` pins WSL2 to 24 GB / 16 procs, and the ENTIRE Docker stack
    # (postgres, grafana, sdxl, worker, langfuse, observability…) shares that
    # VM — ~14-15 GB is already in use, leaving ~8-9 GB free (less when SDXL
    # spikes). So this is ONE runner sized to fit that headroom, not two at
    # 16 GB. unit-tests is a SERIAL workload (pytest --forked runs one
    # subprocess at a time, no xdist), so its real peak is only a few GB and a
    # single runner suffices — a second concurrent run just queues behind it.
    # Want true concurrency? Raise `.wslconfig` memory (you have 64 GB
    # physical) and add a github-runner-2 — see the runbook.
    cpus: ${CI_RUNNER_CPUS:-8}
    mem_limit: ${CI_RUNNER_MEM:-8g}
    environment:
      # GitHub App creds (Administration: read+write) — the myoung34 image mints
      # fresh, short-lived registration tokens from APP_ID + APP_PRIVATE_KEY on
      # every (re)register. The App path REPLACES ACCESS_TOKEN — never set both.
      # APP_LOGIN (install owner) auto-derives from REPO_URL below, so it's
      # omitted. `:-` not `:?` so an unset value can never break parsing of the
      # rest of this compose file; the profile keeps the runner from starting
      # until you've set them anyway. APP_ID is a plain number (fine in .env);
      # the multiline PEM does NOT live cleanly in a compose .env — export it
      # from a file at `up` time (see the runbook's activation command).
      APP_ID: ${CI_RUNNER_APP_ID:-}
      APP_PRIVATE_KEY: ${CI_RUNNER_APP_PRIVATE_KEY:-}
      REPO_URL: https://github.com/Glad-Labs/glad-labs-stack
      RUNNER_SCOPE: repo
      RUNNER_NAME_PREFIX: glads-pc
      LABELS: self-hosted,linux,x64
      # Pin the agent version to what the stack was tested against; no
      # surprise self-updates mid-job.
      DISABLE_AUTO_UPDATE: "true"
    volumes:
      # Warm pip/poetry cache so torch & friends download once, not per job.
      # The myoung34 image runs jobs as root, so HOME=/root and the cache lives
      # at /root/.cache (verified on the runner). Best-effort optimization;
      # correctness does not depend on it.
      - ci-runner-1-cache:/root/.cache
      # NOTE: the host Docker socket is intentionally NOT mounted. unit-tests
      # is pure pytest with no GitHub Actions `services:`/`container:` jobs, so
      # the runner never needs to drive host Docker — keeping the socket out is
      # least-privilege. If you later move a service-container workflow (e.g.
      # integration-db) onto the runner, add `/var/run/docker.sock:/var/run/docker.sock`.
    extra_hosts:
      # Lets a job reach host-native services (e.g. Ollama on 11434) the same
      # way the rest of the stack does.
      - "host.docker.internal:host-gateway"

  # ---------------------------------------------------------------------------
  # Postiz — self-hosted social media distribution (opt-in, --profile postiz)
  # ---------------------------------------------------------------------------
  # Start with: docker compose --profile postiz up -d postiz-redis postiz-db postiz
  # Connect social accounts at http://localhost:5003 then copy each
  # integration UUID into app_settings (postiz_integration_id_twitter, etc.)
  # ---------------------------------------------------------------------------

  postiz-redis:
    image: redis:7-alpine
    container_name: poindexter-postiz-redis
    profiles: ["postiz"]
    restart: unless-stopped
    volumes:
      - postiz-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  postiz-db:
    image: postgres:16-alpine
    container_name: poindexter-postiz-db
    profiles: ["postiz"]
    restart: unless-stopped
    environment:
      POSTGRES_USER: postiz
      POSTGRES_PASSWORD: ${POSTIZ_DB_PASSWORD:?Set POSTIZ_DB_PASSWORD in your environment or .env}
      POSTGRES_DB: postiz
    volumes:
      - postiz-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postiz -d postiz"]
      interval: 10s
      timeout: 5s
      retries: 5

  postiz-temporal:
    image: temporalio/auto-setup:latest
    container_name: poindexter-postiz-temporal
    profiles: ["postiz"]
    restart: unless-stopped
    environment:
      DB: postgres12
      DB_PORT: "5432"
      POSTGRES_USER: postiz
      POSTGRES_PWD: "${POSTIZ_DB_PASSWORD:?Set POSTIZ_DB_PASSWORD}"
      POSTGRES_SEEDS: postiz-db
    depends_on:
      postiz-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 7233 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  postiz:
    image: ghcr.io/gitroomhq/postiz-app:latest
    container_name: poindexter-postiz
    profiles: ["postiz"]
    restart: unless-stopped
    ports:
      - "5003:5000"
    environment:
      MAIN_URL: "${POSTIZ_URL:-http://localhost:5003}"
      FRONTEND_URL: "${POSTIZ_URL:-http://localhost:5003}"
      NEXT_PUBLIC_BACKEND_URL: "${POSTIZ_URL:-http://localhost:5003}"
      JWT_SECRET: "${POSTIZ_JWT_SECRET:?Set POSTIZ_JWT_SECRET in your environment or .env}"
      DATABASE_URL: "postgresql://postiz:${POSTIZ_DB_PASSWORD:?Set POSTIZ_DB_PASSWORD}@postiz-db:5432/postiz"
      REDIS_URL: "redis://postiz-redis:6379"
      TEMPORAL_URL: "poindexter-postiz-temporal:7233"
      BACKEND_INTERNAL_URL: "http://postiz:3000"
      IS_GENERAL: "false"
      STORAGE_PROVIDER: "local"
      UPLOAD_DIRECTORY: "/uploads"
    volumes:
      - postiz-uploads:/uploads
    depends_on:
      postiz-db:
        condition: service_healthy
      postiz-redis:
        condition: service_healthy
      postiz-temporal:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:3000/api/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

# Volumes deliberately keep the gladlabs-* prefix from the pre-rebrand era.
# Renaming a docker volume in compose creates a fresh empty volume and
# orphans the old one — that means data loss for any existing instance.
# Volumes are rarely customer-visible (only in `docker volume ls`) so the
# name mismatch is acceptable to preserve user data across the rebrand.
volumes:
  # Voice-agent model cache (Whisper / Silero / Kokoro weights). Shared
  # across both voice-agent containers so first-boot downloads benefit
  # both surfaces. ~470 MB after first run.
  voice-agent-cache:
    name: gladlabs-voice-agent-cache
  prefect-redis-data:
  langfuse-clickhouse-data:
  langfuse-clickhouse-logs:
  langfuse-minio-data:
  langfuse-redis-data:
  postgres-local-data:
    name: gladlabs-postgres-local-data
  grafana-data:
    name: gladlabs-grafana-data
  prometheus-data:
    name: gladlabs-prometheus-data
  prometheus-rules:
    name: gladlabs-prometheus-rules
  alertmanager-data:
    name: gladlabs-alertmanager-data
  # #524 — rendered Alertmanager config, shared between the worker
  # (RenderAlertmanagerConfigJob writes alertmanager.yml here) and the
  # alertmanager container (reads it). Mirrors the prometheus-rules volume.
  alertmanager-config:
    name: gladlabs-alertmanager-config
  pgadmin-data:
    name: gladlabs-pgadmin-data
  loki-data:
    name: gladlabs-loki-data
  promtail-positions:
    name: gladlabs-promtail-positions
  uptime-kuma-data:
    name: gladlabs-uptime-kuma-data
  tempo-data:
    name: gladlabs-tempo-data
  glitchtip-db-data:
    name: gladlabs-glitchtip-db-data
  glitchtip-redis-data:
    name: gladlabs-glitchtip-redis-data
  pyroscope-data:
    name: gladlabs-pyroscope-data
  # Warm cache (pip/poetry/tool-cache) so torch & sentence-transformers
  # download once and persist across jobs. (Add ci-runner-2-cache if you ever
  # scale to a second runner — see the runbook.)
  ci-runner-1-cache:
    name: gladlabs-ci-runner-1-cache
  # Postiz volumes (profile: postiz)
  postiz-redis-data:
    name: gladlabs-postiz-redis-data
  postiz-db-data:
    name: gladlabs-postiz-db-data
  postiz-uploads:
    name: gladlabs-postiz-uploads
