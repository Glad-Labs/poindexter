# Grafana Notification Policies — primary: Telegram, fallback: Discord #ops
apiVersion: 1

policies:
  - orgId: 1
    receiver: Glad Labs Telegram
    group_by:
      - grafana_folder
      - alertname
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 1h
    routes:
      # Send all alerts to Discord as well (redundancy)
      - receiver: Glad Labs Discord
        continue: true
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 1h
