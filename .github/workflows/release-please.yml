name: Release Please

on:
    push:
        branches:
            - main

permissions:
    contents: write
    pull-requests: write

jobs:
    release-please:
        runs-on: ubuntu-latest

        # Only run on the public Glad-Labs/poindexter repo. The private
        # glad-labs-stack mirrors this workflow file (sync filter doesn't
        # strip workflows by default), but we don't want versioning on the
        # private operator repo — there's nothing to release there, just a
        # main branch that deploys on every push. The conditional below is
        # the single source of "release-please runs only on public".
        if: |
          github.repository == 'Glad-Labs/poindexter' &&
          !contains(github.event.head_commit.message, '[skip ci]')

        steps:
            - name: "\U0001F4E6 Run Release Please"
              id: release
              uses: googleapis/release-please-action@c3fc4de07084f75a2b61a5b933069bda6edf3d5c # v4
              with:
                  release-type: node
                  # Manifest mode: reads config from release-please-config.json
                  # and tracks versions in .release-please-manifest.json
                  config-file: release-please-config.json
                  manifest-file: .release-please-manifest.json

            # Auto-merge the release PR if branch protection's required
            # checks all pass. Combined with required test-backend +
            # migrations-smoke + Mintlify checks, this means: every commit
            # with a feat:/fix: that lands on public main triggers a
            # release-please PR within minutes, runs through CI, and
            # auto-merges → tag + GitHub Release. Zero manual touch.
            - name: "\U0001F501 Enable auto-merge on the release PR"
              if: ${{ steps.release.outputs.pr }}
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  # Pipe the JSON via env var (NOT inline interpolation).
                  # The release-please PR body contains apostrophes,
                  # backticks, and parens from the changelog — inlining
                  # `${{ steps.release.outputs.pr }}` into a single-quoted
                  # bash string breaks on the first apostrophe and bash
                  # exits with `syntax error near unexpected token '('`.
                  # Failure pattern repeated 5×/day until this fix.
                  RELEASE_PR_JSON: ${{ steps.release.outputs.pr }}
              run: |
                  pr_number=$(jq -r .number <<< "$RELEASE_PR_JSON")
                  echo "Enabling auto-merge on release PR #${pr_number}"
                  gh pr merge "${pr_number}" --squash --auto --repo "${{ github.repository }}"

            # GitHub Release + tag is created automatically by release-please
            # itself once the release PR merges.
