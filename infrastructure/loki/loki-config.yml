# Loki config — log aggregation for Glad Labs local stack.
#
# Minimal single-binary deployment (no Cassandra, no S3, no cluster).
# Filesystem storage; retention handled by the compactor.
#
# Talks HTTP on :3100 inside the docker network. Grafana reads it via
# the pre-provisioned "Loki" datasource.

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: info

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

ruler:
  alertmanager_url: http://alertmanager:9093

limits_config:
  retention_period: 720h      # 30 days
  ingestion_rate_mb: 16
  ingestion_burst_size_mb: 32
  max_streams_per_user: 10000
  # Accept samples up to retention window. Default 168h was rejecting
  # historical container logs on first promtail startup (gitea has logs
  # going back months from before Loki existed).
  reject_old_samples: true
  reject_old_samples_max_age: 720h
  allow_structured_metadata: true

compactor:
  working_directory: /loki/compactor
  compaction_interval: 10m
  retention_enabled: true
  retention_delete_delay: 2h
  retention_delete_worker_count: 150
  delete_request_store: filesystem
