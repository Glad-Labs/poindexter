# Writer-mode prompts — used by services/writer_rag_modes/* handlers.
#
# These ship as YAML defaults for first boot. UnifiedPromptManager loads
# them at startup; Langfuse production-label overrides take effect on the
# next get_prompt call without a worker restart (60s SDK cache). Per
# feedback_prompts_must_be_db_configurable: every LLM prompt is
# operator-tunable. Inline f-strings are tech debt.
#
# Keys follow the dotted shape: writer_rag_modes.<mode>.<purpose>.
# Variables use {name} placeholders matched against str.format kwargs.
# Curly literals inside JSON-shaped templates must be doubled: {{ and }}.

- key: writer_rag_modes.two_pass.revise_prompt
  category: blog_generation
  description: "TWO_PASS revision-stage prompt — rewrites a draft, substituting [EXTERNAL_NEEDED: ...] markers with the corresponding external facts."
  output_format: markdown
  template: |
    Revise the following draft. For each [EXTERNAL_NEEDED: ...] marker,
    substitute the corresponding external fact provided below. Keep everything else unchanged.
    If revision exposes a new claim that needs outside support, mark it [EXTERNAL_NEEDED: ...]
    again so the next pass can fill it.

    Original draft:
    {draft}

    External facts:
    {aug_block}

- key: writer_rag_modes.generate_with_context
  category: blog_generation
  description: "Generic RAG-writer prompt — builds a blog draft from topic, angle, optional extra instructions, and background-snippet context. Used by ai_content_generator.generate_with_context (the writer rag_modes call when no rag-mode supplies its own expand step)."
  output_format: markdown
  template: |
    Write a blog post on the topic: "{topic}" with this angle: "{angle}".

    {instructions}

    Background context (cite where relevant):
    {snippet_block}

    Return the full post body in Markdown.

# story_spine.outline_prompt + story_spine.expand_prompt deleted
# 2026-05-28 with the STORY_SPINE writer mode itself. Only the
# two_pass + generic generate_with_context prompts remain.
