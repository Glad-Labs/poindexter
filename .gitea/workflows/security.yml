# Gitea Actions mirror of .github/workflows/security.yml. Runs the same
# gitleaks / Trivy / SBOM+grype gates on the private monorepo so breakage
# is caught before the mirror to GitHub. No SARIF upload here — Gitea has
# no code-scanning tab — results stay in the job logs + artifacts.
name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '17 6 * * 1'

jobs:
  gitleaks:
    name: gitleaks — secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          curl -sSfL -o gitleaks.tar.gz \
            https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          chmod +x gitleaks
          ./gitleaks version
      - name: Run gitleaks (baselined — only NEW findings fail)
        run: |
          ./gitleaks detect \
            --config=.gitleaks.toml \
            --baseline-path=.gitleaks-baseline.json \
            --source=. \
            --verbose \
            --redact \
            --exit-code=1

  trivy-fs:
    name: Trivy — filesystem vuln scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Trivy
        # The upstream install.sh piped through /usr/local/bin failed
        # silently on the Gitea runner ("Failure - Main Install Trivy" with no
        # stderr). Fetch the release tarball directly, same pattern as the
        # gitleaks install below — zero shell wrapper, zero privileged paths.
        # Bumped to v0.69.3 to match .github/workflows/security.yml.
        run: |
          curl -sSfL -o trivy.tar.gz \
            https://github.com/aquasecurity/trivy/releases/download/v0.69.3/trivy_0.69.3_Linux-64bit.tar.gz
          tar -xzf trivy.tar.gz trivy
          chmod +x trivy
          ./trivy --version
      - name: Scan filesystem (fail on HIGH/CRITICAL)
        run: |
          ./trivy fs . \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 1 \
            --format table \
            --skip-dirs '**/node_modules,**/.venv,**/__pycache__,**/.next,**/.vercel,**/dist,**/build,**/.pytest_cache,**/.claude'
      - name: Scan Dockerfiles / compose for misconfig
        run: |
          ./trivy config . \
            --severity HIGH,CRITICAL \
            --exit-code 1 \
            --format table \
            --skip-dirs '**/node_modules,**/.venv,**/__pycache__,**/.next,**/.vercel,**/dist,**/build,**/.pytest_cache,**/.claude'

  sbom-grype:
    name: SBOM + grype scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install syft + grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sh -s -- -b /usr/local/bin v1.18.0
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh \
            | sh -s -- -b /usr/local/bin v0.85.0
          syft version
          grype version
      - name: Generate SBOM (CycloneDX JSON)
        run: syft packages dir:. -o cyclonedx-json=sbom.cdx.json
      - name: Scan SBOM with grype (fail on HIGH/CRITICAL)
        run: grype sbom:sbom.cdx.json --fail-on high --only-fixed
      # upload-artifact@v4 uses the new @actions/artifact v2 API which isn't
      # supported on Gitea Actions (GHES-compatible runner). Pin to v3 which
      # uses the older API Gitea does implement. GitHub's .github/ security.yml
      # can stay on v4 — that runs on real GitHub Actions.
      - uses: actions/upload-artifact@v3
        if: always()
        with:
          name: sbom-cyclonedx
          path: sbom.cdx.json
          retention-days: 30
