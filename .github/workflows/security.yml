name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Weekly baseline scan catches CVEs that appear in deps between PRs.
  schedule:
    - cron: '17 6 * * 1'
  # Manual trigger — useful after re-enabling the workflow (2026-05-12,
  # poindexter#403) or to force a re-scan after a credential rotation /
  # CVE patch without waiting for the next push.
  workflow_dispatch:

# Cancel older in-progress runs of the same ref/PR — saves Actions minutes
# when multiple commits land back-to-back on the same PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  security-events: write

jobs:
  # Path-classifier (Glad-Labs/poindexter CI-minutes sweep). The four
  # file-specific lint jobs below (trivy-config / action-pins /
  # shell-line-endings / poetry-lock) only need to run when their inputs
  # change — gating them on this output skips up to 4 of the 7 jobs on a
  # typical backend-only PR (each job otherwise bills a rounded-up minute
  # of runner spin-up). Security is NOT a branch-protection-required check,
  # so a skipped job blocks nothing.
  #
  # gitleaks / trivy-fs / sbom stay UNGATED — a secret or vulnerable dep can
  # land in any file, so those always run. On the weekly baseline scan and
  # manual dispatch, every job runs regardless (the `|| schedule ||
  # workflow_dispatch` escape on each gated `if:`), so the comprehensive
  # scan is never narrowed by path classification.
  changes:
    name: classify changed paths
    runs-on: ubuntu-latest
    outputs:
      workflows: ${{ steps.classify.outputs.workflows }}
      shell: ${{ steps.classify.outputs.shell }}
      pylock: ${{ steps.classify.outputs.pylock }}
      docker: ${{ steps.classify.outputs.docker }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4.3.1 as of 2026-05-12
        with:
          # >=2 so `git diff` against the parent works on push; PRs use the
          # virtual merge commit's HEAD^1 (current main's tip).
          fetch-depth: 2
      # Pure git-diff path classifier — NO third-party action on purpose.
      # This repo's Actions allowlist permits only github-owned + verified-
      # creator actions plus an explicit pattern list (see
      # docs/operations/ci-deploy-chain.md), so dorny/paths-filter etc. fail
      # at startup. Mirrors the detect-changes step in unit-tests.yml.
      - name: Classify changed paths
        id: classify
        env:
          EVENT: ${{ github.event_name }}
          PR_BASE: ${{ github.event.pull_request.base.sha }}
        run: |
          set -uo pipefail

          # Resolve the diff base. PR events check out a virtual merge commit
          # (HEAD^1 = main's tip); push events diff against the parent.
          if [ "$EVENT" = "pull_request" ]; then
            if git cat-file -e "HEAD^1" 2>/dev/null; then
              base="$(git rev-parse HEAD^1)"
            else
              base="${PR_BASE:-}"
            fi
          else
            base="$(git rev-parse HEAD^ 2>/dev/null || true)"
          fi

          # Fetch the base if the shallow checkout didn't include it.
          if [ -n "${base:-}" ] && ! git cat-file -e "${base}^{commit}" 2>/dev/null; then
            git fetch --no-tags --depth=1 origin "$base" 2>/dev/null || true
          fi

          if [ -n "${base:-}" ] && git cat-file -e "${base}^{commit}" 2>/dev/null; then
            changed="$(git diff --name-only "$base" HEAD)"
          else
            # Unknown base (initial push / fetch failure) — fail OPEN: treat
            # everything as changed so no scan is silently skipped.
            changed="$(git ls-files)"
          fi
          echo "Changed files vs ${base:-<none>}:"
          echo "$changed" | sed 's/^/  /'

          emit() { echo "$1=$2" >> "$GITHUB_OUTPUT"; echo "  -> $1=$2"; }
          # A broad match here only ever over-runs a scan (safe); the risk to
          # avoid is under-running, so patterns lean inclusive.
          if echo "$changed" | grep -qE '^\.github/workflows/'; then emit workflows true; else emit workflows false; fi
          if echo "$changed" | grep -qE '\.(sh|bash)$'; then emit shell true; else emit shell false; fi
          if echo "$changed" | grep -qE '^src/cofounder_agent/(pyproject\.toml|poetry\.lock)$'; then emit pylock true; else emit pylock false; fi
          if echo "$changed" | grep -qiE 'dockerfile|docker-compose|(^|/)compose\.ya?ml$|^infrastructure/'; then emit docker true; else emit docker false; fi

  gitleaks:
    name: gitleaks — secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4.3.1 as of 2026-05-12
        # No fetch-depth: 0 — we scan with --no-git so git history isn't
        # needed and a shallow checkout is enough.
      # Use the gitleaks CLI directly instead of gitleaks/gitleaks-action@v2,
      # which requires a paid org license. Mirrors the same scan logic across
      # both the private (glad-labs-stack) repo and the public (poindexter)
      # mirror.
      #
      # --no-git: scan the working tree, not git history. This makes the
      # baseline fingerprints (file:rule:line) stable across commits.
      # Scanning history was the previous mode and produced 433+ findings
      # because every commit-shift created new fingerprints — the baseline
      # couldn't keep up, and the gate failed every push.
      #
      # The pre-commit hook (gitleaks 'protect --staged') still catches
      # secrets before they hit history, so history-mode isn't load-bearing.
      #
      # --baseline-path: every entry in .gitleaks-baseline.json is a triaged
      # known-OK match (curl/auth docstring examples, fixture-shaped strings,
      # rotated credentials embedded in remediation migrations). NEW findings
      # in the working tree still fail the build via --exit-code=1.
      - name: Install gitleaks
        run: |
          curl -sSfL -o gitleaks.tar.gz \
            https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          chmod +x gitleaks
          ./gitleaks version
      - name: Run gitleaks
        run: |
          ./gitleaks detect \
            --no-git \
            --config=.gitleaks.toml \
            --source=. \
            --baseline-path=.gitleaks-baseline.json \
            --verbose \
            --redact \
            --exit-code=1

  trivy-fs:
    name: Trivy — filesystem vuln scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4.3.1 as of 2026-05-12
      - name: Trivy filesystem scan (HIGH/CRITICAL gate)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'
          format: table
          # venv / node_modules / build caches are reproducible from lockfiles
          # — skipping them keeps the scan fast and stops Trivy choking on
          # the Windows-bytecode cache pyc files in mcp-server/.venv.
          skip-dirs: '**/node_modules,**/.venv,**/__pycache__,**/.next,**/.vercel,**/dist,**/build,**/.pytest_cache,**/.claude'
          # The gitleaks baseline contains REDACTED+Match fields that look
          # like leaked secrets to a secret-scanner pattern matcher; it's
          # the documented record of known-clean findings, not a leak.
          skip-files: '.gitleaks-baseline.json'
      - name: Trivy filesystem scan (SARIF for code-scanning tab)
        if: always()
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: sarif
          output: trivy-fs.sarif
          skip-dirs: '**/node_modules,**/.venv,**/__pycache__,**/.next,**/.vercel,**/dist,**/build,**/.pytest_cache,**/.claude'
          # The gitleaks baseline contains REDACTED+Match fields that look
          # like leaked secrets to a secret-scanner pattern matcher; it's
          # the documented record of known-clean findings, not a leak.
          skip-files: '.gitleaks-baseline.json'
      - name: Upload SARIF
        # GitHub Advanced Security is required to accept SARIF uploads on
        # private repos. glad-labs-stack doesn't have GHAS — the API
        # returns "Resource not accessible by integration". On the public
        # poindexter mirror, code-scanning is free, so uploads work there.
        # 2026-05-12 (poindexter#404) — added the repo guard to silence
        # the dead-end upload on private.
        if: always() && github.repository == 'Glad-Labs/poindexter'
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa  # v3.35.4 as of 2026-05-12
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  trivy-config:
    name: Trivy — Dockerfile + IaC config
    runs-on: ubuntu-latest
    needs: changes
    # Only when Dockerfiles / compose / IaC change (or the comprehensive
    # weekly + manual scans). CI-minutes sweep.
    if: ${{ needs.changes.outputs.docker == 'true' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4.3.1 as of 2026-05-12
      - name: Scan Dockerfiles / compose for misconfig
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: config
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: '1'
          format: table
          skip-dirs: '**/node_modules,**/.venv,**/__pycache__,**/.next,**/.vercel,**/dist,**/build,**/.pytest_cache,**/.claude'
          # The gitleaks baseline contains REDACTED+Match fields that look
          # like leaked secrets to a secret-scanner pattern matcher; it's
          # the documented record of known-clean findings, not a leak.
          skip-files: '.gitleaks-baseline.json'
          # See .trivyignore for justified suppressions (currently DS-0002
          # on backup / gpu-exporter / voice-agent / auto-embed images
          # that legitimately need root for bind-mount or driver access).
          trivyignores: '.trivyignore'

  action-pins:
    name: Lint third-party Actions for SHA pins
    runs-on: ubuntu-latest
    needs: changes
    # Only when workflow files change (or the comprehensive scans). CI-minutes sweep.
    if: ${{ needs.changes.outputs.workflows == 'true' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    # Defends against the floating-tag supply-chain vector.
    # Fails the build if any `uses:` in .github/workflows/ points at a
    # tag/branch instead of a 40-char commit SHA. Pure-stdlib script —
    # no pip install needed.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4.3.1 as of 2026-05-12
      - name: Run check-action-pins
        run: python scripts/ci/check-action-pins.py

  shell-line-endings:
    name: Lint shell scripts for LF line endings
    runs-on: ubuntu-latest
    needs: changes
    # Only when shell scripts change (or the comprehensive scans). CI-minutes sweep.
    if: ${{ needs.changes.outputs.shell == 'true' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    # Regression gate for the DbBackupJob `set: pipefail: invalid opt`
    # crash. ``.gitattributes`` normalizes ``*.sh`` to ``eol=lf`` on
    # fresh checkouts, but a contributor on Windows can re-introduce
    # CRLF (editor save-as, ``git config core.autocrlf=true`` in a
    # personal global), and the worker bind-mounts ``./scripts`` into
    # the container -- CRLF bytes there crash bash on ``set -euo
    # pipefail``. Fails the build the moment any tracked
    # ``*.sh`` / ``*.bash`` file carries ``\r``. Pure-stdlib script.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4.3.1 as of 2026-05-12
      - name: Run check-shell-line-endings
        run: python scripts/ci/check-shell-line-endings.py

  poetry-lock:
    name: poetry check --lock (src/cofounder_agent)
    runs-on: ubuntu-latest
    needs: changes
    # Only when pyproject.toml / poetry.lock change (or the comprehensive scans). CI-minutes sweep.
    if: ${{ needs.changes.outputs.pylock == 'true' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    # GH#180 defense-in-depth — the same check runs locally as a pre-commit
    # hook (.pre-commit-config.yaml) AND in the test workflow on Gitea
    # (.gitea/workflows/ci.yml). Mirroring it here protects the public
    # GitHub mirror in case a contributor opens a PR without pre-commit
    # installed and without going through Gitea CI first.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4.3.1 as of 2026-05-12
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v5.6.0 as of 2026-05-12
        with:
          python-version: '3.13'
      - name: Install Poetry
        run: pipx install poetry
      - name: Verify poetry.lock matches pyproject.toml
        run: |
          cd src/cofounder_agent
          poetry check --lock

  sbom:
    name: SBOM + grype scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4.3.1 as of 2026-05-12

      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0 as of 2026-05-12
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.cdx.json
          artifact-name: sbom-cyclonedx

      - name: Scan SBOM with grype (HIGH/CRITICAL gate)
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2  # v5.3.0 as of 2026-05-12
        id: grype-scan
        with:
          sbom: sbom.cdx.json
          fail-build: true
          severity-cutoff: high
          output-format: sarif

      - name: Upload grype SARIF
        # Same GHAS gating as trivy-fs above — private repo can't accept
        # SARIF; public mirror can.
        if: always() && steps.grype-scan.outputs.sarif != '' && github.repository == 'Glad-Labs/poindexter'
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa  # v3.35.4 as of 2026-05-12
        with:
          sarif_file: ${{ steps.grype-scan.outputs.sarif }}
          category: grype-sbom
