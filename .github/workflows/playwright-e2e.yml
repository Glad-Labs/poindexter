# Playwright E2E gate (glad-labs-stack#977 / poindexter#977).
#
# Before this workflow there was NO Playwright run in CI — the public
# site's e2e/ suite only ran on someone's machine, so a layout/route
# regression on www.gladlabs.io could merge green. (The Jest unit run now has
# its own CI gate — jest-unit.yml, poindexter#1290 — so it is no longer
# hook-only. JS lint remains hook-only; Vercel ignores both.)
#
# Scope (intentional): this job runs the FRONTEND-ONLY specs — the ones
# that exercise statically-served Next.js pages and need no FastAPI
# backend. The root playwright.config.ts auto-starts `npm run dev:public`
# (Next.js on :3000) via its `webServer` block; its globalSetup pings the
# backend health endpoint but TOLERATES it being down (warns + continues),
# so a backend-less run is safe for these specs.
#
# Frontend-only specs (verified: zero localhost:8000/8002 or /api/ calls):
#   - web/public-site/e2e/about.spec.ts
#   - web/public-site/e2e/legal.spec.ts
#   - web/public-site/e2e/post-detail.spec.ts
#
# The backend-dependent specs (auth / author / task-workflow /
# manual-publish-pipeline / workflow-capability / integration-tests /
# fixtures-validation / tag) are STAGED behind a separate job that sets
# SKIP_SERVER_START=true and points PLAYWRIGHT_TEST_BASE_URL at
# www.gladlabs.io (production). The scheduled weekly run exercises the
# read-only backend-dependent specs against production; the full suite
# (including write-heavy manual-publish-pipeline) is workflow_dispatch-only.
# (glad-labs-stack#1291 — backend-e2e was never dispatched until this change.)
#
# Third-party actions are pinned by SHA (repo convention — see
# unit-tests.yml / migrations-smoke.yml).
name: playwright-e2e

on:
  # This job is NOT a branch-protection-required check (only `test-backend`
  # and `migrations-smoke` are), so a `paths:` filter is safe here — a PR
  # that doesn't touch the frontend simply never queues this workflow and
  # nothing waits on it. (Required checks can't be path-filtered — they'd
  # never report and block the PR forever; those gate their *steps* instead.
  # See unit-tests.yml.) The frontend-only specs only exercise the
  # statically-served Next.js site, so a backend/docs/infra-only change has
  # zero chance of regressing them — skipping the ~Chromium-build run for
  # those is free savings. Glad-Labs/glad-labs-stack CI-minutes sweep.
  push:
    branches: [main]
    paths:
      - 'web/public-site/**'
      - 'playwright.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/playwright-e2e.yml'
  pull_request:
    branches: [main]
    paths:
      - 'web/public-site/**'
      - 'playwright.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/playwright-e2e.yml'
  # Weekly scheduled run: Monday 06:00 UTC — runs backend-e2e (read-only specs)
  # against production (www.gladlabs.io). Not a PR gate; quality signal only.
  # Fixes Glad-Labs/glad-labs-stack#1291.
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  frontend-e2e:
    name: Frontend-only Playwright specs
    # Skip on the weekly scheduled run — that trigger exists only to fire
    # backend-e2e (production read-only checks). Frontend specs need a built
    # Next.js binary which is only warranted on push/PR/workflow_dispatch.
    if: ${{ github.event_name != 'schedule' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      CI: "true"
      # Only install + drive Chromium to keep the run lean — the
      # frontend-only specs don't need the full browser matrix in CI.
      PLAYWRIGHT_BROWSERS: chromium
      # next.config.js validateEnv() requires a non-localhost https API URL
      # for production builds (Vercel sets this; CI must too). The site reads
      # content from the R2 static fallback baked into lib/posts.ts, so this
      # value is only the vestigial plumbing the build validation insists on.
      NEXT_PUBLIC_API_BASE_URL: "https://www.gladlabs.io"

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4.3.1 as of 2026-05-12

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: "npm"

      - name: Install workspace dependencies
        # `npm ci` at the repo root installs every workspace (including
        # web/public-site) from the committed package-lock.json. Playwright
        # (@playwright/test ^1.60) is a root devDependency. Fall back to
        # `npm install` if the committed root lock has drifted (a
        # pre-existing drift, tracked separately) so this new E2E gate
        # isn't what blocks on it.
        run: npm ci || npm install

      - name: Install Playwright browsers (chromium)
        # --with-deps pulls the OS libraries chromium needs on ubuntu.
        run: npx playwright install --with-deps chromium

      - name: Build public site
        # Build once so the Next.js dev server the config boots serves the
        # real production-shaped routes the specs assert against.
        run: npm run build --workspace=web/public-site

      - name: Run frontend-only Playwright specs (chromium)
        # The root playwright.config.ts starts `npm run dev:public`
        # (Next.js :3000) via its webServer block, then runs the named
        # specs. globalSetup tolerates a missing backend, so no FastAPI
        # worker is required for these static-page specs.
        run: >
          npx playwright test
          --project=chromium
          web/public-site/e2e/about.spec.ts
          web/public-site/e2e/legal.spec.ts
          web/public-site/e2e/post-detail.spec.ts

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.6.2 as of 2026-05-12
        with:
          name: playwright-report
          path: |
            test-results/playwright/html-report
            test-results/playwright/results.json
            test-results/playwright/junit.xml
          retention-days: 7
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # Backend-dependent specs — scheduled weekly + manual-dispatch.
  #
  # Scheduled run (Monday 06:00 UTC — glad-labs-stack#1291):
  #   Runs the READ-ONLY backend-dependent specs against production
  #   (https://www.gladlabs.io). SKIP_SERVER_START=true so no local Next.js
  #   server is booted; the specs hit the live site directly. This is a
  #   quality signal — NOT a PR gate.
  #
  #   Read-only specs safe to run against production (no task creation):
  #     auth / author / integration-tests / fixtures-validation / tag
  #
  # workflow_dispatch:
  #   Runs the FULL suite including write-heavy specs (task-workflow /
  #   manual-publish-pipeline / workflow-capability). The operator is expected
  #   to provide PLAYWRIGHT_TEST_BASE_URL / PLAYWRIGHT_API_URL pointing at a
  #   reachable stack (e.g. Tailnet-accessible local worker). Write-heavy
  #   specs use `Bearer dev-token` + DEVELOPMENT_MODE=true which are NOT
  #   present on production, so they are excluded from the scheduled run.
  # ---------------------------------------------------------------------------
  backend-e2e:
    name: Backend-dependent Playwright specs (scheduled + manual)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      CI: "true"
      # Don't boot a local Next.js server — point at an already-running stack.
      # For the scheduled run this is www.gladlabs.io (production).
      SKIP_SERVER_START: "true"
      # Scheduled run: target production. workflow_dispatch: operator overrides
      # via env inputs to point at a local/staging stack for write-heavy specs.
      PLAYWRIGHT_TEST_BASE_URL: ${{ github.event_name == 'schedule' && 'https://www.gladlabs.io' || vars.PLAYWRIGHT_TEST_BASE_URL || 'https://www.gladlabs.io' }}

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4.3.1 as of 2026-05-12

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: "npm"

      - name: Install workspace dependencies
        # Fall back to npm install on pre-existing root-lock drift.
        run: npm ci || npm install

      - name: Install Playwright browsers (chromium)
        run: npx playwright install --with-deps chromium

      - name: Run read-only backend specs against production (scheduled)
        # Scheduled weekly run: exercises the read-only backend-dependent specs
        # against https://www.gladlabs.io. No task creation; no dev-token auth.
        # Covers: auth resilience / author rendering / integration health /
        # fixtures sanity / tag archive pages.
        if: ${{ github.event_name == 'schedule' }}
        run: >
          npx playwright test
          --project=chromium
          web/public-site/e2e/auth.spec.ts
          web/public-site/e2e/author.spec.ts
          web/public-site/e2e/integration-tests.spec.ts
          web/public-site/e2e/fixtures-validation.spec.ts
          web/public-site/e2e/tag.spec.ts

      - name: Run full backend-dependent specs (manual dispatch)
        # workflow_dispatch: full suite including write-heavy specs. Operator
        # should set PLAYWRIGHT_TEST_BASE_URL / PLAYWRIGHT_API_URL (or set
        # vars.PLAYWRIGHT_TEST_BASE_URL in repo/org settings) to a local stack
        # reachable on the Tailnet with DEVELOPMENT_MODE=true.
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: >
          npx playwright test
          --project=chromium
          web/public-site/e2e/auth.spec.ts
          web/public-site/e2e/author.spec.ts
          web/public-site/e2e/task-workflow.spec.ts
          web/public-site/e2e/manual-publish-pipeline.spec.ts
          web/public-site/e2e/workflow-capability.spec.ts
          web/public-site/e2e/integration-tests.spec.ts
          web/public-site/e2e/fixtures-validation.spec.ts
          web/public-site/e2e/tag.spec.ts

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.6.2 as of 2026-05-12
        with:
          name: playwright-report-backend
          path: |
            test-results/playwright/html-report
            test-results/playwright/results.json
            test-results/playwright/junit.xml
          retention-days: 7
          if-no-files-found: ignore
