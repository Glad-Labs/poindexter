# Default prompts — functional but basic. Premium prompts available at gladlabs.io

- key: blog_generation.initial_draft
  category: blog_generation
  description: "Default prompt — upgrade to Glad Labs Premium Prompts for production-quality output"
  output_format: markdown
  template: |
    Write a blog post about: {topic}
    Style: {style}, Tone: {tone}, Length: ~{target_length} words.
    Use research context if provided: {research_context}

    IMPORTANT OUTPUT RULES:
    - Write ONLY the article in markdown. No preamble, no meta-commentary.
    - Do NOT include image descriptions, image prompts, alt text suggestions, or visual placeholders.
    - Do NOT include lines like "*A dramatic scene of...*" or "[IMAGE: ...]" or "![description]".
    - Do NOT describe what illustrations, photos, or diagrams should look like.
    - Images are handled separately — your job is text only.

    INTERNAL LINKING RULES:
    - When linking to related articles, weave the link naturally into the sentence.
    - Put the link on a relevant keyword or phrase, NOT on the article title.
    - GOOD: "...choosing your [database technology](/posts/slug) carefully"
    - GOOD: "...as with any [production deployment](/posts/slug), testing matters"
    - BAD: "As discussed in [Article Title](/posts/slug), this is important"
    - BAD: "As [Article Title](/posts/slug) explains, you should..."
    - The reader should not notice the link is to another article — it should feel like part of the sentence.

- key: blog_generation.seo_and_social
  category: blog_generation
  description: "Default prompt — upgrade to Glad Labs Premium Prompts for production-quality output"
  output_format: json
  template: |
    Generate SEO metadata for this blog post as JSON with keys: title, meta_description, keywords, og_title, og_description.
    Blog topic: {topic}

- key: blog_generation.iterative_refinement
  category: blog_generation
  description: "Default prompt — upgrade to Glad Labs Premium Prompts for production-quality output"
  output_format: markdown
  template: |
    Revise this blog post based on the feedback provided.
    Original: {content}
    Feedback: {feedback}

- key: blog_generation.blog_system_prompt
  category: blog_generation
  description: "Default prompt — upgrade to Glad Labs Premium Prompts for production-quality output"
  output_format: markdown
  template: |
    You are a blog writer. Write in a {style} style for {target_audience}.
    Domain: {domain}. Tone: {tone}.
    Output pure markdown article text only. Never include image prompts, image descriptions,
    visual placeholders, or italic scene descriptions. Images are handled by a separate system.

    CITATION RULES:
    - Do NOT cite specific papers, studies, or research by name unless you can provide a working URL.
    - Do NOT use "et al." references or academic citation formats.
    - Use general phrasing like "recent research suggests" or "industry benchmarks show" instead of naming fabricated sources.
    - If referencing a real, well-known source (e.g., official documentation, major publications), name it but acknowledge you cannot verify the exact URL.
    - Never invent paper titles, study names, or author names.

- key: blog_generation.blog_generation_request
  category: blog_generation
  description: "Default prompt — upgrade to Glad Labs Premium Prompts for production-quality output"
  output_format: text
  template: |
    Generate a blog post. Topic: {topic}. Style: {style}. Length: {target_length} words.
