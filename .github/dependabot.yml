version: 2

updates:
  # ────────────────────────────────────
  # GitHub Actions (workflows)
  # ────────────────────────────────────
  - package-ecosystem: 'github-actions'
    directory: '/'
    target-branch: 'main'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '03:00'
    open-pull-requests-limit: 5
    pull-request-branch-name:
      separator: '/'
    labels:
      - 'dependencies'
      - 'github-actions'
    commit-message:
      prefix: 'ci:'
      include: 'scope'
    rebase-strategy: 'auto'

  # ────────────────────────────────────
  # npm (Node.js packages — root workspace)
  # ────────────────────────────────────
  - package-ecosystem: 'npm'
    directory: '/'
    target-branch: 'main'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '03:30'
    open-pull-requests-limit: 5
    pull-request-branch-name:
      separator: '/'
    labels:
      - 'dependencies'
      - 'npm'
    commit-message:
      prefix: 'deps:'
      include: 'scope'
    rebase-strategy: 'auto'
    # Group updates by type for easier review
    groups:
      development:
        dependency-type: 'development'
      production:
        dependency-type: 'production'

  # ────────────────────────────────────
  # npm — web/starter (Next.js template)
  # ────────────────────────────────────
  - package-ecosystem: 'npm'
    directory: '/web/starter'
    target-branch: 'main'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '03:35'
    open-pull-requests-limit: 5
    pull-request-branch-name:
      separator: '/'
    labels:
      - 'dependencies'
      - 'npm'
    commit-message:
      prefix: 'deps:'
      include: 'scope'
    rebase-strategy: 'auto'
    groups:
      web-starter-minor-patch:
        update-types:
          - 'minor'
          - 'patch'

  # ────────────────────────────────────
  # npm — Cloudflare Workers page-views beacon
  # ────────────────────────────────────
  - package-ecosystem: 'npm'
    directory: '/infrastructure/cloudflare/page-views-beacon'
    target-branch: 'main'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '03:40'
    open-pull-requests-limit: 5
    pull-request-branch-name:
      separator: '/'
    labels:
      - 'dependencies'
      - 'npm'
    commit-message:
      prefix: 'deps:'
      include: 'scope'
    rebase-strategy: 'auto'
    groups:
      beacon-minor-patch:
        update-types:
          - 'minor'
          - 'patch'

  # ────────────────────────────────────
  # Python — src/cofounder_agent (pip / Poetry)
  # ────────────────────────────────────
  - package-ecosystem: 'pip'
    directory: '/src/cofounder_agent'
    target-branch: 'main'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '04:00'
    open-pull-requests-limit: 5
    pull-request-branch-name:
      separator: '/'
    labels:
      - 'dependencies'
      - 'python'
    commit-message:
      prefix: 'deps:'
      include: 'scope'
    rebase-strategy: 'auto'

  # ────────────────────────────────────
  # Python — brain daemon (Poetry)
  # ────────────────────────────────────
  - package-ecosystem: 'pip'
    directory: '/brain'
    target-branch: 'main'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '04:05'
    open-pull-requests-limit: 5
    pull-request-branch-name:
      separator: '/'
    labels:
      - 'dependencies'
      - 'python'
    commit-message:
      prefix: 'deps:'
      include: 'scope'
    rebase-strategy: 'auto'

  # ────────────────────────────────────
  # Python — root pyproject.toml (Poetry)
  # ────────────────────────────────────
  - package-ecosystem: 'pip'
    directory: '/'
    target-branch: 'main'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '04:10'
    open-pull-requests-limit: 5
    pull-request-branch-name:
      separator: '/'
    labels:
      - 'dependencies'
      - 'python'
    commit-message:
      prefix: 'deps:'
      include: 'scope'
    rebase-strategy: 'auto'

  # ────────────────────────────────────
  # Python — mcp-server (uv)
  # ────────────────────────────────────
  - package-ecosystem: 'uv'
    directory: '/mcp-server'
    target-branch: 'main'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '04:15'
    open-pull-requests-limit: 5
    pull-request-branch-name:
      separator: '/'
    labels:
      - 'dependencies'
      - 'python'
    commit-message:
      prefix: 'deps:'
      include: 'scope'
    rebase-strategy: 'auto'
    groups:
      mcp-server-minor-patch:
        update-types:
          - 'minor'
          - 'patch'

  # ────────────────────────────────────
  # Python — mcp-server-gladlabs (uv, private operator overlay)
  # ────────────────────────────────────
  - package-ecosystem: 'uv'
    directory: '/mcp-server-gladlabs'
    target-branch: 'main'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '04:20'
    open-pull-requests-limit: 5
    pull-request-branch-name:
      separator: '/'
    labels:
      - 'dependencies'
      - 'python'
    commit-message:
      prefix: 'deps:'
      include: 'scope'
    rebase-strategy: 'auto'
    groups:
      mcp-server-gladlabs-minor-patch:
        update-types:
          - 'minor'
          - 'patch'

  # ────────────────────────────────────
  # Python — mcp-server-voice (uv)
  # ────────────────────────────────────
  - package-ecosystem: 'uv'
    directory: '/mcp-server-voice'
    target-branch: 'main'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '04:25'
    open-pull-requests-limit: 5
    pull-request-branch-name:
      separator: '/'
    labels:
      - 'dependencies'
      - 'python'
    commit-message:
      prefix: 'deps:'
      include: 'scope'
    rebase-strategy: 'auto'
    groups:
      mcp-server-voice-minor-patch:
        update-types:
          - 'minor'
          - 'patch'

  # ────────────────────────────────────
  # Docker (base images)
  # ────────────────────────────────────
  - package-ecosystem: 'docker'
    directory: '/'
    target-branch: 'main'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '04:30'
    open-pull-requests-limit: 3
    labels:
      - 'dependencies'
      - 'docker'
    commit-message:
      prefix: 'ci:'
