# Infrastructure alerts — Prometheus + Alertmanager counterparts
# of the legacy brain/health_probes.py probes.
#
# Phase D additive-first migration (GitHub #68):
# - These rules ship alongside the existing probe loop
# - Fire into a non-production Telegram channel at first
# - After 1-2 weeks of verified parity, the brain daemon's probe loop
#   can stop running these specific checks

groups:
  - name: poindexter-infrastructure
    interval: 30s
    rules:
      # --- Worker reachability ---
      - alert: PoindexterWorkerDown
        expr: up{job="poindexter-worker"} == 0
        for: 2m
        labels:
          severity: critical
          category: infrastructure
        annotations:
          summary: "Poindexter worker is not reachable"
          description: |
            The worker has failed Prometheus scrapes for 2+ minutes.
            Check `docker ps` for the poindexter-worker container;
            check logs with `docker logs poindexter-worker --tail 100`.

      - alert: PoindexterWorkerUnhealthy
        expr: poindexter_worker_up == 0
        for: 2m
        labels:
          severity: critical
          category: infrastructure
        annotations:
          summary: "Worker reports itself unhealthy"
          description: |
            `/metrics` is reachable but `poindexter_worker_up` is 0.
            The worker is alive but something in its self-check failed.

      # --- Postgres ---
      - alert: PoindexterPostgresDown
        expr: poindexter_postgres_connected == 0
        for: 1m
        labels:
          severity: critical
          category: infrastructure
        annotations:
          summary: "Worker cannot round-trip Postgres"
          description: |
            `SELECT 1` is failing from the worker. Likely the
            poindexter-postgres-local container is down or the pool
            is exhausted. Pipeline won't process tasks until fixed.

      # --- Ollama ---
      - alert: PoindexterOllamaDown
        expr: poindexter_ollama_reachable == 0
        for: 3m
        labels:
          severity: warning
          category: infrastructure
        annotations:
          summary: "Ollama is not reachable from the worker"
          description: |
            `/api/tags` on Ollama hasn't returned 200 for 3 minutes.
            All LLM calls are failing. Check `ollama list` on the host
            and `ollama serve` status.

      # --- Host disk space ---
      #
      # Real disk-space alerting, sourced from windows_exporter's
      # `windows_logical_disk_free_bytes` (the `windows` scrape job on
      # host.docker.internal:9182). This REPLACES the broken Grafana SQL
      # rule "Disk Space Low" (alert-rules.yml #15), which claimed to
      # measure free disk but actually queried `pg_database_size()` and
      # duplicated the "DB Size Warning" rule — so the host could fill up
      # silently while a DB-size rule masqueraded as disk monitoring.
      #
      # Filtered to drive-letter volumes (`[A-Z]:`) so the tiny EFI /
      # recovery partitions windows_exporter also reports
      # (HarddiskVolume1/4, ~0.1 GB, always near-full) can't false-fire.
      # The `volume` label is preserved so the page names the affected
      # drive. Thresholds are absolute GB (not a percentage) because what
      # actually hurts — Docker images, Postgres growth, model files —
      # is absolute headroom, and a percentage floor false-fires on the
      # 2 TB drives (11% of 2 TB is still 220 GB free). Tune the 20/10 GB
      # cutoffs if a small data volume routinely runs near the line.
      - alert: PoindexterDiskSpaceLow
        expr: |
          windows_logical_disk_free_bytes{volume=~"[A-Z]:"} / (1024*1024*1024) < 20
        for: 10m
        labels:
          severity: warning
          category: infrastructure
        annotations:
          summary: "Host disk {{ $labels.volume }} has under 20 GB free"
          description: |
            Volume {{ $labels.volume }} on the worker host has
            {{ $value | humanize }} GB free (warning under 20 GB).
            Free space before it reaches the critical 10 GB floor:
            run `powershell scripts/docker-prune.ps1`, clear old model
            files, or archive `cost_logs` / `page_views`.

      - alert: PoindexterDiskSpaceCritical
        expr: |
          windows_logical_disk_free_bytes{volume=~"[A-Z]:"} / (1024*1024*1024) < 10
        for: 5m
        labels:
          severity: critical
          category: infrastructure
        annotations:
          summary: "Host disk {{ $labels.volume }} has under 10 GB free — imminent"
          description: |
            Volume {{ $labels.volume }} on the worker host is down to
            {{ $value | humanize }} GB free. Postgres writes, Docker
            pulls, and image generation will start failing. Free space
            now: `powershell scripts/docker-prune.ps1`.
