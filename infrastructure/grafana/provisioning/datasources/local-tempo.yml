apiVersion: 1

datasources:
  - name: Tempo
    type: tempo
    uid: local-tempo
    access: proxy
    url: http://tempo:3200
    isDefault: false
    editable: true
    jsonData:
      # Link spans back to their logs via the traceID label Promtail
      # adds from structured worker logs (see telemetry.py's span IDs).
      tracesToLogsV2:
        datasourceUid: local-loki
        filterByTraceID: true
        spanStartTimeShift: -5m
        spanEndTimeShift: 5m
      # Link spans to RED metrics generated by tempo's span-metrics
      # processor (see tempo-config.yml overrides).
      tracesToMetrics:
        datasourceUid: local-prometheus
      # Link service-graphs nodes to the Prometheus metrics Tempo's
      # service-graphs processor writes via remote_write.
      serviceMap:
        datasourceUid: local-prometheus
      # Auto-correlate logs ↔ traces via the standard trace_id tag.
      nodeGraph:
        enabled: true
