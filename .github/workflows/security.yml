name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Weekly baseline scan catches CVEs that appear in deps between PRs.
  schedule:
    - cron: '17 6 * * 1'
  # Manual trigger — useful after re-enabling the workflow (2026-05-12,
  # poindexter#403) or to force a re-scan after a credential rotation /
  # CVE patch without waiting for the next push.
  workflow_dispatch:

# Cancel older in-progress runs of the same ref/PR — saves Actions minutes
# when multiple commits land back-to-back on the same PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  security-events: write

jobs:
  gitleaks:
    name: gitleaks — secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1 as of 2026-05-12
        # No fetch-depth: 0 — we scan with --no-git so git history isn't
        # needed and a shallow checkout is enough.
      # Use the gitleaks CLI directly instead of gitleaks/gitleaks-action@v2,
      # which requires a paid org license. Mirrors the same scan logic across
      # both the private (glad-labs-stack) repo and the public (poindexter)
      # mirror.
      #
      # --no-git: scan the working tree, not git history. This makes the
      # baseline fingerprints (file:rule:line) stable across commits.
      # Scanning history was the previous mode and produced 433+ findings
      # because every commit-shift created new fingerprints — the baseline
      # couldn't keep up, and the gate failed every push.
      #
      # The pre-commit hook (gitleaks 'protect --staged') still catches
      # secrets before they hit history, so history-mode isn't load-bearing.
      #
      # --baseline-path: every entry in .gitleaks-baseline.json is a triaged
      # known-OK match (curl/auth docstring examples, fixture-shaped strings,
      # rotated credentials embedded in remediation migrations). NEW findings
      # in the working tree still fail the build via --exit-code=1.
      - name: Install gitleaks
        run: |
          curl -sSfL -o gitleaks.tar.gz \
            https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          chmod +x gitleaks
          ./gitleaks version
      - name: Run gitleaks
        run: |
          ./gitleaks detect \
            --no-git \
            --config=.gitleaks.toml \
            --source=. \
            --baseline-path=.gitleaks-baseline.json \
            --verbose \
            --redact \
            --exit-code=1

  trivy-fs:
    name: Trivy — filesystem vuln scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1 as of 2026-05-12
      - name: Trivy filesystem scan (HIGH/CRITICAL gate)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'
          format: table
          # venv / node_modules / build caches are reproducible from lockfiles
          # — skipping them keeps the scan fast and stops Trivy choking on
          # the Windows-bytecode cache pyc files in mcp-server/.venv.
          skip-dirs: '**/node_modules,**/.venv,**/__pycache__,**/.next,**/.vercel,**/dist,**/build,**/.pytest_cache,**/.claude'
          # The gitleaks baseline contains REDACTED+Match fields that look
          # like leaked secrets to a secret-scanner pattern matcher; it's
          # the documented record of known-clean findings, not a leak.
          skip-files: '.gitleaks-baseline.json'
      - name: Trivy filesystem scan (SARIF for code-scanning tab)
        if: always()
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: sarif
          output: trivy-fs.sarif
          skip-dirs: '**/node_modules,**/.venv,**/__pycache__,**/.next,**/.vercel,**/dist,**/build,**/.pytest_cache,**/.claude'
          # The gitleaks baseline contains REDACTED+Match fields that look
          # like leaked secrets to a secret-scanner pattern matcher; it's
          # the documented record of known-clean findings, not a leak.
          skip-files: '.gitleaks-baseline.json'
      - name: Upload SARIF
        # GitHub Advanced Security is required to accept SARIF uploads on
        # private repos. glad-labs-stack doesn't have GHAS — the API
        # returns "Resource not accessible by integration". On the public
        # poindexter mirror, code-scanning is free, so uploads work there.
        # 2026-05-12 (poindexter#404) — added the repo guard to silence
        # the dead-end upload on private.
        if: always() && github.repository == 'Glad-Labs/poindexter'
        uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e  # v3.35.4 as of 2026-05-12
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  trivy-config:
    name: Trivy — Dockerfile + IaC config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1 as of 2026-05-12
      - name: Scan Dockerfiles / compose for misconfig
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: config
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: '1'
          format: table
          skip-dirs: '**/node_modules,**/.venv,**/__pycache__,**/.next,**/.vercel,**/dist,**/build,**/.pytest_cache,**/.claude'
          # The gitleaks baseline contains REDACTED+Match fields that look
          # like leaked secrets to a secret-scanner pattern matcher; it's
          # the documented record of known-clean findings, not a leak.
          skip-files: '.gitleaks-baseline.json'
          # See .trivyignore for justified suppressions (currently DS-0002
          # on backup / gpu-exporter / voice-agent / auto-embed images
          # that legitimately need root for bind-mount or driver access).
          trivyignores: '.trivyignore'

  action-pins:
    name: Lint third-party Actions for SHA pins
    runs-on: ubuntu-latest
    # Defends against the audit-2026-05-12 P1 #14 floating-tag vector.
    # Fails the build if any `uses:` in .github/workflows/ points at a
    # tag/branch instead of a 40-char commit SHA. Pure-stdlib script —
    # no pip install needed.
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1 as of 2026-05-12
      - name: Run check-action-pins
        run: python scripts/ci/check-action-pins.py

  poetry-lock:
    name: poetry check --lock (src/cofounder_agent)
    runs-on: ubuntu-latest
    # GH#180 defense-in-depth — the same check runs locally as a pre-commit
    # hook (.pre-commit-config.yaml) AND in the test workflow on Gitea
    # (.gitea/workflows/ci.yml). Mirroring it here protects the public
    # GitHub mirror in case a contributor opens a PR without pre-commit
    # installed and without going through Gitea CI first.
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1 as of 2026-05-12
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v5.6.0 as of 2026-05-12
        with:
          python-version: '3.13'
      - name: Install Poetry
        run: pipx install poetry
      - name: Verify poetry.lock matches pyproject.toml
        run: |
          cd src/cofounder_agent
          poetry check --lock

  sbom:
    name: SBOM + grype scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1 as of 2026-05-12

      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0.24.0 as of 2026-05-12
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.cdx.json
          artifact-name: sbom-cyclonedx

      - name: Scan SBOM with grype (HIGH/CRITICAL gate)
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2  # v5.3.0 as of 2026-05-12
        id: grype-scan
        with:
          sbom: sbom.cdx.json
          fail-build: true
          severity-cutoff: high
          output-format: sarif

      - name: Upload grype SARIF
        # Same GHAS gating as trivy-fs above — private repo can't accept
        # SARIF; public mirror can.
        if: always() && steps.grype-scan.outputs.sarif != '' && github.repository == 'Glad-Labs/poindexter'
        uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e  # v3.35.4 as of 2026-05-12
        with:
          sarif_file: ${{ steps.grype-scan.outputs.sarif }}
          category: grype-sbom
