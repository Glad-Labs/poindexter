# Promtail config — scrapes Docker container logs and ships to Loki.
#
# Strategy: tail /var/lib/docker/containers/*/**-json.log (each container's
# json log file) with Docker-SD labels so queries like
# {container="poindexter-worker"} or {compose_project="glad-labs-website"}
# work out of the box in Grafana Explore.

server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn            # Keep promtail itself quiet

positions:
  filename: /var/log/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    tenant_id: glad-labs

scrape_configs:
  # --- Docker service discovery: every running container's stdout/stderr.
  # Relabels translate Docker metadata into Loki stream labels.
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 30s

    relabel_configs:
      # Container name -> "container" label (trim the leading slash).
      - source_labels: [__meta_docker_container_name]
        regex: '/(.+)'
        target_label: container

      # Compose project name -> "compose_project" label. Useful to slice
      # "everything in the glad-labs-website stack" vs "everything else".
      - source_labels: [__meta_docker_container_label_com_docker_compose_project]
        target_label: compose_project

      # Compose service name -> "service" label (worker, brain-daemon, etc.)
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: service

      # Image name -> "image" for debugging mystery containers.
      - source_labels: [__meta_docker_container_log_stream]
        target_label: stream

      # Drop the docker-SD internal labels from the final stream set —
      # they'd otherwise bloat the stream cardinality.
    pipeline_stages:
      # Container logs come wrapped as JSON: {"log":"...","stream":"stderr","time":"..."}
      # Unwrap so Loki sees the raw log line.
      - cri: {}
      - docker: {}
