name: Test on Dev Branch

on:
  push:
    branches:
      - dev

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      NODE_ENV: test
      LOG_LEVEL: debug

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: "npm"

      - name: 🐍 Setup Python
        uses: actions/setup-python@7f4fc3e22c37d6ff65e88745f38bd3157c663f7c # v4
        with:
          python-version: "3.12"

      # ============================================
      # INSTALL PHASE
      # ============================================

      - name: 📦 Install Node dependencies
        run: npm ci  # fix #145: root npm ci handles all workspaces

      - name: 📦 Install Poetry
        run: |
          python -m pip install --upgrade pip poetry
          poetry config virtualenvs.create false

      - name: 📦 Install Python dependencies via Poetry
        # fix #146: use Poetry everywhere for consistency with production
        run: |
          cd src/cofounder_agent
          poetry install --no-root
          cd ../..

      # ============================================
      # TEST PHASE
      # ============================================

      - name: 🧪 Run frontend tests with coverage
        run: npm run test:ci
        # fix #144: removed continue-on-error — failures should be visible on dev

      - name: 🧪 Enforce coverage thresholds (oversight-hub)
        run: cd web/oversight-hub && npx vitest run --pool=forks --poolOptions.forks.maxForks=2
        # Coverage flag removed: @vitest/coverage-v8 not in devDependencies

      - name: 🧪 Run backend unit tests
        run: |
          cd src/cofounder_agent && poetry run pytest tests/unit/ -v --tb=short

      - name: 🧪 Run backend integration tests
        run: cd src/cofounder_agent && poetry run pytest tests/integration/ tests/e2e/ -v --tb=short
        continue-on-error: true  # integration/e2e tests require DATABASE_URL — not available without service containers

      - name: 🔍 Run linting
        run: npm run lint
        continue-on-error: true  # lint warnings acceptable on dev, errors surfaced in logs

      - name: 🏗️ Build check (all workspaces)
        run: npm run build --if-present
        # No continue-on-error — build failures should block dev CI

      # ============================================
      # E2E TESTS (frontend-only specs, no backend needed)
      # ============================================

      - name: 🎭 Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: 🎭 Run Playwright E2E tests (frontend pages)
        run: |
          npx playwright test --project=chromium \
            web/public-site/e2e/about.spec.ts \
            web/public-site/e2e/legal.spec.ts \
            web/public-site/e2e/tag.spec.ts \
            web/public-site/e2e/post-detail.spec.ts \
            web/public-site/e2e/author.spec.ts
        env:
          SKIP_ENV_VALIDATION: "true"
          NEXT_PUBLIC_API_BASE_URL: "http://localhost:8000"
          NEXT_PUBLIC_FASTAPI_URL: "http://localhost:8000"
          NEXT_PUBLIC_SITE_URL: "http://localhost:3000"
        continue-on-error: true  # E2E may be flaky in CI — surface results without blocking

      - name: ✅ Testing complete for dev
        run: echo "Dev branch testing complete - ready for staging deployment"
