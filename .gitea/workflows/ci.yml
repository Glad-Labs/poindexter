# Gitea Actions CI — local test runner (custom image with Python + Node)
name: CI — Test

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        run: |
          cd /tmp
          git clone --depth 1 --branch ${GITHUB_REF_NAME:-main} ${GITHUB_SERVER_URL:-http://gitea:3000}/${GITHUB_REPOSITORY:-gladlabs/glad-labs-codebase}.git work
          cp -r work/. ${GITHUB_WORKSPACE:-.}

      - name: Verify tools
        run: |
          python3 --version
          node --version
          poetry --version
          git --version

      - name: Backend unit tests
        run: |
          cd src/cofounder_agent
          poetry config virtualenvs.create false
          poetry install --no-root --no-interaction
          poetry run pytest tests/unit/ -q --tb=short -x \
            --ignore=tests/unit/services/test_web_research.py \
            --ignore=tests/unit/agents/test_content_agent_pexels_client.py \
            --ignore=tests/unit/agents/test_content_agent_postgres_image_agent.py \
            --ignore=tests/unit/routes/test_newsletter_routes.py \
            --ignore=tests/unit/services/test_memory_client.py
