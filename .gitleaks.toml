# gitleaks config — repo-local overrides on top of the bundled default rules.
# Reason this file exists: bootstrap.toml example snippets, migration docs,
# and the GlitchTip DSN format (http://<public_key>@host/<project_id>) look
# like secrets but aren't. Allowlist them here so gitleaks doesn't fire on
# our own docs.
#
# Historical findings: .gitleaks-baseline.json freezes the 336 pre-adoption
# leaks detected when this gate landed (all credentials rotated already —
# see `session_52_polish.md`). CI passes the baseline so only NEW leaks
# fail the gate. Do not remove the baseline without re-triaging it.

title = "Poindexter gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "Global allowlist for paths that can't realistically contain real secrets"
paths = [
  '''(?i).*\.lock$''',
  '''(?i).*\.min\.js$''',
  '''(?i)CHANGELOG\.md$''',
  '''(?i)^brain/seed_app_settings\.json$''',
  # Grafana-provisioned dashboard JSON is public config, not secrets.
  '''(?i)^infrastructure/grafana/dashboards/.*\.json$''',
  # Test fixtures intentionally embed secret-shaped strings to exercise the
  # scrubbers, provider-key validators, and secret-storage helpers. The
  # private baseline suppresses these per-finding; adding the path here lets
  # the public repo's gitleaks pass without shipping the baseline externally.
  '''(?i)^src/cofounder_agent/tests/.*\.py$''',
  # Documentation examples: curl snippets, Authorization header demos,
  # placeholder bearer tokens like "YOUR_API_TOKEN" / "$TOKEN" / "dev-token".
  '''(?i)^docs/.*\.md$''',
  # Legacy paths deleted from the working tree but still present in git
  # history. All credentials in those files were rotated when each stack
  # was retired (see session_52_polish.md). The 2026-04-08 baseline did
  # capture every finding, but baseline matching is keyed on Fingerprint
  # (commit:file:rule:line) and gitleaks v8.30.1 reports off-by-one line
  # numbers vs. the v8.x version that generated the baseline, so all 177
  # entries miss. Path-allowlisting the legacy prefixes is correct —
  # they're not in the working tree, so no new secrets can land under
  # them; only history scans hit them.
  '''(?i)^cms/.*''',          # Strapi v4/v5 backends, retired 2025-10
  '''(?i)^src/agents/.*''',   # legacy content-agent, replaced by cofounder_agent
  '''(?i)^archive/.*''',      # phase-plans, sessions, orchestrator-legacy
  '''(?i)^infrastructure/headscale/certs/.*''',  # rotated TLS keys, key only valid for retired tailnet
  '''(?i)^web/oversight-hub/.*''',  # retired admin UI, all firebase keys revoked
  '''(?i)^tests/.*''',        # legacy top-level tests/ tree (current tests live under src/cofounder_agent/tests)
  # Legacy phase/implementation docs at repo root — all deleted but
  # historical fingerprints still match. Each was a one-off planning doc
  # that quoted example secrets; none of those secrets are live. Patterns
  # here are tight so they don't accidentally cover repo-meta files like
  # README.md / CHANGELOG.md / CLAUDE.md / SECURITY.md / SUPPORT.md /
  # CODE_OF_CONDUCT.md / CONTRIBUTING.md (those stay scanned).
  '''(?i)^[A-Z0-9_]+_(GUIDE|FIX|CHECKLIST|PLAN|COMPLETE|SUMMARY|DIAGNOSIS|REFERENCE|REPORT|ANALYSIS|VERIFICATION|EXPOSURE_FIX|STATUS|READY|SOLUTION|ROADMAP|TASK_ID|INTEGRATION|TEST|CHANGES)\.md$''',
  '''(?i)^(PHASE|WEEK|IMPLEMENTATION|FINAL_IMPLEMENTATION)[A-Z0-9_]*\.(md|py)$''',
  '''(?i)^[0-9]+_(ERROR|QUICK)_[A-Z_]+\.md$''',  # 422_ERROR_DIAGNOSIS.md, 422_QUICK_FIX.md
  '''(?i)^test[_-][A-Za-z0-9_-]+\.(py|html|sh)$''',  # legacy root-level test_* / test-* scripts
  '''(?i)^(START_HERE|FIXES_APPLIED|JWT_SIGNATURE_FIX_COMPLETE|LANGGRAPH_IMPLEMENTATION_COMPLETE|MODEL_SELECTION_FEATURE_COMPLETE|TASK_APPROVAL_WORKFLOW_DATA_LOSS_FIX|S3_IMPLEMENTATION_COMPLETE|SEED_DATA_READY|STRAPI_STARTUP_STATUS|RTX_5090_QUICK_REFERENCE|RTX_5090_SDXL_SOLUTION|FASTAPI_CODEBASE_ANALYSIS|DOC_AGENT_GUIDE|DEBUG_GUIDE|DEPLOYMENT_READY|PRODUCTION_AUTH_FIXES|PRODUCTION_LAUNCH_GUIDE)\.md$''',
]

# Specific examples gitleaks mis-flags. Keep this list tight — every entry
# is a place we've decided a string that LOOKS like a secret isn't one.
regexTarget = "line"
regexes = [
  # GlitchTip/Sentry DSNs document the public-key form in docs + docker-compose.
  '''http://[0-9a-f]{32}@[a-z0-9\-]+:\d+/\d+''',
  # bootstrap.toml example placeholders written as "<generated>" etc.
  '''<generated[^>]*>''',
]
