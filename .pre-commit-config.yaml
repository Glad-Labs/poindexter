repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
        # gitleaks' pre-commit hook runs `protect --staged` by default, which
        # scans only what's in the commit — it won't hit the historical 336
        # findings frozen in .gitleaks-baseline.json.

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
        args: ['--maxkb=5120']
      - id: check-merge-conflict
      - id: check-yaml
        args: ['--allow-multiple-documents']
        exclude: '^infrastructure/grafana/dashboards/.*\.json$'
      - id: end-of-file-fixer
        exclude: '\.(svg|json)$'
      - id: trailing-whitespace
        exclude: '\.md$'

  # Warn (don't block) when the repo isn't configured to sign commits.
  # See docs/operations/commit-signing.md + scripts/setup-git-signing.sh.
  - repo: local
    hooks:
      - id: warn-unsigned-commits
        name: warn if commit.gpgsign is off
        entry: scripts/check-commit-signing.sh
        language: script
        stages: [pre-commit]
        always_run: true
        pass_filenames: false
        # Must not fail the commit — emit warning only. The script always
        # exits 0; this flag is belt-and-suspenders.
        verbose: true

      # GH#93 Phase 3 — reject new os.getenv / os.environ reads in
      # src/cofounder_agent/services/ outside the explicit allowlist of
      # bootstrap / config / subprocess-plumbing modules. See the
      # script's ALLOWED_FILES dict for the existing exemptions and the
      # justification each one carries.
      - id: no-os-getenv-in-services
        name: reject new os.getenv in services/
        entry: python scripts/check-no-os-getenv-in-services.py
        language: system
        pass_filenames: false
        files: '^src/cofounder_agent/services/.*\.py$'
        stages: [pre-commit]

      # GH#180 — block poetry.lock drift before it lands in a commit.
      # Mirrors the `poetry check --lock` step in .gitea/workflows/ci.yml
      # (and the new defense-in-depth job in .github/workflows/security.yml).
      # Only fires when src/cofounder_agent/{pyproject.toml,poetry.lock} is
      # in the staged changes — other Python projects in this repo
      # (mcp-server/, src/cofounder_agent/poindexter/) use uv, not Poetry.
      - id: poetry-check-lock
        name: poetry check --lock (src/cofounder_agent)
        entry: bash -c 'cd src/cofounder_agent && poetry check --lock'
        language: system
        pass_filenames: false
        files: '^src/cofounder_agent/(pyproject\.toml|poetry\.lock)$'
        stages: [pre-commit]
