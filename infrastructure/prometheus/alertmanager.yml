# Alertmanager config — Phase D4 (GitHub #68).
#
# Single webhook receiver: every alert lands on the worker at
# /api/webhooks/alertmanager and the worker dispatches in code
# (persist to alert_events → page operator if critical/infra →
# look up plugin.remediation.<alertname> for auto-fix).
#
# Why one receiver instead of three:
# - Dispatch logic is easier to read in Python than in YAML routes
# - Brain daemon shares the DB pool; it reads alert_events directly
#   for observability, no separate brain-bound webhook needed
# - OpenClaw already owns Telegram/Discord bot tokens — the worker
#   calls _notify_openclaw() which handles the channel split
# - One endpoint = one place to add auth when we need it
#
# Inhibition still happens at the Alertmanager layer (below) so
# lower-severity alerts are suppressed when a related critical is
# firing — no point paging the operator twice.

global:
  resolve_timeout: 5m

route:
  receiver: poindexter-webhook
  group_by: ["alertname", "category"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: poindexter-webhook
    webhook_configs:
      - url: http://worker:8002/api/webhooks/alertmanager
        send_resolved: true

# Inhibition rules — suppress lower-severity alerts when a related
# higher-severity one is firing.
inhibit_rules:
  - source_matchers:
      - severity = "critical"
    target_matchers:
      - severity = "warning"
    equal: ["alertname", "instance"]
