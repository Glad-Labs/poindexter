# Grafana Alert Rules — Brain DB health monitoring
# Template file — rendered by RenderGrafanaAlertsJob into alert-rules.yml.
# All numeric thresholds use {threshold.X} tokens sourced from
# app_settings.grafana.threshold.* (defaults in grafana_alert_builder.py).
# DO NOT edit alert-rules.yml directly; edit this template.
apiVersion: 1

# Rules to delete on next provisioning reload.
# File provisioning adds/updates but never deletes unless listed here.
#
# brain-disk-space-low: removed 2026-06-03 (was a zombie — query measured DB
#   size, not host disk space; real disk-space alerting is in Prometheus
#   PoindexterDiskSpaceLow/PoindexterDiskSpaceCritical). The rule survived in
#   Grafana despite being removed from the groups section because provisioning
#   never deletes without an explicit deleteRules entry. Fixed by poindexter#707.
#
# pdx-3284a28f04a74668a128 / pdx-7732e2490cf72fa34c1a /
# pdx-4d7e330818f74a089dca / pdx-4a031b0eb580f1cc7137: api-provenance rules
#   created 2026-05-14 with noDataState/execErrState both OK (silent failures).
#   Three of the four had SQL strings mis-routed to the prometheus datasource
#   (always no-data → always silently OK). The valid one (Worker Down PromQL)
#   is re-provisioned below with correct error states. Fixed by poindexter#707.
deleteRules:
  - orgId: 1
    uid: brain-disk-space-low
  - orgId: 1
    uid: pdx-3284a28f04a74668a128
  - orgId: 1
    uid: pdx-7732e2490cf72fa34c1a
  - orgId: 1
    uid: pdx-4d7e330818f74a089dca
  - orgId: 1
    uid: pdx-4a031b0eb580f1cc7137

groups:
  - orgId: 1
    name: brain-db-health
    folder: Glad Labs Alerts
    interval: 1m
    rules:
      # 1. HIGH ERROR RATE — more than 5 errors
      #    in audit_log in the last 1 hour(s)
      - uid: brain-high-error-rate
        title: High Error Rate
        condition: C
        for: 0s
        # `count(*)` always returns a row in a healthy DB, so no-data can
        # only mean `audit_log` was renamed/dropped or the datasource is
        # down — i.e. the rule went blind. Surface that loudly instead of
        # resolving green (fail-loud, no silent fallbacks). See #581.
        noDataState: Alerting
        execErrState: Error
        labels:
          severity: critical
          team: glad-labs
        annotations:
          summary: "High error rate detected in audit_log"
          description: "More than 5 errors logged in the last 1 hour(s) (current: {{ $values.B.Value }}). Investigate recent failures in the brain pipeline."
        data:
          - refId: A
            datasourceUid: local-brain-db
            relativeTimeRange:
              from: 3600
              to: 0
            model:
              rawSql: "SELECT count(*) as error_count FROM audit_log WHERE severity = 'error' AND timestamp > NOW() - INTERVAL '1 hours'"
              format: table
              editorMode: code
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              type: reduce
              expression: A
              reducer: last
              settings:
                mode: dropNN
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 5
                  operator:
                    type: and
                  reducer:
                    type: last

      # 2. STALE TASKS — tasks stuck in_progress for > 2 hours
      - uid: brain-stale-tasks
        title: Stale Tasks
        condition: C
        for: 0s
        # `count(*)` over a VIEW (pipeline_tasks_view) always returns a
        # row when healthy; no-data means the view was repointed/dropped
        # by a migration or the datasource is down — a dark subsystem, not
        # "all healthy". Page on it rather than silently passing. See #581.
        noDataState: Alerting
        execErrState: Error
        labels:
          severity: warning
          team: glad-labs
        annotations:
          summary: "Tasks stuck in_progress for over 2 hours"
          description: "{{ $values.B.Value }} task(s) have been in_progress without updates for more than 2 hours. This likely indicates a hung worker or lost connection."
        data:
          - refId: A
            datasourceUid: local-brain-db
            relativeTimeRange:
              from: 7200
              to: 0
            model:
              rawSql: "SELECT count(*) as stuck_count FROM pipeline_tasks_view WHERE status = 'in_progress' AND updated_at < NOW() - INTERVAL '2 hours'"
              format: table
              editorMode: code
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              type: reduce
              expression: A
              reducer: last
              settings:
                mode: dropNN
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 0
                  operator:
                    type: and
                  reducer:
                    type: last

      # 3. EMBEDDING SYNC LAG — newest embedding is > 6 hours old
      - uid: brain-embedding-sync-lag
        title: Embedding Sync Lag
        condition: C
        for: 0s
        noDataState: Alerting
        execErrState: Error
        labels:
          severity: warning
          team: glad-labs
        annotations:
          summary: "Embedding sync is lagging - newest embedding is over 6 hours old"
          description: "The most recent embedding is {{ $values.B.Value }} hours old. Auto-embed may be stuck or the pipeline is not generating new content."
        data:
          - refId: A
            datasourceUid: local-brain-db
            relativeTimeRange:
              from: 21600
              to: 0
            model:
              rawSql: "SELECT EXTRACT(EPOCH FROM NOW() - MAX(created_at))/3600 as hours_since FROM embeddings"
              format: table
              editorMode: code
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              type: reduce
              expression: A
              reducer: last
              settings:
                mode: dropNN
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 6
                  operator:
                    type: and
                  reducer:
                    type: last

      # 4. DB SIZE WARNING — database exceeds 5 GB
      - uid: brain-db-size-warning
        title: DB Size Warning
        condition: C
        for: 0s
        # INTENTIONALLY left on OK (#581). This is a non-page-worthy
        # capacity warning, not an outage signal. `pg_database_size()`
        # only returns no-data if the datasource itself is unreachable —
        # and that condition is already surfaced loudly by the two
        # critical rules on this same datasource (Worker Offline,
        # Brain Daemon Stale, both Alerting). Flipping this too would just
        # add a redundant capacity page on top of the real outage page.
        noDataState: OK
        execErrState: Error
        labels:
          severity: warning
          team: glad-labs
        annotations:
          summary: "Brain database exceeds 5 GB"
          description: "poindexter_brain database size is {{ $values.B.Value }} GB. Consider archiving old data or pruning retention_policies rows (sensor_samples, cost_logs, embeddings)."
        data:
          - refId: A
            datasourceUid: local-brain-db
            relativeTimeRange:
              from: 600
              to: 0
            model:
              rawSql: "SELECT pg_database_size('poindexter_brain') / (1024*1024*1024.0) as size_gb"
              format: table
              editorMode: code
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              type: reduce
              expression: A
              reducer: last
              settings:
                mode: dropNN
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 5
                  operator:
                    type: and
                  reducer:
                    type: last

      # 5. DAILY COST SPIKE — cost_logs SUM in last 24h exceeds $5
      - uid: brain-daily-cost-spike
        title: Daily Cost Spike
        condition: C
        for: 0s
        # `COALESCE(SUM(...),0)` always returns a row when healthy; no-data
        # means `cost_logs` was renamed/dropped or the datasource is down.
        # A blind cost alarm is worse than a noisy one — surface it. #581.
        noDataState: Alerting
        execErrState: Error
        labels:
          severity: warning
          team: glad-labs
        annotations:
          summary: "LLM spending exceeded $5 in the last 24h"
          description: "Total cost in the last 24 hours is ${{ $values.B.Value }}. Check cost_logs for runaway API calls."
        data:
          - refId: A
            datasourceUid: local-brain-db
            relativeTimeRange:
              from: 86400
              to: 0
            model:
              rawSql: "SELECT COALESCE(SUM(cost_usd), 0) as daily_cost FROM cost_logs WHERE created_at > NOW() - INTERVAL '24 hours'"
              format: table
              editorMode: code
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              type: reduce
              expression: A
              reducer: last
              settings:
                mode: dropNN
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 5
                  operator:
                    type: and
                  reducer:
                    type: last

      # 6. CONTENT QUALITY DROP — avg quality_score of PUBLISHED/APPROVED
      #    tasks over last 7 days below 70.
      #
      #    Filtering to status IN ('published','approved') is the whole point
      #    of this alert: it should measure quality of what readers actually
      #    see, NOT the quality of every generation attempt. Including
      #    rejected tasks here makes the alert fire when the auto_publish_gate
      #    is doing its job — catching bad output (scores like 0, 7, 27)
      #    before it reaches the site.
      #
      #    2026-05-20 incident: alert firing at 69.36 with rejected scores
      #    0/7/27/64 dragging the unfiltered average below 70, while the
      #    published+approved-only average was 83.30 (healthy). Brain
      #    auto-triage misdiagnosed the same incident as "outdated worker
      #    build" via the unrelated probe.migration_drift_unknown signal —
      #    see ~/.claude/.../memory/feedback_verify_brain_triage_before_acting.
      - uid: brain-content-quality-drop
        title: Content Quality Drop
        condition: C
        for: 0s
        # `COALESCE(AVG(...),100)` over a VIEW always returns a row when
        # healthy; no-data means the view was repointed/dropped or the
        # datasource is down. Surface that rather than reporting "quality
        # is fine" off a blind query. See #581.
        noDataState: Alerting
        execErrState: Error
        labels:
          severity: warning
          team: glad-labs
        annotations:
          summary: "Average published-content quality score dropped below 70"
          description: "7-day average quality score (published+approved tasks only) is {{ $values.B.Value }}. Review pipeline prompts or model performance."
        data:
          - refId: A
            datasourceUid: local-brain-db
            relativeTimeRange:
              from: 604800
              to: 0
            model:
              rawSql: "SELECT COALESCE(AVG(quality_score), 100) as avg_score FROM pipeline_tasks_view WHERE quality_score IS NOT NULL AND status IN ('published','approved') AND updated_at > NOW() - INTERVAL '7 days'"
              format: table
              editorMode: code
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              type: reduce
              expression: A
              reducer: last
              settings:
                mode: dropNN
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: lt
                    params:
                      - 70
                  operator:
                    type: and
                  reducer:
                    type: last

      # 7. TRAFFIC ANOMALY — page_views dropped >0.5 vs previous 24h
      - uid: brain-traffic-anomaly
        title: Traffic Anomaly
        condition: C
        for: 0s
        # The CTE cross-join always yields one ratio row when healthy;
        # no-data means `page_views` was renamed/dropped or the datasource
        # is down — exactly the "site is dark but the alert stayed green"
        # failure this audit is about. Surface it. See #581.
        noDataState: Alerting
        execErrState: Error
        labels:
          severity: warning
          team: glad-labs
        annotations:
          summary: "Page views dropped over 50% compared to 7-day rolling average"
          description: "Today: {{ $values.B.Value }} ratio vs 7-day avg. Possible site issue, SEO penalty, or CDN problem."
        data:
          - refId: A
            datasourceUid: local-brain-db
            relativeTimeRange:
              from: 777600
              to: 0
            model:
              rawSql: >
                WITH today AS (
                  SELECT COUNT(*) as cnt FROM page_views
                  WHERE created_at > NOW() - INTERVAL '24 hours'
                ), baseline AS (
                  SELECT GREATEST(AVG(daily_cnt), 1.0) as avg_cnt
                  FROM (
                    SELECT DATE(created_at) as day, COUNT(*) as daily_cnt
                    FROM page_views
                    WHERE created_at BETWEEN NOW() - INTERVAL '8 days' AND NOW() - INTERVAL '24 hours'
                    GROUP BY DATE(created_at)
                  ) daily
                )
                SELECT today.cnt::float / baseline.avg_cnt as ratio
                FROM today, baseline
              format: table
              editorMode: code
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              type: reduce
              expression: A
              reducer: last
              settings:
                mode: dropNN
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: lt
                    params:
                      - 0.5
                  operator:
                    type: and
                  reducer:
                    type: last

      # 7b. PAGE-VIEW CAPTURE DEAD — first-party page_views ~0 while GSC shows real traffic.
      #     Robust complement to brain-traffic-anomaly (#7): that rule is a relative-drop
      #     detector and self-reports healthy once page_views flatlines (yesterday=0 →
      #     ratio 1.0), so it stays green through a sustained outage — the 2026-04→06
      #     beacon blackout (poindexter#671) it was meant to catch. This cross-signal
      #     check fires ON the zero state, using GSC clicks as independent proof traffic
      #     exists. Closes poindexter#673.
      - uid: brain-page-views-capture-dead
        title: Page-View Capture Dead
        condition: C
        for: 0s
        # rawSql always returns one row when healthy; no-data means page_views or
        # external_metrics was dropped/repointed or the datasource is down — a dark
        # subsystem, surface it (fail-loud). See #581.
        noDataState: Alerting
        execErrState: Error
        labels:
          severity: warning
          team: glad-labs
        annotations:
          summary: "First-party page-view capture is dark despite real search traffic"
          description: "0 page_views in the last 3 days while Google Search Console shows {{ $values.B.Value }} clicks over the last 14 days — the CF beacon → Analytics Engine → page_views pipeline is almost certainly broken. Check NEXT_PUBLIC_BEACON_URL (scheme), the CSP connect-src allow-list, and the beacon CORS content-type. See poindexter#671."
        data:
          - refId: A
            datasourceUid: local-brain-db
            relativeTimeRange:
              from: 1209600
              to: 0
            model:
              rawSql: >
                WITH pv AS (
                  SELECT COUNT(*) AS cnt FROM page_views
                  WHERE created_at > NOW() - INTERVAL '3 days'
                ), gsc AS (
                  SELECT COALESCE(SUM(metric_value), 0) AS clicks
                  FROM external_metrics
                  WHERE source = 'google_search_console'
                    AND metric_name = 'clicks'
                    AND date > (NOW() - INTERVAL '14 days')::date
                )
                SELECT CASE
                         WHEN gsc.clicks > 20 AND pv.cnt = 0 THEN gsc.clicks
                         ELSE 0
                       END AS capture_dead_clicks
                FROM pv, gsc
              format: table
              editorMode: code
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              type: reduce
              expression: A
              reducer: last
              settings:
                mode: dropNN
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 0
                  operator:
                    type: and
                  reducer:
                    type: last

      # 8. PIPELINE STALLED — zero new pipeline_tasks_view in last 48h
      - uid: brain-pipeline-stalled
        title: Pipeline Stalled
        condition: C
        for: 0s
        noDataState: Alerting
        execErrState: Error
        labels:
          severity: warning
          team: glad-labs
        annotations:
          summary: "No new content tasks created in 48 hours"
          description: "The pipeline has not generated any new tasks in 2 days. Check worker status, cron jobs, and Ollama health."
        data:
          - refId: A
            datasourceUid: local-brain-db
            relativeTimeRange:
              from: 172800
              to: 0
            model:
              rawSql: "SELECT COUNT(*) as task_count FROM pipeline_tasks_view WHERE created_at > NOW() - INTERVAL '48 hours'"
              format: table
              editorMode: code
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              type: reduce
              expression: A
              reducer: last
              settings:
                mode: dropNN
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: lt
                    params:
                      - 1
                  operator:
                    type: and
                  reducer:
                    type: last

      # 9. WORKER OFFLINE — API health endpoint not returning healthy worker
      - uid: brain-worker-offline
        title: Worker Offline
        condition: C
        for: 5m
        noDataState: Alerting
        execErrState: Alerting
        labels:
          severity: critical
          team: glad-labs
        annotations:
          summary: "Content worker has not checked in recently"
          description: "No brain cycle has logged a decision in 30 minutes AND the worker has no recent task activity. The worker process may be crashed."
        data:
          - refId: A
            datasourceUid: local-brain-db
            relativeTimeRange:
              from: 1800
              to: 0
            model:
              rawSql: "SELECT CASE WHEN (SELECT MAX(created_at) FROM brain_decisions) > NOW() - INTERVAL '10 minutes' THEN 1 ELSE (SELECT COUNT(*) FROM pipeline_tasks_view WHERE updated_at > NOW() - INTERVAL '30 minutes' AND status IN ('in_progress', 'completed', 'failed')) END as worker_ok"
              format: table
              editorMode: code
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              type: reduce
              expression: A
              reducer: last
              settings:
                mode: dropNN
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: lt
                    params:
                      - 1
                  operator:
                    type: and
                  reducer:
                    type: last

      # 10. OLLAMA DOWN — no cost_logs from local models in last 6 hours
      #     during active pipeline
      - uid: brain-ollama-down
        title: Ollama Unresponsive
        condition: C
        for: 10m
        # The CASE always returns a row when healthy (it reads
        # pipeline_tasks_view + cost_logs); no-data means one of those was
        # renamed/dropped or the datasource is down. A blind "is Ollama
        # alive?" check that resolves OK is the silent failure #581 targets.
        noDataState: Alerting
        execErrState: Error
        labels:
          severity: warning
          team: glad-labs
        annotations:
          summary: "No local model inference in the last 6 hours"
          description: "No local model inference in 6 hours while tasks are pending. Ollama may be down or unresponsive."
        data:
          - refId: A
            datasourceUid: local-brain-db
            relativeTimeRange:
              from: 21600
              to: 0
            model:
              rawSql: "SELECT CASE WHEN (SELECT COUNT(*) FROM pipeline_tasks_view WHERE status IN ('pending', 'in_progress')) = 0 THEN 1 ELSE (SELECT COUNT(*) FROM cost_logs WHERE provider = 'ollama' AND cost_type = 'inference' AND created_at > NOW() - INTERVAL '6 hours') END as ollama_ok"
              format: table
              editorMode: code
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              type: reduce
              expression: A
              reducer: last
              settings:
                mode: dropNN
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: lt
                    params:
                      - 1
                  operator:
                    type: and
                  reducer:
                    type: last

      # 11. BRAIN HEARTBEAT STALE — brain daemon hasn't logged a decision
      #     in 15 min
      - uid: brain-heartbeat-stale
        title: Brain Daemon Stale
        condition: C
        for: 0s
        noDataState: Alerting
        execErrState: Alerting
        labels:
          severity: critical
          team: glad-labs
        annotations:
          summary: "Brain daemon has not completed a cycle in 15+ minutes"
          description: "No brain_decisions logged in {{ $values.B.Value }} minutes. The daemon may be crashed or stuck. The OS-level watchdog should auto-restart it."
        data:
          - refId: A
            datasourceUid: local-brain-db
            relativeTimeRange:
              from: 3600
              to: 0
            model:
              rawSql: "SELECT EXTRACT(EPOCH FROM NOW() - MAX(created_at))/60 as minutes_since FROM brain_decisions"
              format: table
              editorMode: code
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              type: reduce
              expression: A
              reducer: last
              settings:
                mode: dropNN
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 15
                  operator:
                    type: and
                  reducer:
                    type: last

      # 12. ZERO PUBLISHED POSTS THIS WEEK — no posts published in 7 days
      - uid: brain-zero-published-week
        title: Zero Published Posts This Week
        condition: C
        for: 0s
        noDataState: Alerting
        execErrState: Error
        labels:
          severity: warning
          team: glad-labs
        annotations:
          summary: "No posts published in the last 7 days"
          description: "The pipeline has not published any content this week. Check approval queue, quality scores, and auto-publish threshold."
        data:
          - refId: A
            datasourceUid: local-brain-db
            relativeTimeRange:
              from: 604800
              to: 0
            model:
              rawSql: "SELECT COUNT(*) as pub_count FROM posts WHERE status = 'published' AND published_at > NOW() - INTERVAL '7 days'"
              format: table
              editorMode: code
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              type: reduce
              expression: A
              reducer: last
              settings:
                mode: dropNN
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: lt
                    params:
                      - 1
                  operator:
                    type: and
                  reducer:
                    type: last

      # 13. GPU METRICS STALE — gpu_metrics not updated in 30 minutes
      - uid: brain-gpu-metrics-stale
        title: GPU Metrics Stale
        condition: C
        for: 5m
        noDataState: Alerting
        execErrState: Error
        labels:
          severity: warning
          team: glad-labs
        annotations:
          summary: "GPU metrics scraper stopped collecting data"
          description: "No gpu_metrics rows in the last 30 minutes. The gpu-scraper.py process may have crashed or lost its DB connection."
        data:
          - refId: A
            datasourceUid: local-brain-db
            relativeTimeRange:
              from: 1800
              to: 0
            model:
              rawSql: "SELECT EXTRACT(EPOCH FROM NOW() - MAX(timestamp))/60 as minutes_since FROM gpu_metrics"
              format: table
              editorMode: code
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              type: reduce
              expression: A
              reducer: last
              settings:
                mode: dropNN
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 30
                  operator:
                    type: and
                  reducer:
                    type: last

      # 14. GPU TEMPERATURE HIGH — GPU exceeds 85°C
      - uid: brain-gpu-temp-high
        title: GPU Temperature High
        condition: C
        for: 5m
        # `SELECT temperature ... LIMIT 1` genuinely returns no rows when
        # `gpu_metrics` is empty — i.e. the GPU scraper crashed and we are
        # flying blind on a critical (hardware-damage) signal. OK here
        # silenced exactly that; flip to Alerting so a dark thermal sensor
        # pages. (GPU Metrics Stale also catches scraper death; two loud
        # signals on a dark GPU is intentional, not redundant.) See #581.
        noDataState: Alerting
        execErrState: Error
        labels:
          severity: critical
          team: glad-labs
        annotations:
          summary: "GPU temperature exceeded 85°C"
          description: "GPU temperature is {{ $values.B.Value }}°C. Check cooling, fan speed, and workload. Sustained high temps can damage hardware."
        data:
          - refId: A
            datasourceUid: local-brain-db
            relativeTimeRange:
              from: 300
              to: 0
            model:
              rawSql: "SELECT temperature FROM gpu_metrics ORDER BY timestamp DESC LIMIT 1"
              format: table
              editorMode: code
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              type: reduce
              expression: A
              reducer: last
              settings:
                mode: dropNN
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 85
                  operator:
                    type: and
                  reducer:
                    type: last

      # NOTE: The former rule #15 "Disk Space Low" was REMOVED (2026-06-03).
      # It was mislabeled and redundant: its title/description claimed to
      # measure free disk space (<50 GB), but the query was
      # `pg_database_size('poindexter_brain')` with a `> 5` threshold — i.e.
      # it actually fired on DB size > 5 GB and duplicated rule #4
      # "DB Size Warning". Real host disk-space alerting lives in
      # Prometheus (prometheus_rule_builder.py -> PoindexterDiskSpaceLow /
      # PoindexterDiskSpaceCritical), sourced from
      # windows_exporter's `windows_logical_disk_free_bytes`.
      # The zombie rule (uid: brain-disk-space-low) is in deleteRules above.

  # ---------------------------------------------------------------------------
  # poindexter-infra-alerts: Prometheus-backed infrastructure rules.
  # Folded in from api-provenance pdx-* rules (2026-06-11, poindexter#707).
  # The originals had noDataState/execErrState both OK (silent failures) and
  # three of the four mis-routed SQL strings to the prometheus datasource.
  # These replacements use the correct datasource per query type and set
  # noDataState: Alerting + execErrState: Error so blind spots surface.
  # ---------------------------------------------------------------------------
  - orgId: 1
    name: poindexter-infra-alerts
    folder: Glad Labs Alerts
    interval: 1m
    rules:
      # P1. WORKER DOWN (PROMETHEUS) — up{job="poindexter-worker"} == 0
      #     Prometheus-side complement to brain-worker-offline (DB-side).
      #     Original pdx-4d7e330818f74a089dca used valid PromQL but had
      #     noDataState/execErrState both OK — a dark Prometheus scrape would
      #     silently pass. Fixed here with Alerting/Error. (#707)
      - uid: pdx-worker-down-prometheus
        title: Poindexter Worker Down (Prometheus)
        condition: B
        for: 2m
        # `up` only has no-data when the prometheus datasource itself is down or
        # the job label was renamed. Either way we're flying blind — surface it.
        noDataState: Alerting
        execErrState: Error
        labels:
          category: infrastructure
          severity: critical
          team: glad-labs
        annotations:
          summary: "Poindexter worker is not reachable via Prometheus"
          description: "The worker has failed Prometheus scrapes for 2+ minutes. Check `docker ps` and `docker logs poindexter-worker`."
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 600
              to: 0
            model:
              expr: "up{job=\"poindexter-worker\"}"
              instant: true
              refId: A
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: lt
                    params:
                      - 1
                  operator:
                    type: and
                  reducer:
                    type: last

      # P2. PIPELINE FAILURE RATE HIGH — >20% of tasks failed in last hour
      #     Original pdx-7732e2490cf72fa34c1a had a SQL string mis-routed to
      #     the prometheus datasource (always no-data → always silently OK).
      #     Re-implemented against local-brain-db (postgres). (#707)
      - uid: pdx-pipeline-failure-rate
        title: Pipeline Failure Rate Over 20%
        condition: C
        for: 0s
        # NULLIF prevents division-by-zero when no tasks ran; COALESCE(…, 0)
        # returns 0 (not no-data) when the table is empty — fail-loud.
        noDataState: Alerting
        execErrState: Error
        labels:
          category: pipeline
          severity: critical
          team: glad-labs
        annotations:
          summary: "Pipeline failure rate exceeded 20% in the last hour"
          description: "{{ $values.B.Value }}% of tasks failed in the last hour. Check error logs for common failure patterns."
        data:
          - refId: A
            datasourceUid: local-brain-db
            relativeTimeRange:
              from: 3600
              to: 0
            model:
              rawSql: "SELECT COALESCE(ROUND(COUNT(*) FILTER (WHERE status = 'failed') * 100.0 / NULLIF(COUNT(*), 0), 1), 0) as failure_rate FROM pipeline_tasks_view WHERE created_at > NOW() - INTERVAL '1 hour'"
              format: table
              editorMode: code
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              type: reduce
              expression: A
              reducer: last
              settings:
                mode: dropNN
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 20
                  operator:
                    type: and
                  reducer:
                    type: last

      # P3. TASKS STUCK IN PROGRESS (SHORT) — tasks stalled >30 min
      #     Original pdx-4a031b0eb580f1cc7137 had a SQL string mis-routed to
      #     the prometheus datasource (always no-data → always silently OK).
      #     Re-implemented against local-brain-db. Complements the 2-hour
      #     brain-stale-tasks rule with an earlier-warning 30-minute threshold.
      #     (#707)
      - uid: pdx-tasks-stuck-30min
        title: Tasks Stuck In Progress (30 min)
        condition: C
        for: 0s
        # COUNT(*) always returns a row when healthy; no-data means the view
        # was dropped or the datasource is down — surface it.
        noDataState: Alerting
        execErrState: Error
        labels:
          category: pipeline
          severity: warning
          team: glad-labs
        annotations:
          summary: "{{ $values.B.Value }} task(s) stuck in_progress for over 30 minutes"
          description: "Tasks have been in_progress without updates for more than 30 minutes. May indicate a hung worker or lost connection."
        data:
          - refId: A
            datasourceUid: local-brain-db
            relativeTimeRange:
              from: 600
              to: 0
            model:
              rawSql: "SELECT COUNT(*) as stuck_count FROM pipeline_tasks_view WHERE status = 'in_progress' AND updated_at < NOW() - INTERVAL '30 minutes'"
              format: table
              editorMode: code
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              type: reduce
              expression: A
              reducer: last
              settings:
                mode: dropNN
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 0
                  operator:
                    type: and
                  reducer:
                    type: last
