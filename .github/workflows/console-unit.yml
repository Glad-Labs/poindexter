# Operator-console JS gate. src/cofounder_agent/console/ ships as no-build
# static assets served by the worker at /console/ (FastAPI StaticFiles); its
# api.js adapter is the SOLE seam between the console UI and the worker API
# (see the "console = hidden API consumer" operational note), yet it had no
# test gate. This job runs the console's Node-native contract tests
# (node:test + an in-process vm realm — no jsdom, no install) on any PR/push
# that touches the console.
#
# Path-filtered (NOT a required branch-protection check) — same reasoning as
# jest-unit.yml: a required check can't be path-filtered without blocking every
# off-path PR forever. Promote later via the always-run + skip-as-success
# pattern unit-tests.yml uses if it ever needs to gate merges.
name: console-unit

on:
  push:
    branches: [main]
    paths:
      - "src/cofounder_agent/console/**"
      - ".github/workflows/console-unit.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/cofounder_agent/console/**"
      - ".github/workflows/console-unit.yml"

# Cancel superseded in-progress runs on the same PR/ref to save Actions minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  console-unit:
    # Source-repo only: PRs land on glad-labs-stack; the public mirror is
    # force-rebuilt and takes no PRs, so gating it would waste Actions minutes.
    if: github.repository == 'Glad-Labs/glad-labs-stack'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4.3.1 as of 2026-05-12

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24" # root package.json engines: node >=24.0.0

      # No dependency install: the tests use only node:test + Node builtins and
      # read the real api.js off disk, so `npm run test:console` just shells to
      # `node --test`.
      - name: Console contract tests (node:test)
        run: npm run test:console
