# Glad Labs — Local Docker Compose
#
# OpenClaw gateway for Discord/Telegram operations.
# Mounts your existing ~/.openclaw config — no reconfiguration needed.
#
# Usage:
#   docker compose up -d             # start OpenClaw
#   docker compose logs -f openclaw  # watch logs
#   docker compose restart openclaw  # restart after config changes
#   docker compose down              # stop
#
# FastAPI backend runs on Railway (production).
# Ollama runs natively on Windows (GPU access).
# This compose file is just for the OpenClaw gateway.

services:
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: glad-labs-openclaw
    restart: always
    volumes:
      # Mount existing config — same skills, .env, memory, everything
      - ${USERPROFILE:-.}/.openclaw:/home/node/.openclaw
      - ${USERPROFILE:-.}/.openclaw/workspace:/home/node/.openclaw/workspace
    extra_hosts:
      # Allow container to reach Ollama on Windows host
      - "host.docker.internal:host-gateway"
    environment:
      TZ: America/New_York
      # Ollama on host machine (not inside container)
      OLLAMA_BASE_URL: http://host.docker.internal:11434
