name: Test on Feature Branch (DISABLED)

# ⚠️ DISABLED - Feature branches do not run workflows
# Branch hierarchy:
#   feat/*     → No workflows (commit freely)
#   dev        → Full testing via test-on-dev.yml
#   staging    → Deploy to staging environment
#   main       → Deploy to production
#
# This allows you to commit frequently without triggering CI/CD on feature branches

on:
  workflow_dispatch: # Only manual trigger (effectively disabled)

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      NODE_ENV: development

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: 🐍 Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: 📦 Install Node dependencies
        run: npm ci  # fix #167: root npm ci handles all workspaces automatically

      - name: 📦 Install Poetry
        run: |
          python -m pip install --upgrade pip poetry
          poetry config virtualenvs.create false

      - name: 📦 Install Python dependencies via Poetry
        # fix #167: use Poetry (same as prod/staging) to ensure dependency parity
        run: |
          cd src/cofounder_agent
          poetry install --no-root
          cd ../..

      - name: 🔄 Load development environment
        run: cp .env.example .env.local

      - name: 🧪 Run tests
        run: npm run test:ci
        # fix #167: removed continue-on-error — test failures should be visible

      - name: 🧪 Run Python tests
        run: npm run test:python
        # fix #167: removed continue-on-error — test failures should be visible

      - name: 🔍 Run linting
        run: npm run lint:fix
        continue-on-error: true  # linting is advisory on feature branches

      - name: 🏗️ Build check (all workspaces)
        run: npm run build --if-present

      - name: ✅ Tests and build completed
        run: echo "Feature branch testing complete"
