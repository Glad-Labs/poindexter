# Nightly regeneration of docs/reference/app-settings.md (Glad-Labs/poindexter#439).
#
# The script at scripts/regen-app-settings-doc.py renders every app_settings row
# into a public-facing reference page. Without auto-regen the file decays the
# moment a new setting lands without its doc row; this workflow runs the script
# against a clean Postgres seeded by the baseline migration and opens a PR if
# the regenerated output drifts from main.
#
# Source-state stability: the banner date is pinned via REGEN_DATE_OVERRIDE
# to the commit date of the latest source change that affects the rendered
# output (migrations directory + the script itself), so identical source
# state always produces a byte-identical file — no spurious nightly PRs.
name: regen-app-settings-doc

on:
  schedule:
    # Daily ~06:13 UTC. Offset from round-hour boundaries to avoid the GitHub
    # Actions scheduler's high-contention slots; matches the brain daemon's
    # hourly :13 convention so log scanning lines up across systems.
    - cron: "13 6 * * *"
  workflow_dispatch: {}

# Two writes only: push the drift branch, and open/list the PR. No external
# actions and no secrets beyond the built-in GITHUB_TOKEN.
permissions:
  contents: write
  pull-requests: write

# Two scheduled runs back-to-back would race on `git push -f` of the same
# drift branch. Cancelling the older run is safe — the next run regenerates
# from scratch.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  regen:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: poindexter_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d poindexter_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/poindexter_test
      DRIFT_BRANCH: chore/regen-app-settings-doc

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.3.1 as of 2026-05-12
        with:
          # Full history — `git log --format=%cs` needs to walk back to find
          # the last commit that touched the migration sources.
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0 as of 2026-05-12
        with:
          python-version: "3.13"

      # Dependency-light by design (same posture as migrations-smoke): only
      # asyncpg, no poetry install. Keeps the runner ~30s cold.
      - name: Install runtime deps
        run: pip install "asyncpg>=0.30,<0.32"

      - name: Wait for Postgres
        run: |
          for i in $(seq 1 30); do
            if pg_isready -h localhost -p 5432 -U postgres > /dev/null 2>&1; then
              echo "postgres ready"
              exit 0
            fi
            echo "waiting for postgres... ($i)"
            sleep 1
          done
          echo "postgres never became ready" >&2
          exit 1

      - name: Apply migrations (seeds baseline app_settings defaults)
        run: python scripts/ci/migrations_smoke.py

      # The banner stamp would otherwise be `datetime.now()` and would
      # change every run, opening a fresh PR per night even when no real
      # setting changed. Pin it to the last commit that touched anything
      # that affects the rendered output.
      - name: Resolve stable banner date
        id: stamp
        run: |
          DATE=$(git log -1 --format=%cs -- \
            src/cofounder_agent/services/migrations/ \
            scripts/regen-app-settings-doc.py \
            2>/dev/null || true)
          if [ -z "$DATE" ]; then
            DATE=$(date -u +%Y-%m-%d)
          fi
          echo "date=$DATE" >> "$GITHUB_OUTPUT"
          echo "Using REGEN_DATE_OVERRIDE=$DATE"

      - name: Regenerate docs/reference/app-settings.md
        env:
          REGEN_DATE_OVERRIDE: ${{ steps.stamp.outputs.date }}
        run: python scripts/regen-app-settings-doc.py

      - name: Open PR if the regenerated doc drifted from main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if git diff --quiet -- docs/reference/app-settings.md; then
            echo "No drift — committed doc matches the regenerated output."
            exit 0
          fi
          echo "Drift detected; opening or updating PR."
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "$DRIFT_BRANCH"
          git add docs/reference/app-settings.md
          git commit -m "docs(reference): regenerate app-settings.md"
          # Force-push: the drift branch is workflow-owned and always reflects
          # the latest regen, never a contributor's WIP.
          git push --force-with-lease origin "$DRIFT_BRANCH"
          existing=$(gh pr list \
            --base main \
            --head "$DRIFT_BRANCH" \
            --state open \
            --json number \
            --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            echo "PR #$existing already open — branch updated in place."
            exit 0
          fi
          gh pr create \
            --base main \
            --head "$DRIFT_BRANCH" \
            --title "docs(reference): regenerate app-settings.md" \
            --body "$(cat <<'EOF'
          Automated nightly regeneration of `docs/reference/app-settings.md`
          (Glad-Labs/poindexter#439).

          A new app_settings row landed, an existing one was removed, or a
          seeded default changed — review the diff and merge if the new
          state is what you expected.

          Generated by `.github/workflows/regen-app-settings-doc.yml`.
          EOF
          )"
