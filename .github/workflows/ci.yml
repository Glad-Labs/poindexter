name: Deploy to Production

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

# Tests run locally via Gitea Actions before code is mirrored here.
# This workflow only deploys — no redundant testing on GitHub compute.

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://www.gladlabs.io

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Node dependencies
        run: npm ci

      - name: Deploy to Vercel
        run: |
          npx vercel deploy --prod \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --scope=${{ secrets.VERCEL_ORG_ID }} \
            --yes
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.PUBLIC_SITE_PROD_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}

      - name: Smoke test
        run: |
          sleep 30
          curl -sf --retry 3 --retry-delay 10 "https://www.gladlabs.io" > /dev/null && echo "Site is up" || echo "Site not ready"
        continue-on-error: true

      - name: Telegram — Success
        if: success()
        run: |
          COMMIT_SHA=$(git rev-parse --short HEAD)
          COMMIT_MSG=$(git log -1 --pretty=format:'%s')
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="Markdown" \
            -d text="Deployed to Production

          Commit: ${COMMIT_SHA} — ${COMMIT_MSG}

          Vercel deploy complete.

          [View Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
        continue-on-error: true

      - name: Telegram — Failure
        if: failure()
        run: |
          COMMIT_SHA=$(git rev-parse --short HEAD)
          COMMIT_MSG=$(git log -1 --pretty=format:'%s')
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="Markdown" \
            -d text="Deploy FAILED

          Commit: ${COMMIT_SHA} — ${COMMIT_MSG}

          [View Logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
        continue-on-error: true
