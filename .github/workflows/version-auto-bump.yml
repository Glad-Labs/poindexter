name: 🔄 Auto-Bump Version (Per Branch Tier)

on:
    push:
        branches:
            - "main"
            - "dev"
            - "dev/**"
            - "feature/**"
            - "staging"
            - "staging/**"
            - "release/**"
        paths-ignore:
            - "docs/**"
            - "*.md"
            - ".gitignore"

concurrency:
    group: version-bump-${{ github.ref }}

jobs:
    auto-bump-version:
        runs-on: ubuntu-latest

        # Prevent running on version bump commits (they have [skip ci] tag)
        if: "!contains(github.event.head_commit.message, '[skip ci]')"

        permissions:
            contents: write

        steps:
            - name: 📥 Checkout code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  ref: ${{ github.ref_name }}

            - name: 🔧 Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "22"

            - name: 🔐 Configure git
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

            - name: 📊 Detect branch tier
              id: branch-tier
              run: |
                  BRANCH="${{ github.ref_name }}"
                  echo "branch=$BRANCH" >> $GITHUB_OUTPUT

                  if [[ $BRANCH == "main" ]]; then
                    echo "tier=main (production)"
                    echo "tier_name=main" >> $GITHUB_OUTPUT
                  elif [[ $BRANCH == staging* ]] || [[ $BRANCH == release* ]]; then
                    echo "tier=staging (feature release)"
                    echo "tier_name=staging" >> $GITHUB_OUTPUT
                  elif [[ $BRANCH == dev* ]] || [[ $BRANCH == feature* ]]; then
                    echo "tier=dev (build)"
                    echo "tier_name=dev" >> $GITHUB_OUTPUT
                  else
                    echo "tier=unknown"
                    echo "tier_name=unknown" >> $GITHUB_OUTPUT
                  fi

            - name: 🔄 Auto-bump version
              run: |
                  npm run bump-version:auto
              env:
                  CI: true

            - name: 📤 Push version bump commit and tag
              run: |
                  git push origin HEAD:${{ github.ref_name }}
                  git push origin --tags
