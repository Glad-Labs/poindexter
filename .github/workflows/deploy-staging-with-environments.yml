name: Deploy to Staging (Using Environments)

on:
  push:
    branches:
      - staging

concurrency:
  group: staging-deployment
  cancel-in-progress: false

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    environment: staging

    env:
      NODE_ENV: staging
      LOG_LEVEL: debug

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: 🐍 Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      # ============================================
      # INSTALL PHASE
      # ============================================

      - name: 📦 Install Node dependencies
        run: npm ci

      - name: 📦 Install Poetry
        run: |
          python -m pip install --upgrade pip poetry
          poetry config virtualenvs.create false

      - name: 📦 Install Python dependencies via Poetry
        # fix #146: use Poetry (same as prod) to ensure dependency parity
        run: |
          cd src/cofounder_agent
          poetry install --no-root
          cd ../..

      # ============================================
      # TEST PHASE (must pass before deploy)
      # ============================================

      - name: 🧪 Run tests
        run: npm run test:ci
        # fix #144: removed continue-on-error — test failures block staging deploy

      - name: 🧪 Run backend tests
        run: npm run test:python
        # fix #144: removed continue-on-error — test failures block staging deploy

      - name: 🏗️ Build all workspaces
        run: npm run build --if-present

      # ============================================
      # DEPLOYMENT PHASE - CO-FOUNDER AGENT
      # ============================================

      - name: 📦 Cache Railway CLI
        uses: actions/cache@v4
        with:
          path: ~/.npm-global
          key: railway-cli-v1

      - name: 🚀 Deploy Co-Founder Agent to Railway (Staging)
        run: |
          echo "📤 Deploying Co-Founder Agent to staging environment..."
          npm install -g @railway/cli  # fix #158: cached above
          railway link --project ${{ secrets.RAILWAY_STAGING_PROJECT_ID }} --environment staging
          railway up --service cofounder
          echo "✅ Co-Founder Agent staging deployment completed"
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          # Note: API keys, DB URL, JWT secret are managed in Railway dashboard directly
          ENVIRONMENT: staging

      # ============================================
      # DEPLOYMENT PHASE - PUBLIC SITE
      # ============================================

      - name: 🚀 Deploy Public Site to Vercel (Staging)
        run: |
          echo "📤 Deploying Public Site to staging environment..."
          cd web/public-site
          npx vercel --token=${{ secrets.VERCEL_TOKEN }} --scope=${{ secrets.VERCEL_ORG_ID }}
          cd ../..
          echo "✅ Public Site staging deployment completed"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.PUBLIC_SITE_STAGING_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          NEXT_PUBLIC_FASTAPI_URL: ${{ secrets.PUBLIC_SITE_STAGING_FASTAPI_URL }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.PUBLIC_SITE_STAGING_SITE_URL }}
          NEXT_PUBLIC_GA_ID: ${{ secrets.PUBLIC_SITE_STAGING_GA_ID }}
          SENTRY_DSN: ${{ secrets.PUBLIC_SITE_STAGING_SENTRY_DSN }}

      # ============================================
      # DEPLOYMENT PHASE - OVERSIGHT HUB
      # ============================================

      - name: 🚀 Deploy Oversight Hub to Vercel (Staging)
        run: |
          echo "📤 Deploying Oversight Hub to staging environment..."
          cd web/oversight-hub
          npx vercel --token=${{ secrets.VERCEL_TOKEN }} --scope=${{ secrets.VERCEL_ORG_ID }}
          cd ../..
          echo "✅ Oversight Hub staging deployment completed"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.OVERSIGHT_STAGING_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          # Oversight Hub uses CRA (REACT_APP_* prefix); env vars also managed in Vercel dashboard
          REACT_APP_API_URL: ${{ secrets.OVERSIGHT_STAGING_API_URL }}
          REACT_APP_GH_OAUTH_CLIENT_ID: ${{ secrets.OVERSIGHT_STAGING_GH_OAUTH_CLIENT_ID }}

      # ============================================
      # VERIFICATION PHASE
      # ============================================

      - name: ✅ Verify Staging Deployment
        run: |
          echo "🔍 Verifying staging deployment..."
          echo "Waiting for services to stabilize (15 seconds)..."
          sleep 15

          COFOUNDER_URL="${{ secrets.COFOUNDER_STAGING_URL }}"
          OVERSIGHT_URL="${{ secrets.OVERSIGHT_STAGING_URL }}"
          PUBLIC_SITE_URL="${{ secrets.PUBLIC_SITE_STAGING_SITE_URL }}"

          # fix #147: use real secrets, retry on failure, still soft-fail for first deploy
          echo "Testing Co-Founder Agent..."
          curl -f --retry 3 --retry-delay 5 "${COFOUNDER_URL}/health" || echo "⚠️ Agent health check pending — verify COFOUNDER_STAGING_URL secret"

          echo "Testing Public Site..."
          curl -f --retry 3 --retry-delay 5 "${PUBLIC_SITE_URL}" || echo "⚠️ Public Site check pending — verify PUBLIC_SITE_STAGING_SITE_URL secret"

          echo "Testing Oversight Hub..."
          curl -f --retry 3 --retry-delay 5 "${OVERSIGHT_URL}" || echo "⚠️ Oversight Hub check pending — verify OVERSIGHT_STAGING_URL secret"

          echo "✅ All components deployed successfully to staging!"

      - name: 📢 Notification
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Staging deployment completed successfully"
            echo "🌍 Staging URLs:"
            echo "  - Agent API: ${{ secrets.COFOUNDER_STAGING_URL }}/docs"
            echo "  - Public Site: ${{ secrets.PUBLIC_SITE_STAGING_SITE_URL }}"
            echo "  - Oversight Hub: ${{ secrets.OVERSIGHT_STAGING_URL }}"
          else
            echo "❌ Staging deployment failed — check GitHub Actions logs"
          fi
