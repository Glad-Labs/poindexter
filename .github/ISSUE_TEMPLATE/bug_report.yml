name: Bug Report
description: Something isn't working correctly
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      description: What should have happened instead.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Run `docker compose up -d`
        2. Create a task via API
        3. See error in logs
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Your setup details.
      placeholder: |
        - OS: Windows 11 / Ubuntu 24.04 / macOS
        - Python: 3.12
        - Docker: 27.x
        - GPU: RTX 4090 / None (CPU only)
        - Ollama model: llama3.3:70b
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any error messages or log output.
      render: shell
    validations:
      required: false
