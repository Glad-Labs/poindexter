# =============================================================================
# Woodpecker CI Pipeline for Glad Labs
#
# Runs on every push to main. Tests must pass before Railway/Vercel
# auto-deploy from GitHub. Notifies via Telegram on success/failure.
#
# Required Woodpecker secrets:
#   TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID
# =============================================================================

when:
  branch: main
  event: push

steps:
  # ===========================================================================
  # TEST PHASE
  # ===========================================================================

  backend-unit-tests:
    image: python:3.12-bookworm
    commands:
      - pip install --upgrade pip poetry
      - poetry config virtualenvs.create false
      - cd src/cofounder_agent && poetry install --no-root
      - cd src/cofounder_agent && poetry run pytest tests/unit/ -q --tb=short --ignore=tests/unit/services/test_web_research.py

  frontend-tests:
    image: node:22-bookworm
    commands:
      - npm ci
      - npm run test:ci
    environment:
      NODE_ENV: test

  linting:
    image: node:22-bookworm
    commands:
      - npm ci
      - npm run lint

  security-audit:
    image: node:22-bookworm
    failure: ignore
    commands:
      - npm ci
      - npm audit --audit-level=moderate

  # ===========================================================================
  # POST-DEPLOY SMOKE TESTS (after Railway/Vercel auto-deploy)
  # ===========================================================================

  smoke-tests:
    image: curlimages/curl:latest
    failure: ignore
    commands:
      - echo "Waiting 90s for Railway/Vercel to deploy..."
      - sleep 90
      - |
        echo "Testing API health..."
        curl -sf --retry 5 --retry-delay 10 "https://cofounder-production.up.railway.app/health" || echo "API not ready yet"
      - |
        echo "Testing public site..."
        curl -sf --retry 3 --retry-delay 5 "https://www.gladlabs.io" > /dev/null && echo "Site is up" || echo "Site not ready"

  # ===========================================================================
  # NOTIFICATIONS
  # ===========================================================================

  notify-success:
    image: curlimages/curl:latest
    commands:
      - |
        COMMIT_SHA=$(echo $CI_COMMIT_SHA | cut -c1-7)
        curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
          -d chat_id="$TELEGRAM_CHAT_ID" \
          -d parse_mode="Markdown" \
          -d text="✅ *CI Passed — Deploying*

        Commit: \`$COMMIT_SHA\` — $CI_COMMIT_MESSAGE

        Tests passed. Railway + Vercel deploying automatically."
    environment:
      TELEGRAM_BOT_TOKEN:
        from_secret: TELEGRAM_BOT_TOKEN
      TELEGRAM_CHAT_ID:
        from_secret: TELEGRAM_CHAT_ID
    when:
      status: [success]

  notify-failure:
    image: curlimages/curl:latest
    commands:
      - |
        COMMIT_SHA=$(echo $CI_COMMIT_SHA | cut -c1-7)
        curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
          -d chat_id="$TELEGRAM_CHAT_ID" \
          -d parse_mode="Markdown" \
          -d text="❌ *CI Failed — Deploy may have bad code*

        Commit: \`$COMMIT_SHA\` — $CI_COMMIT_MESSAGE

        ⚠️ Railway/Vercel auto-deployed but tests failed. Check immediately.

        [View Logs]($CI_PIPELINE_URL)"
    environment:
      TELEGRAM_BOT_TOKEN:
        from_secret: TELEGRAM_BOT_TOKEN
      TELEGRAM_CHAT_ID:
        from_secret: TELEGRAM_CHAT_ID
    when:
      status: [failure]
