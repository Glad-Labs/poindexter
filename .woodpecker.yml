# =============================================================================
# Woodpecker CI/CD Pipeline for Glad Labs
#
# Flow: push to main → tests → deploy (only if tests pass) → notify
#
# Railway and Vercel auto-deploy MUST be disabled in their dashboards.
# Woodpecker is the single deployer — no deploy without green tests.
#
# Required Woodpecker secrets:
#   TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID,
#   RAILWAY_TOKEN, VERCEL_TOKEN, VERCEL_ORG_ID,
#   PUBLIC_SITE_PROD_PROJECT_ID
# =============================================================================

when:
  branch: main
  event: push

clone:
  git:
    image: woodpeckerci/plugin-git:2.8.1
    settings:
      remote: http://gitea:3000/gladlabs/glad-labs-codebase.git
      depth: 1
    environment:
      CI_NETRC_MACHINE: gitea

steps:
  # ===========================================================================
  # TEST PHASE — all must pass before deploy
  # ===========================================================================

  backend-unit-tests:
    image: python:3.12-bookworm
    directory: src/cofounder_agent
    commands:
      - pip install --upgrade pip poetry
      - poetry config virtualenvs.create false
      - poetry install --no-root
      - poetry run pytest tests/unit/ -q --tb=short --ignore=tests/unit/services/test_web_research.py

  frontend-tests:
    image: node:22-bookworm
    commands:
      - npm ci
      - npm run test:ci
    environment:
      NODE_ENV: test

  linting:
    image: node:22-bookworm
    commands:
      - npm ci
      - npm run lint

  security-audit:
    image: node:22-bookworm
    failure: ignore
    commands:
      - npm ci
      - npm audit --audit-level=moderate

  # ===========================================================================
  # DEPLOY PHASE — only runs if all tests pass
  # ===========================================================================

  deploy-railway:
    image: node:22-bookworm
    commands:
      - npm install -g @railway/cli
      - echo "Deploying Co-Founder Agent to Railway..."
      - railway up --service cofounder --detach
      - echo "Railway deploy triggered"
    environment:
      RAILWAY_TOKEN:
        from_secret: RAILWAY_TOKEN

  deploy-vercel:
    image: node:22-bookworm
    commands:
      - echo "Deploying Public Site to Vercel..."
      - npx vercel deploy --prod --token=$VERCEL_TOKEN --scope=$VERCEL_ORG_ID --yes
      - echo "Vercel deploy complete"
    environment:
      VERCEL_TOKEN:
        from_secret: VERCEL_TOKEN
      VERCEL_ORG_ID:
        from_secret: VERCEL_ORG_ID
      VERCEL_PROJECT_ID:
        from_secret: PUBLIC_SITE_PROD_PROJECT_ID

  # ===========================================================================
  # POST-DEPLOY SMOKE TESTS
  # ===========================================================================

  smoke-tests:
    image: curlimages/curl:latest
    failure: ignore
    commands:
      - echo "Waiting 90s for deploys to go live..."
      - sleep 90
      - |
        echo "Testing API health..."
        curl -sf --retry 5 --retry-delay 10 "http://localhost:8002/health" || echo "API not ready yet"
      - |
        echo "Testing public site..."
        curl -sf --retry 3 --retry-delay 5 "https://www.gladlabs.io" > /dev/null && echo "Site is up" || echo "Site not ready"

  # ===========================================================================
  # NOTIFICATIONS
  # ===========================================================================

  notify-success:
    image: curlimages/curl:latest
    commands:
      - |
        COMMIT_SHA=$(echo $CI_COMMIT_SHA | cut -c1-7)
        curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
          -d chat_id="$TELEGRAM_CHAT_ID" \
          -d parse_mode="Markdown" \
          -d text="✅ *CI Passed + Deployed*

        Commit: \`$COMMIT_SHA\` — $CI_COMMIT_MESSAGE

        Tests passed → Railway + Vercel deployed."
    environment:
      TELEGRAM_BOT_TOKEN:
        from_secret: TELEGRAM_BOT_TOKEN
      TELEGRAM_CHAT_ID:
        from_secret: TELEGRAM_CHAT_ID
    when:
      status: [success]

  notify-failure:
    image: curlimages/curl:latest
    commands:
      - |
        COMMIT_SHA=$(echo $CI_COMMIT_SHA | cut -c1-7)
        curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
          -d chat_id="$TELEGRAM_CHAT_ID" \
          -d parse_mode="Markdown" \
          -d text="❌ *CI Failed — Deploy Blocked*

        Commit: \`$COMMIT_SHA\` — $CI_COMMIT_MESSAGE

        Tests failed. Nothing deployed. Fix and push again."
    environment:
      TELEGRAM_BOT_TOKEN:
        from_secret: TELEGRAM_BOT_TOKEN
      TELEGRAM_CHAT_ID:
        from_secret: TELEGRAM_CHAT_ID
    when:
      status: [failure]
