name: Documentation Cleanup

on:
  schedule:
    # Run monthly on the 1st at 2:00 AM UTC
    - cron: '0 2 1 * *'
  workflow_dispatch: # Allow manual triggering

permissions:
  contents: write
  pull-requests: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
      
      - name: Install dependencies
        run: npm install -g markdownlint-cli
      
      - name: Check for broken links
        id: link_check
        continue-on-error: true
        run: |
          echo "Checking for broken internal documentation links..."
          
          # Find all markdown files
          find . -name "*.md" -not -path "./node_modules/*" -not -path "./archive/*" > /tmp/md_files.txt
          
          # Check for broken links
          broken_links=""
          while IFS= read -r file; do
            # Extract markdown links [text](path) — use process substitution to avoid subshell
            while IFS= read -r link; do
              # Skip external links and anchors
              if [[ ! "$link" =~ ^http && ! "$link" =~ ^# && ! "$link" =~ ^mailto ]]; then
                # Resolve relative path
                base_dir=$(dirname "$file")
                target_file="$base_dir/$link"

                # Remove anchor
                target_file="${target_file%%#*}"

                # Check if file exists
                if [ ! -f "$target_file" ]; then
                  echo "BROKEN: $file -> $link"
                  broken_links="$broken_links\n- $file references missing $link"
                fi
              fi
            done < <(grep -oP '\[.*?\]\(\K[^)]+' "$file" 2>/dev/null || true)
          done < /tmp/md_files.txt
          
          if [ -n "$broken_links" ]; then
            echo "broken_links<<EOF" >> $GITHUB_OUTPUT
            echo -e "$broken_links" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            echo "found_issues=true" >> $GITHUB_OUTPUT
          else
            echo "found_issues=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Run markdownlint
        id: lint_check
        continue-on-error: true
        run: |
          echo "Running markdownlint on documentation..."
          markdownlint '**/*.md' --ignore node_modules --ignore archive --json > /tmp/lint_results.json || true
          
          if [ -s /tmp/lint_results.json ]; then
            echo "found_issues=true" >> $GITHUB_OUTPUT
            echo "lint_results<<EOF" >> $GITHUB_OUTPUT
            cat /tmp/lint_results.json >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "found_issues=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Check for redundant phase/session files
        id: redundant_check
        run: |
          echo "Checking for redundant documentation files..."
          
          redundant=""
          
          # Check for Phase files in root that should be archived
          for phase_file in PHASE_*.md; do
            [ -f "$phase_file" ] && redundant="$redundant\n- $phase_file should be in archive/phase*/"
          done
          
          # Check for session files in root
          for session_file in SESSION_*.md CONSOLIDATION_*.md; do
            [ -f "$session_file" ] && redundant="$redundant\n- $session_file should be in archive/sessions/"
          done
          
          # Check for testing files in root
          for test_file in TESTING_*.md TEST_*.md USER_TESTING_*.md; do
            [ -f "$test_file" ] && redundant="$redundant\n- $test_file should be in archive/testing/"
          done
          
          if [ -n "$redundant" ]; then
            echo "found_issues=true" >> $GITHUB_OUTPUT
            echo "redundant_files<<EOF" >> $GITHUB_OUTPUT
            echo -e "$redundant" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "found_issues=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Create GitHub issue if problems found
        if: |
          steps.link_check.outputs.found_issues == 'true' || 
          steps.lint_check.outputs.found_issues == 'true' || 
          steps.redundant_check.outputs.found_issues == 'true'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const broken_links = `${{ steps.link_check.outputs.broken_links }}`;
            const redundant_files = `${{ steps.redundant_check.outputs.redundant_files }}`;
            const lint_issues = `${{ steps.lint_check.outputs.found_issues }}` === 'true';
            
            let body = '## Monthly Documentation Cleanup Report\n\n';
            body += 'Automated scan found issues requiring attention:\n\n';
            
            if (broken_links) {
              body += '### 🔗 Broken Internal Links\n\n';
              body += broken_links + '\n\n';
            }
            
            if (redundant_files) {
              body += '### 📁 Redundant Files (should be archived)\n\n';
              body += redundant_files + '\n\n';
            }
            
            if (lint_issues) {
              body += '### 📝 Markdown Lint Issues\n\n';
              body += 'Run `markdownlint **/*.md --ignore node_modules --ignore archive` locally to see details.\n\n';
            }
            
            body += '---\n\n';
            body += '**Action Required:** Review and fix these issues, then verify with:\n';
            body += '- `npm run lint:markdown` (if configured)\n';
            body += '- Manual link verification\n';
            body += '- Move redundant files to appropriate archive/ subdirectories\n\n';
            body += `**Generated:** ${new Date().toISOString()}\n`;
            body += '**Workflow:** Monthly Documentation Cleanup';
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `📚 Monthly Documentation Cleanup - ${new Date().toISOString().split('T')[0]}`,
              body: body,
              labels: ['documentation', 'maintenance', 'automated']
            });
      
      - name: Report success
        if: |
          steps.link_check.outputs.found_issues != 'true' && 
          steps.lint_check.outputs.found_issues != 'true' && 
          steps.redundant_check.outputs.found_issues != 'true'
        run: |
          echo "✅ Documentation cleanup scan complete - no issues found!"
          echo "All documentation is properly organized and free of broken links."
