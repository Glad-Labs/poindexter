# Python unit-test gate. Mirrors the test-backend job in
# .gitea/workflows/ci.yml — added 2026-05-01 to fill the gap left by the
# Gitea decommission. Without this, GitHub branch protection only ran
# migrations-smoke (which doesn't install the full poetry env), so dep/venv
# regressions like the aiolimiter scare from PR #113 only surfaced on
# someone's local machine.
#
# Splits unit tests by directory (matches the Gitea split) so cross-directory
# singleton pollution (ServiceContainer, site_config, etc.) doesn't make
# tests flaky. Services dir uses --forked for the same reason.
#
# The job ALWAYS triggers (branch protection requires this status check —
# a `paths:` filter that prevents the workflow from running would block
# every docs-only PR forever, see migrations-smoke.yml for the same
# reasoning). Instead, a `detect-changes` step gates the heavy install +
# pytest steps on whether any backend code actually changed. Docs-only
# PRs land the required check in ~30s; backend PRs run the full suite.
#
# #534 retired / cost-trim 2026-06-12: this gate runs the full suite on PRs
# and the nightly schedule, but is SKIPPED on pushes to main on the PRIVATE
# source repo (the job-level `if:` below). A merged PR already ran this exact
# suite, so the post-merge push run was near-pure re-test — the single biggest
# line on the private-repo Actions bill (~875 wall-min / 3 days). A skipped job
# provisions no runner, so the saving is the whole run. The nightly schedule
# run (full suite + coverage) is the "green means tested on main" backstop: a
# semantic merge-conflict two concurrent PRs slip past PR gating surfaces there
# within 24h. The PUBLIC mirror (Glad-Labs/poindexter) is EXEMPT from the skip —
# public repos don't bill Actions, and `test-backend` is a required check there,
# so it keeps running on push to stay green. (The earlier sweep already made
# push reuse the PR path-detection short-circuit; this goes further and skips
# source pushes outright.)
name: unit-tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Nightly full run that ALSO measures coverage (#995). Coverage is gated to
  # this scheduled run (+ manual dispatch) via the `COV` env var below, so PRs
  # stay lean (~8m) instead of paying the ~2x coverage-instrumentation cost.
  # CI-minutes sweep — coverage as a daily trend line, not a per-PR tax.
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

# Cancel older in-progress runs of the same ref/PR — saves Actions minutes
# when multiple commits land back-to-back on the same PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Least-privilege GITHUB_TOKEN — read-only checkout is all this workflow
# needs. Bump per-job if a step ever needs write access (none does today).
permissions:
  contents: read

jobs:
  test-backend:
    # Cost-trim: skip on pushes to main on the PRIVATE source repo — the merged
    # PR already ran this suite and a skipped job bills $0 (no runner provisioned,
    # yet the required `test-backend` check still reports `skipped` = satisfied).
    # PRs, the nightly schedule, workflow_dispatch, and the FREE public mirror's
    # push (required `test-backend` check) all still run.
    #
    # Guard on `github.event.repository.private`, NOT the repo NAME: the public
    # mirror sync rewrites the literal string `glad-labs-stack` -> `poindexter`
    # in every file, which would INVERT a `github.repository == '...stack'` check
    # (it silently flipped jest-unit.yml's guard and the PYTEST line at :90 the
    # same way — the mirror runs them instead of skipping). `.private` is the real
    # billing discriminator (public repos don't bill Actions) and carries no
    # repo-name string for the sync to rewrite. Only read when event=='push'
    # (push always carries github.event.repository), so the nullable schedule
    # payload never reaches it. See the #534-retired / cost-trim note in the header.
    if: ${{ !(github.event_name == 'push' && github.event.repository.private) }}
    # runs-on seam. When the `CI_RUNNER` repo variable is set (a JSON array of
    # runner labels — configured only on the private source repo) this job runs
    # on those self-hosted labels for $0 cloud minutes; when it's unset — the
    # default, and the case on any public mirror or fork — it falls back to
    # ubuntu-latest. The `&&`/`||` short-circuit means fromJSON never receives
    # an empty string. Runbook: docs/operations/self-hosted-ci-runner.md.
    runs-on: ${{ vars.CI_RUNNER && fromJSON(vars.CI_RUNNER) || 'ubuntu-latest' }}
    timeout-minutes: 25

    # Coverage args applied to every pytest step — ONLY on the nightly schedule
    # + manual dispatch. Empty on push/PR so day-to-day runs don't pay the ~2x
    # coverage-instrumentation cost (#995 coverage moved off the per-PR path to
    # protect the CI-minutes win). Advisory either way (no --cov-fail-under).
    #
    # #1292: the source-package list must name what the tests actually IMPORT.
    # The pytest steps run from src/cofounder_agent (cwd), and the tests import
    # the first-party packages directly — `services.*`, `modules.*`, `routes.*`,
    # `utils.*`, `middleware.*`, `schemas.*`. The old `--cov=cofounder_agent`
    # named a package that is never imported (there is no `cofounder_agent`
    # package — `src/cofounder_agent/` is the import ROOT, not a package), so
    # pytest-cov tracked NOTHING and every nightly printed "No data was
    # collected" while still reporting green. Name the real packages instead.
    env:
      COV: ${{ (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && '--cov=services --cov=modules --cov=routes --cov=utils --cov=middleware --cov=schemas --cov-append --cov-report=' || '' }}
      # Public-mirror CI-minutes dedup. Every pytest step runs through $PYTEST.
      # On the source repo it's a normal run; on the force-pushed public mirror
      # (Glad-Labs/poindexter) it degrades to `--collect-only`. Rationale: the
      # mirror is rebuilt + force-pushed on every sync, so its status checks
      # gate NOTHING (the commit is already public) — re-running the full suite
      # there just re-tests code the source already gated. A collect-only smoke
      # still IMPORTS every test module, so it catches the one mirror-specific
      # failure mode — a sync-filter strip that leaves an unresolvable import
      # (e.g. #1277's modules.finance leak) — and keeps the required
      # `test-backend` check green. Source behavior is byte-identical (the
      # ternary resolves to plain `python -m pytest`), so this PR's own CI fully
      # exercises the real suite.
      #
      # Guard on the MIRROR name ('Glad-Labs/poindexter'), NOT the source name:
      # the sync script does a blanket glad-labs-stack→poindexter substitution
      # across every text file, which INVERTS a '== glad-labs-stack' check on
      # the mirror. Checking '== poindexter' is inversion-proof because the
      # substitution never touches the destination name. (#1481)
      PYTEST: ${{ github.repository == 'Glad-Labs/poindexter' && 'python -m pytest --collect-only' || 'python -m pytest' }}

    steps:
      # Free up GitHub-hosted runner disk space. The ubuntu-latest image ships
      # ~7 GB of pre-installed tooling (Android SDK, .NET, Haskell GHC, etc.)
      # that this job never uses. The --forked pytest step spawns one process
      # per test in the services dir (~8 k tests) and the combined temp-file
      # churn fills the remaining space, crashing the runner worker mid-run.
      # Removing the known-large bloat directories runs in ~20s and frees
      # enough headroom for the full forked suite to complete.
      - name: Free runner disk space
        # Hosted-image cleanup only. These ubuntu-latest preinstall paths don't
        # exist on the self-hosted container, and `sudo` may be unavailable
        # there, so skip the whole step when CI_RUNNER is set (self-hosted).
        if: ${{ !vars.CI_RUNNER }}
        run: |
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          df -h /

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v4.3.1 as of 2026-05-12
        with:
          # Need >=2 so `git diff` against the previous commit works on
          # push events. For PRs, the detect-changes step additionally
          # fetches the base sha. Keeping the checkout shallow keeps the
          # short-circuit path (docs-only PR) fast.
          fetch-depth: 2

      - name: Detect whether this change touches tested code
        id: changes
        # Skip the 9-14 minute pytest run when the diff has no backend
        # code or poetry changes — docs-only PRs, infra-yaml-only PRs,
        # marketing-site PRs, etc. We keep the workflow trigger
        # unconditional (branch protection requires it as a status check)
        # and gate the install + pytest steps below on
        # `needs_tests == 'true'`. SKIPPED steps inside a SUCCESS job
        # still satisfy the required-check contract.
        #
        # Falls open: any state we can't classify (manual dispatch,
        # initial push, missing base sha, fetch failure) runs the full
        # suite. Better a wasted run than a silently-skipped regression.
        env:
          EVENT: ${{ github.event_name }}
          PR_BASE: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail

          if [ "$EVENT" = "workflow_dispatch" ] || [ "$EVENT" = "schedule" ]; then
            echo "Manual dispatch or nightly schedule — running full suite (+ coverage)."
            echo "needs_tests=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Push events fall through to the same HEAD^1 path-detection used
          # for PRs. fetch-depth: 2 provides the parent commit. #534's
          # always-run-on-push was retired by the CI-minutes sweep, and the
          # 2026-06-12 cost-trim went further: the job-level `if:` above skips
          # SOURCE pushes outright (the merged PR already gated tests; the
          # nightly + Telegram/Grafana alerting are the safety net #534 added).
          # So on the source this path now serves only PRs / schedule / dispatch;
          # the public mirror's sync push still reaches it (collect-only).

          # pull_request and push events both reach here (workflow_dispatch
          # returned above). For pull_request GitHub checks out a virtual
          # merge commit (refs/pull/N/merge), where HEAD^1 is current
          # main's tip and HEAD^2 is the PR head. Diffing against HEAD^1 gives
          # the PR's net changes — what would actually land on main after merge.
          #
          # The previous approach used `github.event.pull_request.base.sha`
          # which is frozen at PR creation (does NOT update when another PR
          # merges to main mid-review). That meant a docs-only PR opened before
          # a separate src/ PR merged would falsely report "backend code
          # changed" because the diff vs the frozen base.sha contained both
          # PRs' changes (PR #703 lost its docs-only short-circuit this way
          # 2026-05-28). Fall back to base.sha only if HEAD^1 isn't reachable —
          # happens on fast-forward-only PRs where no merge commit exists.
          if git cat-file -e "HEAD^1" 2>/dev/null; then
            base="$(git rev-parse HEAD^1)"
          else
            base="$PR_BASE"
          fi

          # Empty / all-zero base = initial push or unknown — be safe.
          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ]; then
            echo "No usable base sha — running full suite."
            echo "needs_tests=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Fetch the base sha if the shallow checkout above didn't include it.
          if ! git cat-file -e "${base}^{commit}" 2>/dev/null; then
            if ! git fetch --no-tags --depth=1 origin "$base" 2>/dev/null; then
              echo "Could not fetch base sha $base — running full suite."
              echo "needs_tests=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          changed=$(git diff --name-only "$base" HEAD)
          echo "Files changed vs $base:"
          echo "$changed" | sed 's/^/  /'

          # `src/cofounder_agent/**` covers all Python code, tests,
          # pyproject.toml, and poetry.lock — the whole testable surface.
          # `brain/**` is tested by tests/unit/brain/ — brain/-only PRs
          # were silently skipping pytest because the pattern below only
          # matched src/cofounder_agent (Glad-Labs/glad-labs-stack#1293).
          # `scripts/**` is tested by tests/unit/scripts/ — same gap.
          # `.github/workflows/unit-tests.yml` self-includes so workflow
          # edits get smoke-tested by actually running.
          if echo "$changed" | grep -qE '^src/cofounder_agent/|^brain/|^scripts/|^\.github/workflows/unit-tests\.yml$'; then
            echo "Backend code or this workflow changed — running full suite."
            echo "needs_tests=true" >> "$GITHUB_OUTPUT"
          else
            echo "Only non-backend files changed — skipping pytest steps."
            echo "needs_tests=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skipped — no backend changes in this PR
        if: steps.changes.outputs.needs_tests != 'true'
        run: |
          echo "::notice::Backend code unchanged in this PR; pytest steps skipped to save ~9-14 minutes of CI."
          echo "To force a full run, push a commit that touches .github/workflows/unit-tests.yml or use workflow_dispatch."

      - name: Setup Python
        if: steps.changes.outputs.needs_tests == 'true'
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v5.6.0 as of 2026-05-12
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install Poetry
        if: steps.changes.outputs.needs_tests == 'true'
        run: pip install "poetry==2.2.1"

      # Reclaim runner disk before the full poetry install. The dep tree pulls
      # sentence-transformers -> torch (multi-GB wheels); on tight ubuntu-latest
      # runners the install intermittently hits `OSError(28) No space left on
      # device` mid-download (PR #1277 — two consecutive runs died installing
      # sentence-transformers, while main passed on roomier runners). Removing
      # preinstalled toolchains this job never uses (Android SDK ~9GB, .NET ~3GB,
      # GHC/Haskell ~5GB) reclaims ~15GB+ of headroom. Inline rm (no third-party
      # action) keeps the SHA-pin allowlist clean; `|| true` + df are advisory.
      - name: Free up runner disk
        # Hosted-only (see the "Free runner disk space" step above) AND only
        # when tests actually run. `!vars.CI_RUNNER` skips it on self-hosted.
        if: ${{ steps.changes.outputs.needs_tests == 'true' && !vars.CI_RUNNER }}
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc || true
          df -h /

      - name: Install dependencies
        if: steps.changes.outputs.needs_tests == 'true'
        working-directory: src/cofounder_agent
        run: |
          poetry config virtualenvs.create false
          poetry install --no-root --no-interaction

      # Seam 1 Wave 4 (#667): module-purity guard — modules/content/ must not
      # import kernel service internals directly (site_config / audit_log /
      # dispatch_complete). Pure-Python AST scan, no deps beyond stdlib.
      - name: Module purity lint (Seam 1 Wave 4)
        if: steps.changes.outputs.needs_tests == 'true'
        run: python scripts/ci/module_purity_lint.py

      # Seam 2 (#666): kernel-purity guard — services/ + plugins/ must not
      # import modules.* at top level. Exits 0 if no new violations; baselined
      # lazy imports are allowed while the module public-service interface is
      # built out. Pure-Python AST scan, no deps beyond stdlib.
      - name: Kernel purity lint (Seam 2 #666)
        if: steps.changes.outputs.needs_tests == 'true'
        run: python scripts/ci/kernel_purity_lint.py

      # Silent-failure audit (H2): no NEW silently-swallowed exceptions in
      # production code. A handler whose body is only `pass` or
      # `<logger>.debug(...)` hides the failure below the prod log level AND
      # GlitchTip's ERROR event gate. Existing sites are baselined
      # (silent_excepts_baseline.json, ratchet-only-shrinks); the lint fails
      # on net-new swallows. Pure-Python AST scan, no deps beyond stdlib.
      - name: Silent-except lint (audit H2)
        if: steps.changes.outputs.needs_tests == 'true'
        run: python scripts/ci/lint_silent_excepts.py

      # DB-first config guard (GH#93 Phase 3): no NEW os.getenv / os.environ
      # reads in services/ outside the bootstrap / SDK-bridge allowlist. Pure-
      # Python AST scan, no deps beyond stdlib. Was pre-commit-only, so
      # violations accumulated unguarded in fresh worktrees (#769) — now rides
      # inside test-backend like the other ratchet lints. Allow a legitimate
      # new file by adding it to ALLOWED_FILES in the script with a one-line
      # justification.
      - name: Services os.getenv lint (DB-first config, GH#93)
        if: steps.changes.outputs.needs_tests == 'true'
        run: python scripts/check-no-os-getenv-in-services.py

      # #995: turn "N tests pass" into a coverage SIGNAL — gated to the nightly
      # schedule + manual dispatch only. The `COV` env var (job level, above) is
      # EMPTY on push/PR, so day-to-day runs don't pay the ~2x instrumentation
      # cost; the trend line is captured once a day instead. When COV is set,
      # every pytest step appends to ONE combined `.coverage` file (collect-only,
      # no per-step report); this step erases stale data first and the final
      # "Coverage report" step prints the total + writes coverage.xml. ADVISORY —
      # no `--cov-fail-under` yet (test-backend is a required check; a blind gate
      # would block every PR). Ratchet plan: docs/operations/ci-deploy-chain.md "Coverage".
      - name: Initialize coverage data
        if: steps.changes.outputs.needs_tests == 'true' && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
        working-directory: src/cofounder_agent
        run: coverage erase

      - name: Unit tests — middleware
        if: steps.changes.outputs.needs_tests == 'true'
        working-directory: src/cofounder_agent
        run: $PYTEST tests/unit/middleware/ -q --tb=short -p no:cacheprovider $COV

      - name: Unit tests — routes
        if: steps.changes.outputs.needs_tests == 'true'
        working-directory: src/cofounder_agent
        run: $PYTEST tests/unit/routes/ -q --tb=short -p no:cacheprovider $COV

      - name: Unit tests — plugins
        if: steps.changes.outputs.needs_tests == 'true'
        working-directory: src/cofounder_agent
        run: $PYTEST tests/unit/plugins/ -q --tb=short -p no:cacheprovider $COV

      - name: Unit tests — cli
        if: steps.changes.outputs.needs_tests == 'true'
        working-directory: src/cofounder_agent
        run: $PYTEST tests/unit/cli/ -q --tb=short -p no:cacheprovider $COV

      # Parallelized with pytest-xdist (`-n 4`) instead of per-test `--forked`.
      # This is the slowest CI step by far — ~8k tests, and `--forked` spawns one
      # subprocess PER TEST, serially. `--forked` existed only to isolate
      # ServiceContainer / site_config singleton leakage; the autouse
      # `_reset_singletons_between_tests` + `_reset_env_between_tests` fixtures
      # (tests/unit/conftest.py) already reset that shared state between every test
      # in-process, and each xdist worker is its own process — together those cover
      # what `--forked` did. These tests were written to run forked (fully isolated)
      # so they carry no inter-test ordering deps and are safe to distribute;
      # `--dist loadfile` keeps each test FILE on one worker (run together, in
      # order) as a safety margin while spreading files across cores.
      #
      # Worker count is FIXED at 4, NOT `-n auto`: auto saw the WSL2 VM's 16 procs
      # and spawned 16 workers, each importing the heavy tree (torch /
      # sentence-transformers ~hundreds of MB resident), which blew past the
      # runner container's 8g mem_limit — workers got OOM-reaped (`node down: Not
      # properly terminated`) and pytest died with INTERNALERROR. 4 workers fit
      # the memory budget (docker-compose.local.yml `CI_RUNNER_MEM`) and still cut
      # this step from ~11 min (forked) to a few minutes. Bump only alongside the
      # runner's mem_limit / the WSL2 RAM budget — see the self-hosted runbook.
      #
      # The ignore list was retired in Glad-Labs/poindexter#345
      # (fix/345-triage-ignored-tests). Each path was either re-enabled
      # against current production, fixed test-side, gated behind an
      # `importorskip` for opt-in deps, or deleted along with orphan code
      # (services/pipeline_flow.py — Prefect was never adopted). Production
      # gaps surfaced during the triage are tracked separately as
      # poindexter#398 (plugin discovery) / #399 (qa_gates runtime) /
      # #400 (queue cap in auto-discovery), with the failing test cases
      # removed in-line and the rest of each file restored to CI.
      - name: Unit tests — services (xdist)
        if: steps.changes.outputs.needs_tests == 'true'
        working-directory: src/cofounder_agent
        run: $PYTEST tests/unit/services/ -q --tb=short -n 4 --dist loadfile -p no:cacheprovider $COV

      - name: Unit tests — utils
        if: steps.changes.outputs.needs_tests == 'true'
        working-directory: src/cofounder_agent
        run: $PYTEST tests/unit/utils/ -q --tb=short -p no:cacheprovider $COV

      # Brain-daemon probe/dispatcher tests. Previously omitted from the
      # matrix, so brain regressions (e.g. the findings/anomaly probes and
      # alert_dispatcher) shipped uncovered — closes #461-era CI gap.
      - name: Unit tests — brain
        if: steps.changes.outputs.needs_tests == 'true'
        working-directory: src/cofounder_agent
        run: $PYTEST tests/unit/brain/ -q --tb=short -p no:cacheprovider $COV

      # #641: the matrix previously ran only 7 of the 12 backend test
      # subdirs (middleware/routes/plugins/cli/services/utils/brain). The
      # five below — plus the root-level tests/unit/test_*.py files — were
      # never run in CI, so regressions in Module v1, the poindexter CLI
      # package, prompt YAML loading, pydantic schemas, and the scripts/
      # helpers could merge green. Each path mirrors a real directory that
      # ships its own tests; see the `ls tests/unit/` enumeration in #641.
      - name: Unit tests — modules
        if: steps.changes.outputs.needs_tests == 'true'
        working-directory: src/cofounder_agent
        # pytest exit 5 = "no tests collected". On the public mirror (poindexter)
        # the only modules tests (tests/unit/modules/finance/) are stripped by the
        # sync filter, leaving this dir empty -> exit 5 -> the step fails there
        # (it was reddening poindexter's unit-tests once the narrate fix unmasked
        # it). Treat 5 as success; genuine failures (exit 1) still fail. On the
        # source repo the dir has tests, so this is a no-op here. (Public-mirror
        # CI fix — only modules/ goes empty; every other tier keeps its tests.)
        run: |
          $PYTEST tests/unit/modules/ -q --tb=short -p no:cacheprovider $COV || code=$?
          if [ "${code:-0}" -eq 5 ]; then
            echo "::notice::no module tests collected (expected on the filtered public mirror) — treating as pass"
            exit 0
          fi
          exit "${code:-0}"

      - name: Unit tests — poindexter
        if: steps.changes.outputs.needs_tests == 'true'
        working-directory: src/cofounder_agent
        run: $PYTEST tests/unit/poindexter/ -q --tb=short -p no:cacheprovider $COV

      - name: Unit tests — prompts
        if: steps.changes.outputs.needs_tests == 'true'
        working-directory: src/cofounder_agent
        run: $PYTEST tests/unit/prompts/ -q --tb=short -p no:cacheprovider $COV

      - name: Unit tests — schemas
        if: steps.changes.outputs.needs_tests == 'true'
        working-directory: src/cofounder_agent
        run: $PYTEST tests/unit/schemas/ -q --tb=short -p no:cacheprovider $COV

      - name: Unit tests — scripts
        if: steps.changes.outputs.needs_tests == 'true'
        working-directory: src/cofounder_agent
        run: $PYTEST tests/unit/scripts/ -q --tb=short -p no:cacheprovider $COV

      # Root-level tests/unit/test_*.py (test_main / test_app_container_wireup
      # / test_bootstrap / approval-service suites). These exercise the
      # app-container + lifespan wiring, so they share the ServiceContainer /
      # site_config singletons — run them --forked for the same isolation
      # reason the services dir uses. The `tests/unit/test_*.py` glob is
      # intentionally non-recursive so it doesn't re-collect the subdirs above.
      - name: Unit tests — root-level
        if: steps.changes.outputs.needs_tests == 'true'
        working-directory: src/cofounder_agent
        run: $PYTEST tests/unit/test_*.py -q --tb=short --forked -p no:cacheprovider $COV

      # #994 / #1078: tests/integration/ was never run by any CI workflow, so the
      # strongest content-pipeline regression guards ran against nothing.
      # Most critically test_graphdef_pipeline.py — the #572 "graph_def writer
      # returns empty content" guard — drives the REAL build_graph_from_spec
      # compiler + TemplateRunner.run path with stub stages, asserting the
      # writer's content survives to finalize_task.
      #
      # This step now runs the full tests/integration/ directory (#1078). The
      # service-heavy tests (Ollama, WAN, live DB) self-skip in CI because they
      # gate on INTEGRATION_TESTS / REAL_SERVICES_TESTS env vars or autouse
      # availability fixtures (e.g. _require_wan in test_cooperative_unload_protocol.py,
      # fixed in #1057 so the probe is deferred to fixture setup, not import time).
      # tests/integration_db/ (live Postgres, handled by integration-db.yml) and
      # tests/benchmarks/ (perf, scheduled) stay out by design.
      - name: "Integration tests — full tests/integration/ sweep (#1078)"
        if: steps.changes.outputs.needs_tests == 'true'
        working-directory: src/cofounder_agent
        run: $PYTEST tests/integration/ -q --tb=short -p no:cacheprovider $COV

      # #995: ADVISORY coverage signal. Combines the `.coverage` data the
      # steps above accumulated (one file across the per-dir split, thanks
      # to `--cov-append`) and prints the total %. `coverage report` is
      # deliberately NOT given `--fail-under` — `test-backend` is a REQUIRED
      # branch-protection check, so any coverage threshold here would block
      # every PR before we even know the baseline. The job stays green no
      # matter the actual % (no `--cov-fail-under`). BUT "no data collected at
      # all" is a different failure than "coverage is low" — #1292: the old
      # `coverage report || true` swallowed the empty-data case, which is
      # exactly how the broken `--cov=cofounder_agent` (matched no imported
      # package) went unnoticed for the job's whole life. The empty-data case
      # now fails LOUD on the source repo (see the run block). Once a few runs
      # establish the baseline, the plan is to add `--cov-fail-under=<baseline>`
      # and ratchet it up — see docs/operations/ci-deploy-chain.md "Coverage".
      - name: Coverage report (#1292 — advisory %, but fail loud on zero data)
        if: steps.changes.outputs.needs_tests == 'true' && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
        working-directory: src/cofounder_agent
        # `coverage report`/`xml` exit non-zero when the .coverage file holds no
        # data — the precise #1292 regression. On the SOURCE repo, let that fail
        # the nightly (loud), so a future "coverage machinery produced nothing"
        # can't masquerade as green. On the force-pushed public mirror $PYTEST
        # degrades to --collect-only (no execution data BY DESIGN), so stay
        # advisory there to avoid a permanently-red nightly that gates nothing.
        run: |
          coverage combine 2>/dev/null || true
          if [ "${{ github.repository }}" != "Glad-Labs/poindexter" ]; then
            coverage report
            coverage xml
          else
            coverage report || true
            coverage xml || true
          fi

      # Surface the per-run % as a downloadable artifact so coverage is
      # visible without scraping the step log. SHA-pinned per the repo's
      # Actions allowlist (`selected`) — same pin used in playwright-e2e /
      # release-poindexter-to-pypi.
      - name: Upload coverage.xml artifact
        if: steps.changes.outputs.needs_tests == 'true' && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v4.6.2 as of 2026-05-12
        with:
          name: coverage-xml
          path: src/cofounder_agent/coverage.xml
          # #1292: a missing coverage.xml on the SOURCE repo means the coverage
          # machinery produced nothing — fail the upload (and the job) so the
          # regression is loud. The mirror's --collect-only nightly legitimately
          # has no xml, so it only `warn`s there.
          if-no-files-found: ${{ github.repository == 'Glad-Labs/poindexter' && 'warn' || 'error' }}
          retention-days: 14

  # Main-branch guard for the pure-AST ratchet lints (silent-except / module-
  # purity / kernel-purity). Those three also run INSIDE test-backend for PRs,
  # but test-backend is skipped on PRIVATE-main pushes (the cost-trim above), so
  # a violation that reaches main through a branch whose own CI predated the lint
  # is never re-checked on main — and then EVERY PR branched off that main
  # inherits it and goes red at once (the 2026-06-13 #1499 incident: a silent
  # except from a pre-lint branch (#1495) poisoned every open PR until #1519
  # fixed main). This job re-runs the lints on the push to main with NO skip, so
  # a poisoned main is caught at the source in minutes (and auto-files an issue)
  # instead of being discovered via N red PRs.
  #
  # Scope = exactly the gap: `push && repository.private`. PRs (any repo) and the
  # PUBLIC mirror's main push already run test-backend un-skipped, so they're
  # covered there — only the private source's main push is blind. Guarding on
  # `.private` (not the repo NAME) is deliberate: the mirror sync byte-rewrites
  # `glad-labs-stack`->`poindexter` in every file and would invert a name check;
  # `.private` carries no rewritable string. Push-only ⇒ ZERO per-PR overhead.
  # The lints are pure stdlib AST scans (no poetry/torch), so this job needs only
  # checkout + Python and finishes in seconds.
  lint-main:
    if: ${{ github.event_name == 'push' && github.event.repository.private }}
    runs-on: ${{ vars.CI_RUNNER && fromJSON(vars.CI_RUNNER) || 'ubuntu-latest' }}
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write  # the failure handler files an issue on the source repo
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v4.3.1 as of 2026-05-12
      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v5.6.0 as of 2026-05-12
        with:
          python-version: "3.13"
      - name: Module purity lint (Seam 1 Wave 4)
        run: python scripts/ci/module_purity_lint.py
      - name: Kernel purity lint (Seam 2 #666)
        run: python scripts/ci/kernel_purity_lint.py
      - name: Silent-except lint (audit H2)
        run: python scripts/ci/lint_silent_excepts.py
      - name: Services os.getenv lint (DB-first config, GH#93)
        run: python scripts/check-no-os-getenv-in-services.py
      - name: Notify operator — main fails a ratchet lint
        # File an issue (GH notification -> phone) so a poisoned main is caught
        # in minutes, not via every PR going red. GITHUB_TOKEN can write issues
        # on the source repo; no extra secret. Mirrors the sync-to-public
        # failure handler. (No dedup — main-red is rare and short-lived; a couple
        # of duplicate issues across back-to-back red pushes is acceptable.)
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "⚠️ main fails a ratchet lint (run ${{ github.run_id }})" \
            --label "bug" \
            --body "A pure-AST ratchet lint (silent-except / module-purity / kernel-purity / services-os.getenv) failed on the push to **main**.

          **Run:** ${RUN_URL}
          **Commit:** \`${{ github.sha }}\`

          ### Why this matters
          test-backend (which carries these lints for PRs) is skipped on private-main pushes, so this job is main's only guard. A red run here means a violation reached main through a branch whose CI predated the lint — and **every open PR branched off this main will inherit it and go red** until main is fixed.

          ### Fix
          1. Open the run above — the failing step names the file and the offending count vs baseline.
          2. Fix the violation on a branch (add logging / re-raise / route the import) and merge — or, if intentional, re-baseline (\`python scripts/ci/<lint>.py --update-baseline\`) or, for services-os.getenv, allowlist the file in \`ALLOWED_FILES\`.
          3. Open PRs go green again once they rebase onto the fixed main.

          _Auto-filed by the lint-main guard (unit-tests.yml)._"
