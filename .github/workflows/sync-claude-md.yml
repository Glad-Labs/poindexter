# Nightly sync of source-truth stats in CLAUDE.md (file counts, dashboard
# counts, latest-migration name). Companion to regen-app-settings-doc.yml
# — same drift-detect-then-PR pattern, different target file.
#
# Only updates stats derivable from the checked-in repo. DB-derived
# stats (post counts, embeddings totals, app_settings counts) are NOT
# touched by this job — those need a brain-side probe with prod DB
# access (separate work).
#
# Why a separate workflow rather than extending regen-app-settings-doc:
# different cadence reasoning (CLAUDE.md churns slower; rerunning on
# stat-only deltas keeps the PR signal tight) and different ownership
# (this one only writes CLAUDE.md, the other only writes the public
# reference page).
name: sync-claude-md

on:
  schedule:
    # 06:17 UTC daily — offset from regen-app-settings-doc's 06:13 so
    # both don't share a scheduler slot, and from on-the-hour to avoid
    # the GitHub Actions high-contention boundaries. Brain :13 convention.
    - cron: "17 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

# Cancel an in-progress run if a newer one starts (avoid pushing
# conflicting drift branches).
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4.3.1 as of 2026-05-12
        with:
          fetch-depth: 0  # need history to push a drift branch

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v5.6.0 as of 2026-05-12
        with:
          python-version: "3.13"

      - name: Run sync (writes CLAUDE.md if drift)
        run: python scripts/sync-claude-md-stats.py

      - name: Detect drift
        id: drift
        run: |
          if [[ -z "$(git status --porcelain CLAUDE.md)" ]]; then
            echo "drift=false" >> "$GITHUB_OUTPUT"
            echo "CLAUDE.md is in sync — nothing to PR."
          else
            echo "drift=true" >> "$GITHUB_OUTPUT"
            echo "Drift detected in CLAUDE.md — opening PR."
            git diff --stat CLAUDE.md
          fi

      - name: Open / update PR
        if: steps.drift.outputs.drift == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          DATE=$(date -u +%Y-%m-%d)
          BRANCH="auto/claude-md-sync-${DATE}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Stable branch per day — re-running on the same day amends the
          # existing PR instead of opening a duplicate.
          git checkout -B "$BRANCH"
          git add CLAUDE.md
          git commit -m "docs(CLAUDE.md): sync source-truth stats (auto)"
          git push -f origin "$BRANCH"

          if gh pr view "$BRANCH" --json number >/dev/null 2>&1; then
            echo "PR already exists for $BRANCH — pushed updated commit."
          else
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "docs(CLAUDE.md): sync source-truth stats (${DATE})" \
              --body "$(cat <<EOF
          ## Summary

          Auto-generated by \`.github/workflows/sync-claude-md.yml\`. Updates the
          source-truth stats in CLAUDE.md (file counts, latest migration
          name, dashboard count) to match the current repo state.

          DB-derived stats (post counts, embeddings totals, app_settings
          totals) are NOT touched — those need a separate brain-side probe
          with prod DB access.

          Diff:
          \`\`\`
          $(git diff HEAD~1 HEAD --stat CLAUDE.md)
          \`\`\`
          EOF
          )"
          fi
