# Glad Labs — Personal Media Operating System
#
# One command to run the entire system locally:
#   docker compose up -d
#
# This starts:
#   - PostgreSQL database (port 5432)
#   - FastAPI content pipeline + admin panel (port 8000)
#   - OpenClaw gateway for Discord/Telegram operations
#
# Prerequisites:
#   1. Copy .env.example to .env and fill in your API keys
#   2. Set up OpenClaw config in ~/.openclaw/ (see docs/openclaw/README.md)
#
# After starting:
#   - API docs: http://localhost:8000/api/docs
#   - Admin panel: http://localhost:8000/admin
#   - OpenClaw connects to Discord/Telegram automatically
#
# Optional: Run Ollama natively on your host for free local LLM inference.
# The FastAPI backend will auto-detect it at http://host.docker.internal:11434

services:
  # ===========================================
  # PostgreSQL — source of truth
  # ===========================================
  postgres:
    image: postgres:16-alpine
    container_name: gladlabs-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gladlabs}
      POSTGRES_USER: ${POSTGRES_USER:-gladlabs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gladlabs-dev}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gladlabs}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================
  # FastAPI — content pipeline + API + admin
  # ===========================================
  cofounder:
    build:
      context: ./src/cofounder_agent
      dockerfile: Dockerfile
    container_name: gladlabs-cofounder
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # Database (uses the postgres service above)
      DATABASE_URL: postgresql://${POSTGRES_USER:-gladlabs}:${POSTGRES_PASSWORD:-gladlabs-dev}@postgres:5432/${POSTGRES_DB:-gladlabs}

      # Auth
      API_TOKEN: ${API_TOKEN:?Set API_TOKEN in .env}
      DEVELOPMENT_MODE: ${DEVELOPMENT_MODE:-false}
      REVALIDATE_SECRET: ${REVALIDATE_SECRET:-dev-secret-key}

      # LLM Providers (at least one required)
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}

      # External services
      PEXELS_API_KEY: ${PEXELS_API_KEY:-}
      SERPER_API_KEY: ${SERPER_API_KEY:-}

      # Pipeline settings
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-100}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}

      # Monitoring (optional)
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENABLED: ${SENTRY_ENABLED:-false}

      # OpenClaw webhooks (optional — for push notifications to Discord)
      OPENCLAW_WEBHOOK_URL: ${OPENCLAW_WEBHOOK_URL:-}
      OPENCLAW_WEBHOOK_TOKEN: ${OPENCLAW_WEBHOOK_TOKEN:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ===========================================
  # OpenClaw — Discord/Telegram operations
  # ===========================================
  # Uncomment this section if you want OpenClaw in Docker.
  # Most users run OpenClaw natively (openclaw CLI) instead.
  #
  # openclaw:
  #   image: ghcr.io/openclaw/openclaw:latest
  #   container_name: gladlabs-openclaw
  #   restart: always
  #   volumes:
  #     - ${OPENCLAW_CONFIG_DIR:-~/.openclaw}:/home/node/.openclaw
  #   extra_hosts:
  #     - "host.docker.internal:host-gateway"
  #   environment:
  #     TZ: ${TZ:-America/New_York}
  #     OLLAMA_BASE_URL: http://host.docker.internal:11434
  #   depends_on:
  #     cofounder:
  #       condition: service_healthy

volumes:
  postgres-data:
    name: gladlabs-postgres-data
