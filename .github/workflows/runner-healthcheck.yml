# runner-healthcheck — self-healing control loop for the unit-tests
# self-hosted runner (docs/operations/self-hosted-ci-runner.md).
#
# WHY THIS IS HOSTED: it is the one workflow that must run in GitHub's cloud.
# A "is Matt's PC reachable?" probe cannot run on Matt's PC. It reconciles the
# `CI_RUNNER` repo variable — which ONLY the `unit-tests` runs-on seam reads —
# against the live status of the self-hosted runners:
#
#   >=1 self-hosted runner online  ->  set CI_RUNNER   (unit-tests runs on the PC, $0 minutes)
#   none online                    ->  unset CI_RUNNER (unit-tests falls back to ubuntu-latest,
#                                                        so a PR's required check can't hang)
#
# Operator override via the `CI_RUNNER_MODE` repo variable:
#   auto (default / unset) = liveness-driven, as above (self-heal both directions)
#   on                     = force self-hosted (never auto-revert, even if probe can't see it)
#   off                    = force GitHub-hosted (the kill-switch: never auto-enable)
#
# COST: each run bills ~1 rounded-up hosted minute. The 6-hour cron is ~120
# min/month — a rounding artifact, not real work. Bump the cron for faster
# failover, drop it for fewer minutes. `workflow_dispatch` reconciles instantly
# (run it right after you start or stop the runners).
name: runner-healthcheck

on:
  schedule:
    # Every 6 hours. Failover latency <= 6h in `auto` mode; manual dispatch is
    # instant. Tune in docs/operations/self-hosted-ci-runner.md.
    - cron: "0 */6 * * *"
  workflow_dispatch:

# The runner App's installation token (minted in the first step) carries all
# privilege; the default GITHUB_TOKEN needs nothing here.
permissions:
  contents: read

concurrency:
  group: runner-healthcheck
  cancel-in-progress: false

jobs:
  reconcile:
    # Never run on the public mirror (Glad-Labs/poindexter): it has no
    # self-hosted runner and no admin PAT, and its unit-tests seam is always
    # ubuntu-latest by construction. The job no-ops there.
    if: github.repository == 'Glad-Labs/glad-labs-stack'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      REPO: ${{ github.repository }}
      RUNNER_LABELS: '["self-hosted","linux","x64"]'
      DISCORD_OPS_WEBHOOK_URL: ${{ secrets.DISCORD_OPS_WEBHOOK_URL }}
      # Surfaced as an env var because the `secrets` context is NOT allowed in a
      # step `if:` — GitHub rejects `if: secrets.x != ''` at parse time ("Unrecognized
      # named-value: 'secrets'"). The `env` context IS allowed in `if:`, so the
      # dormant guard below keys on this instead. (Job-level env referencing a
      # secret is the documented workaround.)
      RUNNER_APP_ID: ${{ secrets.CI_RUNNER_APP_ID }}
    steps:
      # Mint a short-lived (1h) installation token from the dedicated runner App.
      # The token carries the FULL set of permissions the App install was granted
      # — and that set is already exactly minimal: this App is dedicated to the
      # runner and holds only Administration (list runners) + Variables (flip
      # CI_RUNNER) + Metadata. So minting the full token IS least-privilege; the
      # App install itself is the privilege boundary, not a per-mint narrowing.
      #
      # We do NOT pass `permission-*` inputs to narrow further. Two reasons:
      #   1. `create-github-app-token` has no `permission-variables` input — the
      #      repo-variables permission key is `actions_variables`, so the input
      #      was silently ignored (a build warning), never granting Variables.
      #   2. Narrowing to a subset the install wasn't granted 422s ("permissions
      #      requested are not granted to this installation").
      # Net: the narrowing was both wrong and unnecessary. Drop it.
      #
      # Guarded on the App-ID secret so this whole workflow is a quiet green no-op
      # until the runner feature is configured. Pinned to a SHA per the
      # third-party-Actions lint.
      - name: Mint runner-App installation token
        id: app-token
        if: ${{ env.RUNNER_APP_ID != '' }}
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1  # v3.2.0
        with:
          app-id: ${{ secrets.CI_RUNNER_APP_ID }}
          private-key: ${{ secrets.CI_RUNNER_APP_PRIVATE_KEY }}

      - name: Reconcile CI_RUNNER against live runner status
        shell: bash
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail

          # Dormant until the runner App is configured (no token minted). A green
          # skip (not a red failure) keeps the scheduled run quiet before setup.
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::notice::CI_RUNNER_APP_ID not set — self-hosted runner not configured yet; nothing to reconcile."
            echo "self-hosted runner not configured (no runner App)" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          # On a 404 (an unset variable) `gh api` writes the JSON error body to
          # STDOUT and exits non-zero, so the naive `… 2>/dev/null || echo ''`
          # form leaks that body into the value instead of returning ''. Capture
          # first, then reset to '' on any non-2xx. Without this an unset CI_RUNNER
          # reads as non-empty, and the auto-ENABLE half of the loop never fires
          # (`[ -z "$current" ]` stays false) — failover recovery would be dead.
          read_var() {
            local v
            v="$(gh api "/repos/$REPO/actions/variables/$1" --jq .value 2>/dev/null)" || v=''
            printf '%s' "$v"
          }

          mode="$(read_var CI_RUNNER_MODE)"; mode="${mode:-auto}"
          current="$(read_var CI_RUNNER)"
          online="$(gh api "/repos/$REPO/actions/runners" \
            --jq '[.runners[] | select(.status=="online")] | length' 2>/dev/null || echo 0)"

          # Guard against a transient blip (container restart after a stack
          # update): if we see zero, wait briefly and re-sample once before
          # deciding to revert.
          if [ "$online" -eq 0 ]; then
            sleep 30
            online="$(gh api "/repos/$REPO/actions/runners" \
              --jq '[.runners[] | select(.status=="online")] | length' 2>/dev/null || echo 0)"
          fi
          echo "mode=$mode  online_runners=$online  CI_RUNNER='${current}'"

          case "$mode" in
            on)  desired="set"   ;;
            off) desired="unset" ;;
            *)   if [ "$online" -ge 1 ]; then desired="set"; else desired="unset"; fi ;;
          esac

          change="none"
          if [ "$desired" = "set" ] && [ -z "$current" ]; then
            gh variable set CI_RUNNER --repo "$REPO" --body "$RUNNER_LABELS"
            change="ENABLED — unit-tests → self-hosted"
          elif [ "$desired" = "unset" ] && [ -n "$current" ]; then
            gh variable delete CI_RUNNER --repo "$REPO"
            change="REVERTED — unit-tests → ubuntu-latest"
          fi

          echo "result: $change"
          {
            echo "### runner-healthcheck"
            echo "- mode: \`$mode\`"
            echo "- online self-hosted runners: **$online**"
            echo "- action: **$change**"
          } >> "$GITHUB_STEP_SUMMARY"

          # Routine ops ping on a state change only (Discord, not Telegram —
          # this is graceful failover, not an outage). No-op if unconfigured.
          if [ "$change" != "none" ] && [ -n "${DISCORD_OPS_WEBHOOK_URL:-}" ]; then
            payload="$(printf '{"content":"⚙️ CI runner auto-flip: %s (mode=%s, online=%s)"}' "$change" "$mode" "$online")"
            curl -fsS -H 'Content-Type: application/json' -d "$payload" "$DISCORD_OPS_WEBHOOK_URL" >/dev/null || true
          fi
