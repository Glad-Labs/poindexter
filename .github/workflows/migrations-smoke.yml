# Smoke-test that every migration in src/cofounder_agent/services/migrations/
# applies cleanly against an empty Postgres 16 + pgvector database.
# Catches "migration N silently dropped a column migration M depended on"
# regressions before they hit a real restart. (GH#229)
name: migrations-smoke

on:
  # Fire on every push to main and every PR — branch protection requires
  # this status check, so it has to report on every PR (a path-filtered
  # workflow that doesn't fire would block the PR forever). The job
  # itself runs ~30s on a cache-warm runner, so the trade-off is fine.
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel older in-progress runs of the same ref/PR — saves Actions minutes
# when multiple commits land back-to-back on the same PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  migrations-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: poindexter_test
        ports:
          - 5432:5432
        # Health-check ensures the runner waits until pg_isready before the
        # job step starts — matches the canonical actions/example pattern.
        options: >-
          --health-cmd "pg_isready -U postgres -d poindexter_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/poindexter_test

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      # The runner only needs asyncpg + the project's own migration files.
      # Avoid a full poetry install (300+ deps, ~2 min) — keeps this job fast.
      - name: Install runtime deps
        run: pip install "asyncpg>=0.30,<0.32"

      - name: Wait for Postgres
        run: |
          for i in $(seq 1 30); do
            if pg_isready -h localhost -p 5432 -U postgres > /dev/null 2>&1; then
              echo "postgres ready"
              exit 0
            fi
            echo "waiting for postgres... ($i)"
            sleep 1
          done
          echo "postgres never became ready" >&2
          exit 1

      # Lint runs first — cheaper than the smoke test and catches the
      # convention drift class of bug (collisions, missing interface,
      # invalid filename) before we even touch Postgres. Glad-Labs/poindexter#378.
      - name: Lint migration filenames + interface
        run: python scripts/ci/migrations_lint.py

      - name: Run migrations against empty database
        run: python scripts/ci/migrations_smoke.py
