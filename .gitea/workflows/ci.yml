# Gitea Actions CI — custom runner with Python 3.12 + Node 22
# Total: 5,600+ tests (5,050+ Python unit, 65+ integration, 480+ JS/Jest)
name: CI — Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Clean workspace
        run: |
          if [ -n "$GITHUB_WORKSPACE" ]; then
            rm -rf "$GITHUB_WORKSPACE"/*
            rm -rf "$GITHUB_WORKSPACE"/.[!.]*
          fi
          rm -rf /tmp/work 2>/dev/null || true

      - uses: actions/checkout@v4
        with:
          clean: true
          fetch-depth: 1

      - name: Verify poetry.lock matches pyproject.toml
        # Fast-fails (1-2s) with a clear actionable message when pyproject
        # was edited without re-running `poetry lock`. Without this guard
        # the failure surfaces 30+ seconds later mid-`poetry install` with a
        # less obvious "lock file is not consistent" line buried in install
        # output — and historically cost a full overnight of red CI.
        run: |
          cd src/cofounder_agent
          poetry check --lock

      - name: Install Python dependencies
        run: |
          cd src/cofounder_agent
          poetry config virtualenvs.create false
          poetry install --no-root --no-interaction

      # Split by directory to avoid cross-directory test state pollution.
      # Services uses --forked because intra-directory singleton pollution
      # (ServiceContainer, site_config, etc.) breaks tests when run together.
      - name: Unit tests — agents
        run: |
          cd src/cofounder_agent
          python -m pytest tests/unit/agents/ -q --tb=short -p no:cacheprovider

      - name: Unit tests — middleware
        run: |
          cd src/cofounder_agent
          python -m pytest tests/unit/middleware/ -q --tb=short -p no:cacheprovider

      - name: Unit tests — routes
        run: |
          cd src/cofounder_agent
          python -m pytest tests/unit/routes/ -q --tb=short -p no:cacheprovider

      - name: Unit tests — services (forked)
        run: |
          cd src/cofounder_agent
          python -m pytest tests/unit/services/ -q --tb=short --forked \
            --ignore=tests/unit/services/test_memory_client.py \
            --ignore=tests/unit/services/test_memory_system.py \
            --ignore=tests/unit/services/test_web_research.py \
            -p no:cacheprovider

      - name: Unit tests — utils
        run: |
          cd src/cofounder_agent
          python -m pytest tests/unit/utils/ -q --tb=short -p no:cacheprovider

      - name: Integration tests
        run: |
          cd src/cofounder_agent
          python -m pytest tests/integration/ -q --tb=short -p no:cacheprovider

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Clean workspace
        run: |
          if [ -n "$GITHUB_WORKSPACE" ]; then
            rm -rf "$GITHUB_WORKSPACE"/*
            rm -rf "$GITHUB_WORKSPACE"/.[!.]*
          fi
          rm -rf /tmp/work 2>/dev/null || true

      - uses: actions/checkout@v4
        with:
          clean: true
          fetch-depth: 1

      - name: Install Node dependencies
        run: npm ci

      - name: Frontend tests
        run: npm test
