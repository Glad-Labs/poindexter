# Infrastructure alerts — Prometheus + Alertmanager counterparts
# of the legacy brain/health_probes.py probes.
#
# Phase D additive-first migration (GitHub #68):
# - These rules ship alongside the existing probe loop
# - Fire into a non-production Telegram channel at first
# - After 1-2 weeks of verified parity, the brain daemon's probe loop
#   can stop running these specific checks

groups:
  - name: poindexter-infrastructure
    interval: 30s
    rules:
      # --- Worker reachability ---
      - alert: PoindexterWorkerDown
        expr: up{job="poindexter-worker"} == 0
        for: 2m
        labels:
          severity: critical
          category: infrastructure
        annotations:
          summary: "Poindexter worker is not reachable"
          description: |
            The worker has failed Prometheus scrapes for 2+ minutes.
            Check `docker ps` for the poindexter-worker container;
            check logs with `docker logs poindexter-worker --tail 100`.

      - alert: PoindexterWorkerUnhealthy
        expr: poindexter_worker_up == 0
        for: 2m
        labels:
          severity: critical
          category: infrastructure
        annotations:
          summary: "Worker reports itself unhealthy"
          description: |
            `/metrics` is reachable but `poindexter_worker_up` is 0.
            The worker is alive but something in its self-check failed.

      # --- Postgres ---
      - alert: PoindexterPostgresDown
        expr: poindexter_postgres_connected == 0
        for: 1m
        labels:
          severity: critical
          category: infrastructure
        annotations:
          summary: "Worker cannot round-trip Postgres"
          description: |
            `SELECT 1` is failing from the worker. Likely the
            poindexter-postgres-local container is down or the pool
            is exhausted. Pipeline won't process tasks until fixed.

      # --- Ollama ---
      - alert: PoindexterOllamaDown
        expr: poindexter_ollama_reachable == 0
        for: 3m
        labels:
          severity: warning
          category: infrastructure
        annotations:
          summary: "Ollama is not reachable from the worker"
          description: |
            `/api/tags` on Ollama hasn't returned 200 for 3 minutes.
            All LLM calls are failing. Check `ollama list` on the host
            and `ollama serve` status.

      # --- Cloudflare page-views beacon ---
      # Static (not DB-rendered): binary up/down, no tunable threshold. The
      # gauge is set out-of-band by ProbeCloudflareBeaconJob (every 5m), so
      # `for: 11m` requires ~2 consecutive failed probes before firing —
      # avoids paging on a single transient CDN blip. severity=warning →
      # Discord (analytics gap is recoverable, not a pipeline halt).
      - alert: PoindexterCloudflareBeaconDown
        expr: poindexter_cloudflare_beacon_reachable == 0
        for: 11m
        labels:
          severity: warning
          category: infrastructure
        annotations:
          summary: "Cloudflare page-views beacon Worker is unreachable"
          description: |
            ProbeCloudflareBeaconJob's health POST to the page-views beacon
            Worker hasn't returned 2xx for 11+ minutes (≥2 consecutive 5-min
            probes). First-party page-view analytics ingestion is stalled
            until it recovers. Check the Worker at dash.cloudflare.com
            (Workers & Pages → page-views-beacon) and `wrangler tail`, and
            verify the `cloudflare_beacon_url` app_setting is correct.

      # --- Windows exporter ---
      # Must be static (not DB-rendered): binary up/down, no tunable thresholds,
      # and must fire even when the DB is down (when dynamic rendering fails).
      # poindexter#705 — exporter death silently kills all disk alerting.
      - alert: WindowsExporterDown
        expr: up{job="windows"} == 0 or absent(up{job="windows"})
        for: 5m
        labels:
          severity: critical
          category: infrastructure
        annotations:
          summary: "windows_exporter is unreachable — host metrics gone"
          description: |
            Prometheus cannot scrape the windows_exporter target (port 9182).
            All host metrics (disk, GPU, CPU, memory) have gone stale or absent.
            PoindexterDiskSpaceLow/Critical is now blind.
            Check: `Get-Process windows_exporter` in PowerShell, or
            `Invoke-WebRequest http://localhost:9182/metrics`.

      # PoindexterDiskSpaceLow and PoindexterDiskSpaceCritical were here.
      # Moved to prometheus_rule_builder.py DEFAULT_RULES so operators can
      # tune the 20/10 GB free thresholds and 200 GB total-size filter via
      # app_settings (prometheus.threshold.disk_free_warning_gb etc.).

      # --- Prefect dispatch-plane containers (poindexter#710) ---
      # cAdvisor exposes container_last_seen for every running container.
      # absent() fires when the metric disappears — i.e. the container is
      # no longer running. for: 3m absorbs brief restarts so a normal
      # `docker compose restart prefect-server` won't page.
      # Container names match container_name: in docker-compose.local.yml
      # (cAdvisor on Docker Desktop exposes them without the "/" prefix).
      - alert: PrefectServerDown
        expr: absent(container_last_seen{name="poindexter-prefect-server"})
        for: 3m
        labels:
          severity: critical
          category: infrastructure
        annotations:
          summary: "Prefect server (dispatch plane) is down"
          description: |
            cAdvisor has not seen poindexter-prefect-server for 3+ minutes.
            The content dispatch plane is halted — no flow runs will be
            submitted until it recovers.
            Check: docker ps | grep prefect; docker logs poindexter-prefect-server --tail 50

      - alert: PrefectWorkerDown
        expr: absent(container_last_seen{name="poindexter-prefect-worker"})
        for: 3m
        labels:
          severity: critical
          category: infrastructure
        annotations:
          summary: "Prefect worker is down"
          description: |
            cAdvisor has not seen poindexter-prefect-worker for 3+ minutes.
            Claimed flow runs will not execute until the worker recovers.
            Check: docker ps | grep prefect; docker logs poindexter-prefect-worker --tail 50

      # --- Metrics-refresh self-monitoring (audit H2b) ---
      # refresh_metrics wraps each phase in its own try/except so one failing
      # query can't fail the whole /metrics scrape — but a failing phase leaves
      # its gauge frozen at the last value (stale), silently masking the
      # underlying problem. poindexter_metrics_refresh_errors_total counts
      # per-phase failures so a persistently stale gauge becomes visible.
      # severity=warning → Discord (degraded observability, not an outage).
      - alert: PoindexterMetricsRefreshErrors
        expr: sum by (phase) (increase(poindexter_metrics_refresh_errors_total[15m])) > 20
        labels:
          severity: warning
          category: infrastructure
        annotations:
          summary: "metrics_refresh phase failing: {{ $labels.phase }}"
          description: |
            The {{ $labels.phase }} phase of refresh_metrics has thrown on
            most scrapes for ~15 min, so its Prometheus gauge(s) are frozen at
            the last good value — any panel or alert reading them is stale.
            Check worker logs for `refresh_metrics: {{ $labels.phase }}`.
