global:
  scrape_interval: 15s

# Alertmanager connection — Phase D (GitHub #68).
# Brain daemon will subscribe to Alertmanager webhooks for auto-remediation
# once parallel-run is verified; legacy brain probes continue to run in the
# meantime so there's no coverage gap.
alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  # Static alerts shipped with the repo — safety net if DB seeding is broken.
  - alerts/*.yml
  # DB-sourced rules rendered by RenderPrometheusRulesJob every 5 min.
  # Volume is shared with the worker; `/-/reload` picks up changes without
  # a container restart (see docker-compose.local.yml prometheus.command).
  - rules/*.yml

scrape_configs:
  # GPU metrics (nvidia_gpu_*) — sourced from the HOST exporter, not the
  # gpu-exporter container. On Windows Docker Desktop the Linux container can't
  # reach the NVIDIA driver (`nvidia-smi` -> "Driver Not Loaded"), so it serves
  # zero nvidia_gpu_* series; worse, its :9835 publish shadows the host-side
  # nvidia-smi-exporter.py on IPv6 and broke gpu-scraper.py (incident 2026-06-21).
  # The host pythonw exporter reads the GPU reliably over host.docker.internal.
  # We KEEP job_name "nvidia-smi" and limit this scrape to nvidia_gpu_* +
  # system_*_power_estimate_* so every consumer is unchanged: the hardware-power
  # dashboard's bare nvidia_gpu_* queries and the GpuTemperatureHigh /
  # GpuVramUtilizationHigh rules (prometheus_rule_builder.py) keep their
  # job="nvidia-smi" series. The complementary nvidia-smi-host job below supplies
  # the host-only hwinfo_/aida64_/psu_/system_cpu_ sensors from the same endpoint,
  # so the two keep-lists don't overlap (no duplicate series).
  # The gpu-exporter container is profile-gated off on Windows in
  # docker-compose.local.yml; re-point this job at "gpu-exporter:9835" on a Linux
  # host where GPU passthrough actually works.
  - job_name: nvidia-smi
    scrape_interval: 30s
    # nvidia-smi can block past the default 10s scrape_timeout under heavy GPU
    # load (two-GPU enumeration + live CUDA contexts) — the scrape is then
    # recorded as up=0 and the target flaps (~24x/3h; max scrape_duration pinned
    # at exactly 10.0s, the clamp signature). Idle scrape is ~1.5s, so 25s gives
    # ample headroom while staying under the 30s interval: a slow-but-successful
    # scrape beats a gap. (incident 2026-06-29 triage)
    scrape_timeout: 25s
    static_configs:
      - targets: ["host.docker.internal:9835"]
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: 'nvidia_gpu_.*|system_.*_power_estimate_.*'
        action: keep

  # Host hardware sensors — the host-side pythonw nvidia-smi-exporter.py is the
  # ONLY source for Windows shared-memory sensors (HWiNFO64 + AIDA64) and AMD RAPL
  # CPU power: the gpu-exporter container above runs the same script on Linux and
  # can't read any of them. Capture-everything posture (2026-06-03; the Grafana
  # Cloud free-tier cardinality cap that motivated keep-only-cpu was retired
  # 2026-05-03): keep the full hwinfo_/aida64_/psu_/system_cpu_ families. We still
  # DROP the host's nvidia_gpu_* and system_*_power_estimate_* because the container
  # job already supplies those — keeping both would draw double lines in Grafana
  # (two series differing only by ``job`` label).
  - job_name: nvidia-smi-host
    scrape_interval: 30s
    # Same host :9835 endpoint as the nvidia-smi job above — raise scrape_timeout
    # off the 10s default so the shared exporter's load spikes don't flap it.
    scrape_timeout: 25s
    static_configs:
      - targets: ["host.docker.internal:9835"]
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: 'hwinfo_.*|aida64_.*|psu_.*|system_cpu_.*'
        action: keep

  # Canonical worker metrics — exposition produced via prometheus_client.
  # Gitea #269 folded the legacy /api/prometheus exposer into this path;
  # there's now a single scrape job for all poindexter_* metrics.
  - job_name: poindexter-worker
    metrics_path: /metrics
    static_configs:
      - targets: ["worker:8002"]

  # System-level metrics (CPU, RAM, disk, network)
  # windows_exporter running on host at :9182
  - job_name: windows
    scrape_interval: 30s
    static_configs:
      - targets: ["host.docker.internal:9182"]

  # Uptime Kuma — HTTP / TCP monitor response times & up/down status.
  # Auth via API key (password-only basic auth). The key lives in the
  # `uptime_kuma_api_key` row of `app_settings` (is_secret=true). Brain
  # writes the decrypted value to the password_file path on each cycle
  # (see brain/prometheus_secret_writer.py). Prometheus reads the file
  # at scrape time — no Prometheus restart needed when the key rotates,
  # no plaintext credential ever lands in git, no env-var sprawl.
  #
  # Operator workflow to rotate:
  #   1. Generate / rotate the key in Uptime Kuma admin UI
  #      (Settings -> API Keys).
  #   2. `poindexter settings set uptime_kuma_api_key <new-key> --secret`.
  #   3. Within ~5 min (next brain cycle) the file is overwritten and
  #      the next prometheus scrape uses the new value. No restart.
  - job_name: uptime-kuma
    scrape_interval: 30s
    metrics_path: /metrics
    basic_auth:
      username: ""
      password_file: /etc/prometheus/secrets/uptime-kuma-api-key
    static_configs:
      - targets: ["uptime-kuma:3001"]

  # Tempo internal metrics (ingest rate, block uploads, RED of the
  # metrics_generator). Pairs with the tempo-config.yml metrics_generator
  # that remote_writes span-metrics back into Prometheus.
  - job_name: tempo
    scrape_interval: 30s
    static_configs:
      - targets: ["tempo:3200"]

  # Pyroscope self-metrics (ingest rate, active profiles).
  - job_name: pyroscope
    scrape_interval: 30s
    static_configs:
      - targets: ["pyroscope:4040"]

  # Promtail self-metrics + liveness (Glad-Labs/poindexter#1154).
  # Exposes promtail_* (sent entries, active targets, read/encode failures)
  # and — critically — gives us up{job="promtail"} so the PromtailDown alert
  # can page when the log shipper crashes OR wedges (a wedged HTTP server
  # fails the scrape → up=0). This is the EXTERNAL liveness signal that
  # replaces promtail's docker healthcheck: its image ships no in-container
  # HTTP client, so it can't probe its own /ready (see docker-compose.local.yml).
  - job_name: promtail
    scrape_interval: 30s
    static_configs:
      - targets: ["promtail:9080"]

  # Prometheus self-scrape — closes poindexter#649 (Prometheus self-monitoring
  # gap). Exposes tsdb compaction, rule evaluation latency / errors,
  # Alertmanager notification success/failure, and engine query throughput.
  # Without this job, Grafana panels querying prometheus_* metrics return
  # NoData and alert-routing failures are invisible.
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  # Alertmanager self-metrics — alert routing rates, silences, inhibitions,
  # and notification errors. Paired with the prometheus self-scrape so
  # alert-routing failures surface in Grafana / can trigger their own alerts.
  - job_name: alertmanager
    static_configs:
      - targets: ["alertmanager:9093"]

  # cAdvisor — per-container CPU/memory/network/IO metrics (poindexter#648).
  # Exposes container_* series keyed by container_label_com_docker_compose_service.
  # Use in Grafana with: container_cpu_usage_seconds_total{job="cadvisor"}
  # and container_memory_usage_bytes{job="cadvisor"}.
  - job_name: cadvisor
    scrape_interval: 30s
    static_configs:
      - targets: ["cadvisor:8080"]

  # postgres_exporter — deep Postgres metrics (poindexter#650).
  # Exposes pg_stat_activity, pg_stat_bgwriter, pg_stat_database (cache-hit,
  # xact counts, deadlocks), pg_locks, pg_stat_user_tables (seq/idx scans,
  # dead tuples), and pg_database_size. Natural home: Database dashboard.
  - job_name: postgres-exporter
    scrape_interval: 30s
    static_configs:
      - targets: ["postgres-exporter:9187"]
