## Tempo — OTLP traces backend for the LGTM stack.
##
## Worker exports spans here via services/telemetry.py (OTLP/HTTP to
## tempo:4318 or OTLP/gRPC to tempo:4317). Grafana reads from tempo:3200
## as a datasource. 24h retention keeps disk usage bounded on a single-
## host deploy; operators running a cluster can point compactor at S3.

server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

ingester:
  trace_idle_period: 10s
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 24h      # 1 day retention — bump for long-lived debug
    compacted_block_retention: 10m

metrics_generator:
  registry:
    external_labels:
      source: tempo
  storage:
    path: /var/tempo/generator/wal
    remote_write:
      - url: http://prometheus:9090/api/v1/write
        send_exemplars: true
  # local-blocks needs its OWN trace WAL — separate from the main trace
  # ingest path AND from the metrics_generator.storage remote-write WAL
  # above. Without traces_storage.path the processor refuses to initialize:
  #   "local blocks processor requires traces wal"
  traces_storage:
    path: /var/tempo/generator/traces
  # local-blocks is required for TraceQL metric queries (rate / count_over_time
  # / histogram_over_time). Without it, Grafana's TraceQL panel + the Explore
  # "rate() by(rootServiceName)" service-graph view emit:
  #   "localblocks processor not found"
  # flush_to_storage:true persists past the in-memory window so queries can
  # reach further than the live ingest buffer.
  processor:
    local_blocks:
      flush_to_storage: true

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/traces
    wal:
      path: /var/tempo/wal

# Generate RED (Rate / Errors / Duration) metrics from spans so Grafana
# dashboards can show traffic + latency per-service without needing
# Prometheus-level instrumentation on every service.
overrides:
  defaults:
    metrics_generator:
      processors: [service-graphs, span-metrics, local-blocks]
