[project]
name = "poindexter-mcp"
version = "1.0.0"
description = "Poindexter MCP Server — AI content pipeline control. Built by Glad Labs LLC."
requires-python = ">=3.12"
dependencies = [
    "mcp[cli]>=1.0.0",
    "asyncpg>=0.30.0",
    "httpx>=0.27.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["."]
