# Lint the source tree for content that would leak to the public
# Glad-Labs/poindexter mirror. Runs the same pattern checks the sync-time
# guard in scripts/sync-to-github.sh runs, but BEFORE merge so the fix
# lands with the offending change instead of after-the-fact.
#
# See scripts/ci/check_public_mirror_safety.py for the full pattern list
# and the rationale.
#
# Why a CI check on top of the sync-time guard:
#   - Sync runs only on push to origin/main. By then a leak has merged.
#   - This check runs on every PR + push, so authors fix in-place.
#   - The two guards share the same pattern list (kept in lock-step by
#     code review — divergence is a real bug).
#
# This workflow is excluded from the public mirror sync (the workflow
# only makes sense in the source repo). See scripts/sync-to-github.sh.
name: public-mirror-safety

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs on the same PR ref. The check is fast (<5s)
# so this mostly matters for the rare PR with rapid-fire pushes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Least-privilege GITHUB_TOKEN — read-only checkout is all this needs.
permissions:
  contents: read

jobs:
  public-mirror-safety:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout (need full ref to git ls-files)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1 as of 2026-05-12
        with:
          # Shallow clone is fine — the script uses `git ls-files`, not history.
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v5.6.0 as of 2026-05-12
        with:
          python-version: '3.13'

      # No third-party deps — the script is stdlib-only on purpose so it
      # runs in <5s without a cache or install step.
      - name: Run public-mirror safety check
        run: python scripts/ci/check_public_mirror_safety.py
