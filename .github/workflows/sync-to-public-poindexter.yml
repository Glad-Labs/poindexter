name: Sync to public Poindexter mirror

# Runs on every push to main on Glad-Labs/glad-labs-stack (private full tree).
# Mirrors the filtered subset (private files stripped via scripts/sync-to-github.sh)
# to Glad-Labs/poindexter (public OSS).
#
# Auth: a DEDICATED GitHub App ("glad-labs-mirror-sync") installed on
# Glad-Labs/poindexter with Contents: read+write AND Workflows: read+write.
# Both are required — Contents to force-push the rebuilt mirror, Workflows
# because the mirror tree includes .github/workflows/* and GitHub refuses to let
# a token push workflow files without the Workflows permission. This workflow
# runs on glad-labs-stack and mints a short-lived (1h) installation token scoped
# to the poindexter installation (owner + repositories) via
# actions/create-github-app-token.
#
# App over PAT (2026-06-13): the previous POINDEXTER_SYNC_TOKEN fine-grained PAT
# silently expired and froze the mirror for ~4 main pushes before anyone noticed
# (the sync just goes red — it's a derived mirror, nothing pages). App
# installation tokens are ephemeral and auto-minted on every run, so there is NO
# annual expiry cliff to forget and nothing to rotate on a schedule. A leaked App
# key is also lower blast radius than a PAT (single-repo install, two perms).
#
# Secrets on this repo: MIRROR_SYNC_APP_ID + MIRROR_SYNC_APP_PRIVATE_KEY.
# If the sync starts failing on auth, check (in order): the App is still
# installed on poindexter; its install still has Contents + Workflows write;
# MIRROR_SYNC_APP_PRIVATE_KEY is valid. See docs/operations/ci-deploy-chain.md.
#
# To bypass for an individual commit, include "[skip-public-sync]" in the commit
# message. Useful for in-progress branches that aren't ready for public visibility.
#
# Sync mechanism — force-push with --force-with-lease (issue #392):
#   The mirror is rebuilt from scratch on every sync (filter → push). This is the
#   documented "intentional force-push posture" — see CLAUDE.md. We use
#   --force-with-lease (NOT plain --force) so that if anyone pushes directly to
#   the public mirror's main between our SHA-capture and our push, the sync
#   ABORTS loudly instead of silently overwriting their commit. The previous
#   `merge -X theirs` approach (one-off recovery commit e302fa5d, 2026-04-30)
#   silently reverted production patches from PRs #157 and #161 — image,
#   podcast, and video media_assets recording were dark for ~5 days (see #384,
#   #391, #392). DO NOT replace force-push with a union merge — that's the bug.
#
# No CI guard for non-bot commits on the mirror (deliberate, per Matt 2026-05-05):
#   We could grep `git log mirror/main` for non-bot authors and abort if a real
#   human contributor's commit is about to be overwritten. We don't, because:
#   (a) there are no human contributors yet — last 30 mirror merges are all
#   bots (release-please, mintlify, github-actions); (b) Matt subscribes to
#   GitHub notifications on the public repo and would see a real PR appear.
#   The --force-with-lease above already protects against the most common
#   accident (pushed-to-mirror-since-we-looked). If contributor PRs become
#   common, revisit and add the guard.

on:
  push:
    branches: [main]
  workflow_dispatch:  # manual trigger from the Actions tab if a sync was missed

concurrency:
  # Serialize runs — back-to-back pushes shouldn't race for the github mirror's main
  group: sync-to-public-poindexter
  cancel-in-progress: false

jobs:
  sync:
    if: ${{ !contains(github.event.head_commit.message, '[skip-public-sync]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      issues: write  # needed for the failure-notification step (gh issue create)

    steps:
      - name: Checkout glad-labs-stack (full history for sync filter)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v4.3.1 as of 2026-05-12
        with:
          fetch-depth: 0
          # Don't persist the GITHUB_TOKEN credential helper — it sets an
          # http.https://github.com/.extraheader that takes precedence over
          # URL-embedded credentials, which would steamroll our App token and
          # try to push as github-actions[bot] (no write access on poindexter).
          persist-credentials: false

      - name: Configure git identity for the temporary sync commit
        run: |
          git config user.name  "glad-labs-sync-bot"
          git config user.email "sync@gladlabs.io"

      - name: Mint a poindexter installation token (dedicated mirror-sync App)
        id: app-token
        # Pinned to a SHA per the third-party-Actions lint. Mint the FULL
        # installation token — do NOT pass permission-* narrowing inputs. The
        # dedicated App install is already minimal (Contents + Workflows on
        # poindexter only), so the full token IS least-privilege, and narrowing
        # to a subset just risks the 422 that bit the runner healthcheck (#1489).
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1  # v3.2.0
        with:
          app-id: ${{ secrets.MIRROR_SYNC_APP_ID }}
          private-key: ${{ secrets.MIRROR_SYNC_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: poindexter

      - name: Add poindexter as a git remote (HTTPS + App installation token)
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          # x-access-token is GitHub's documented username for token auth over
          # HTTPS; the App installation token goes in the password slot. Embedding
          # it in the remote URL keeps sync-to-github.sh path-unchanged (it just
          # `git push github` against this remote).
          git remote add github "https://x-access-token:${APP_TOKEN}@github.com/Glad-Labs/poindexter.git"

      - name: Run sync filter + force-push filtered subset
        run: bash scripts/sync-to-github.sh

      - name: Summary
        if: always()
        run: |
          echo "## Sync to Glad-Labs/poindexter" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Source commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Triggered by: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- Result: see job status above" >> $GITHUB_STEP_SUMMARY

      - name: Notify operator on failure
        # Opens a GitHub issue on Glad-Labs/poindexter so the operator sees the
        # failure in GitHub notifications without needing a separate webhook secret.
        # GITHUB_TOKEN has write access to issues on the source repo
        # (Glad-Labs/glad-labs-stack); the mirror-sync App token is scoped to
        # poindexter Contents+Workflows (not Issues), so filing on the source
        # repo is both simpler and more reliable.
        #
        # Failure modes are now App-access issues, not a token expiry: the App
        # uninstalled from poindexter, its install missing Contents/Workflows
        # write, or an invalid MIRROR_SYNC_APP_PRIVATE_KEY. See the header.
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "⚠️ poindexter mirror sync FAILED (run ${{ github.run_id }})" \
            --label "bug" \
            --body "The **sync-to-public-poindexter** workflow failed.

          **Run:** ${RUN_URL}
          **Triggered by:** ${{ github.actor }}
          **Source commit:** \`${{ github.sha }}\`

          ### Likely cause
          The dedicated \`glad-labs-mirror-sync\` GitHub App lost access to poindexter — uninstalled, its install missing Contents or Workflows write, or an invalid \`MIRROR_SYNC_APP_PRIVATE_KEY\`. (Installation tokens are ephemeral and auto-minted, so there is no PAT to expire.)

          ### Fix
          1. Confirm the \`glad-labs-mirror-sync\` App is installed on \`Glad-Labs/poindexter\` with Contents + Workflows: read+write.
          2. If the private key was rotated, update \`MIRROR_SYNC_APP_PRIVATE_KEY\` on \`Glad-Labs/glad-labs-stack\`.
          3. Re-run this workflow via \`workflow_dispatch\` to confirm.

          _Auto-filed by the sync-to-public-poindexter failure handler._"
