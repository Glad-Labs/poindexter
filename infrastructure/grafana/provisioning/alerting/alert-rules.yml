# Grafana alert rules — RETIRED 2026-04-25.
#
# All 15 rules previously provisioned here have been replaced by direct-fanout
# alert paths that don't depend on Grafana being up to fire:
#
#   - Brain probes (`brain/health_probes.py`) cover error rate, stuck tasks,
#     embeddings freshness, content quality, traffic anomalies, pipeline
#     throughput, publish rate, worker liveness, ollama liveness, disk space,
#     and a new `gpu_temperature` probe (1-min cadence). Brain notifies via
#     Telegram + Discord through `brain/brain_daemon.py:notify()`.
#   - Prometheus rules (`infrastructure/prometheus/rules.yml`) cover the
#     critical infra signals: PoindexterWorkerDown, PoindexterPostgresDown,
#     PostgresConnectionsHigh/Critical, DailySpendApproachingLimit,
#     DailySpendOverBudget, MonthlySpendHigh, EmbeddingsStale,
#     NoPublishedPostsRecently, PostsNotEmbedded, PostgresSlowQuery,
#     OllamaNoModelsLoaded. They fan out via Alertmanager → worker
#     `/api/webhooks/alertmanager` → handler persists to alert_events and
#     pages the operator (services/integrations/handlers/webhook_alertmanager.py).
#
# `deleteRules:` below explicitly removes the previously-provisioned UIDs;
# Grafana's provisioner is additive by default and would otherwise keep
# them in its internal DB even with an empty `groups:` block.
#
# Re-enabling Grafana-side alerts in the future: drop new entries under
# `groups:` and remove the matching uid from `deleteRules`.

apiVersion: 1

groups: []

deleteRules:
  - orgId: 1
    uid: brain-high-error-rate
  - orgId: 1
    uid: brain-stale-tasks
  - orgId: 1
    uid: brain-embedding-sync-lag
  - orgId: 1
    uid: brain-db-size-warning
  - orgId: 1
    uid: brain-daily-cost-spike
  - orgId: 1
    uid: brain-content-quality-drop
  - orgId: 1
    uid: brain-traffic-anomaly
  - orgId: 1
    uid: brain-pipeline-stalled
  - orgId: 1
    uid: brain-zero-published-week
  - orgId: 1
    uid: brain-worker-offline
  - orgId: 1
    uid: brain-ollama-down
  - orgId: 1
    uid: brain-heartbeat-stale
  - orgId: 1
    uid: brain-gpu-metrics-stale
  - orgId: 1
    uid: brain-gpu-temp-high
  - orgId: 1
    uid: brain-disk-space-low
