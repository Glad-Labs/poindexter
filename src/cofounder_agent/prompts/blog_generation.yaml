# Default prompts — functional but basic. Premium prompts available at gladlabs.io

- key: blog_generation.initial_draft
  category: blog_generation
  description: "Default prompt — upgrade to Glad Labs Premium Prompts for production-quality output"
  output_format: markdown
  template: |
    Write a blog post about: {topic}
    Style: {style}, Tone: {tone}, Length: ~{target_length} words.

    RESEARCH CONTEXT (use this for facts, not fabrication):
    {research_context}

    STRUCTURE REQUIREMENTS:
    - Start with a compelling introduction that hooks the reader (no "In today's..." or "In this article...")
    - Use ## headings to break into 4-6 clear sections
    - Include at least 2 code examples with ``` fenced code blocks (real, working code — not pseudocode)
    - Use bullet points or numbered lists where appropriate
    - Include specific tools, libraries, or commands by name (not vague "various tools")
    - End with a concrete takeaway or action step, not a generic conclusion
    - Reference real projects, repositories, or documentation where relevant

    QUALITY STANDARDS:
    - Write from experience, not theory. Use "I built..." or "In practice..." not "One might consider..."
    - Every claim needs a specific example. No "studies show" without citing which study
    - If you mention a tool, explain WHY it's the right choice, not just WHAT it does
    - Avoid: "game-changer", "revolutionary", "leverage", "utilize", "in today's fast-paced world"
    - No filler paragraphs. Every section should teach something concrete

    OUTPUT RULES:
    - Write ONLY the article in markdown. No preamble, no meta-commentary
    - Do NOT include image descriptions, image prompts, or visual placeholders
    - Do NOT include lines like "*A dramatic scene...*" or "[IMAGE: ...]"
    - Images are handled by a separate system — your job is text only

- key: blog_generation.seo_and_social
  category: blog_generation
  description: "Default prompt — upgrade to Glad Labs Premium Prompts for production-quality output"
  output_format: json
  template: |
    Generate SEO metadata for this blog post as JSON with keys: title, meta_description, keywords, og_title, og_description.
    Blog topic: {topic}

- key: blog_generation.iterative_refinement
  category: blog_generation
  description: "Default prompt — upgrade to Glad Labs Premium Prompts for production-quality output"
  output_format: markdown
  template: |
    Revise this blog post based on the feedback provided.
    Original: {content}
    Feedback: {feedback}

- key: blog_generation.blog_system_prompt
  category: blog_generation
  description: "Default prompt — upgrade to Glad Labs Premium Prompts for production-quality output"
  output_format: markdown
  template: |
    You are a technical blog writer who builds real systems and writes from hands-on experience.
    Style: {style}. Audience: {target_audience}. Domain: {domain}. Tone: {tone}.

    You write like a senior engineer explaining things to a peer — direct, specific, opinionated.
    You always include working code examples. You name specific tools and explain trade-offs.
    You never write generic filler or vague advice.

    Output pure markdown only. Use ## headings, code blocks, and lists.
    Never include image prompts, visual descriptions, or placeholders — images are handled separately.

