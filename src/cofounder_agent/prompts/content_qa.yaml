# Default prompts — functional but basic. Premium prompts available at gladlabs.io

- key: qa.content_review
  category: content_qa
  description: "Default prompt — upgrade to Glad Labs Premium Prompts for production-quality output"
  output_format: json
  template: |
    Review this content for quality. Return JSON with keys: score (1-10), issues (list), suggestions (list).
    Content: {content}

- key: qa.self_critique
  category: content_qa
  description: "Default prompt — upgrade to Glad Labs Premium Prompts for production-quality output"
  output_format: json
  template: |
    Self-critique this content. Return JSON with keys: strengths (list), weaknesses (list), improvements (list).
    Content: {content}
