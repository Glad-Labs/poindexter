# Nixpacks/Railpack build configuration
# Used when Railway doesn't use the Dockerfile builder
# Ensures poetry deps are installed at BUILD time, not runtime

[phases.setup]
nixPkgs = ["python312", "gcc"]

[phases.install]
cmds = [
  "pip install poetry==1.8.5",
  "poetry config virtualenvs.create false",
  "poetry install --no-interaction --no-ansi --only main --no-root"
]

[start]
cmd = "poetry run uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000}"
