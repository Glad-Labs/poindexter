name: Release Please

# Triggers (changed 2026-04-27 — was push-on-main, which spammed failure
# emails when the GitHub API installation rate limit was exhausted by
# concurrent CI / sync / Vercel calls):
#   - schedule: daily at 06:00 UTC. Release Please picks up everything
#     merged since last release and creates/updates the release PR in
#     one batched run, well outside the burst window when most pushes
#     happen.
#   - workflow_dispatch: manual fire when an immediate release is wanted.
on:
    schedule:
        - cron: '0 6 * * *'
    workflow_dispatch:

permissions:
    contents: write
    pull-requests: write

jobs:
    release-please:
        runs-on: ubuntu-latest

        steps:
            - name: "\U0001F4E6 Run Release Please"
              id: release
              uses: googleapis/release-please-action@c3fc4de07084f75a2b61a5b933069bda6edf3d5c # v4
              with:
                  release-type: node
                  # Manifest mode: reads config from release-please-config.json
                  # and tracks versions in .release-please-manifest.json
                  config-file: release-please-config.json
                  manifest-file: .release-please-manifest.json

            # Version bumps are handled by extra-files in release-please-config.json
            # GitHub Release + tag is created on main by deploy-production-with-environments.yml
